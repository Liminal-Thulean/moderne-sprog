<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dansk — Language Nexus</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f0;
  --surface:#ffffff;
  --surface2:#f0ede6;
  --border:rgba(0,0,0,0.08);
  --border2:rgba(0,0,0,0.14);
  --text:#1c1917;
  --text2:#57534e;
  --text3:#a8a29e;
  --red:#c8403a;
  --red-light:rgba(200,64,58,0.08);
  --red-border:rgba(200,64,58,0.25);
  --green:#2d7a50;
  --green-light:rgba(45,122,80,0.08);
  --green-border:rgba(45,122,80,0.25);
  --gold:#b8860b;
  --blue:#3c64c8;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow:0 4px 16px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.12),0 4px 8px rgba(0,0,0,0.06);
  --radius:6px;
  --radius-lg:10px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;line-height:1.6}
button{cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif}
button:disabled{opacity:0.45;cursor:not-allowed}
input{font-family:'DM Sans',sans-serif}
input:focus{outline:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--surface2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--red);padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(200,64,58,0.3)}
.topbar-logo{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:#fff;letter-spacing:0.3px;text-decoration:none}
.topbar-sep{width:1px;height:18px;background:rgba(255,255,255,0.25)}
.topbar-course{font-size:12px;font-weight:500;color:rgba(255,255,255,0.8);letter-spacing:0.5px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.back-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:11px;font-weight:600;letter-spacing:1px;padding:5px 14px;border-radius:20px;text-transform:uppercase}
.back-btn:hover{background:rgba(255,255,255,0.25)}

/* ── MODULE MAP ── */
.map-container{max-width:860px;margin:0 auto;padding:40px 20px 80px;width:100%}
.map-hero{margin-bottom:48px}
.map-hero h1{font-family:'Fraunces',serif;font-size:clamp(36px,5vw,56px);font-weight:300;font-style:italic;color:var(--text);line-height:1.1;margin-bottom:10px}
.map-hero p{font-size:15px;color:var(--text2);max-width:520px;line-height:1.65}
.module-block{margin-bottom:32px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
.module-header{padding:18px 22px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.module-header:hover{background:var(--surface2)}
.module-badge{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.module-badge-inner{font-family:'Fraunces',serif;font-size:13px;font-weight:600;color:#fff}
.module-info{flex:1}
.module-title{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--text);margin-bottom:2px}
.module-sub{font-size:12px;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;font-weight:500}
.module-cefr{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:12px;border:1px solid;font-weight:500;flex-shrink:0}
.module-chevron{color:var(--text3);font-size:14px;transition:transform 0.2s;flex-shrink:0}
.module-chevron.open{transform:rotate(180deg)}
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--border)}
.unit-card{background:var(--surface);padding:16px 18px;cursor:pointer;transition:background 0.15s;position:relative;overflow:hidden}
.unit-card:hover:not(.locked){background:#faf8f5}
.unit-card.locked{cursor:default;opacity:0.55}
.unit-card.available{border-color:var(--gold);background:#fffdf6}
.unit-card.complete::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green)}
.section-card.assessment-card{border-color:rgba(60,100,200,0.3);background:rgba(60,100,200,0.02)}
.unit-card.in-progress::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
.unit-week{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.unit-title{font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.3}
.unit-theme{font-size:11px;color:var(--text3);line-height:1.4}
.unit-status{display:flex;align-items:center;gap:4px;margin-top:8px}
.unit-status-dot{width:6px;height:6px;border-radius:50%}
.unit-status-label{font-size:10px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase}
.lock-icon{position:absolute;top:14px;right:14px;font-size:13px;opacity:0.4}
.progress-ring{position:absolute;top:12px;right:12px}

/* ── UNIT VIEW ── */
.unit-container{max-width:760px;margin:0 auto;padding:32px 20px 80px;width:100%}
.unit-header{margin-bottom:32px}
.unit-header-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.unit-header-module{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
.unit-header-sep{color:var(--text3);font-size:11px}
.unit-header-cefr{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:8px;border:1px solid var(--border2);color:var(--text2)}
.unit-title-big{font-family:'Fraunces',serif;font-size:clamp(28px,4vw,40px);font-weight:400;font-style:italic;color:var(--text);margin-bottom:6px;line-height:1.1}
.unit-theme-big{font-size:14px;color:var(--text2);margin-bottom:20px}
.unit-progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:8px}
.unit-progress-fill{height:100%;background:var(--red);border-radius:2px;transition:width 0.5s ease}
.unit-progress-label{font-size:11px;color:var(--text3);text-align:right}

/* ── SECTION TABS ── */
.section-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.section-tab{font-size:11px;font-weight:500;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);letter-spacing:0.3px;white-space:nowrap}
.section-tab:hover{background:var(--surface2)}
.section-tab.active{background:var(--red);border-color:var(--red);color:#fff}
.section-tab.complete{border-color:var(--green-border);color:var(--green)}
.section-tab.complete.active{background:var(--green);border-color:var(--green);color:#fff}

/* ── SECTION CARD ── */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:16px}
.section-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.section-type-badge{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:1.5px;padding:3px 9px;border-radius:10px;background:var(--surface2);color:var(--text3);text-transform:uppercase;flex-shrink:0}
.section-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--text);flex:1}
.section-score-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;flex-shrink:0}
.section-body{padding:22px}
.section-instruction{font-size:13px;color:var(--text2);margin-bottom:18px;font-style:italic;line-height:1.5}

/* ── VOCAB INTRO ── */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.vocab-card{padding:12px 14px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)}
.vocab-da{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--text);margin-bottom:2px}
.vocab-en{font-size:12px;color:var(--text2);margin-bottom:6px}
.vocab-example{font-size:11px;color:var(--text3);font-style:italic;line-height:1.4;border-top:1px solid var(--border);padding-top:6px;margin-top:4px}

/* ── MATCHING ── */
.matching-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.match-col-header{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding-bottom:6px;border-bottom:1px solid var(--border);text-align:center}
.match-tile{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);text-align:center;user-select:none;min-height:44px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s}
.match-tile.selectable:hover{border-color:var(--red);background:var(--red-light);cursor:pointer}
.match-tile.selected{border-color:var(--red);background:var(--red-light);color:var(--red);font-weight:600}
.match-tile.wrong{border-color:var(--red);background:var(--red-light);animation:shake 0.4s ease}
.match-tile.matched{opacity:0.45;text-decoration:line-through;cursor:default}
.match-tile.da-tile{font-family:'Fraunces',serif;font-size:15px;font-weight:600}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* ── MULTIPLE CHOICE ── */
.mc-question{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--border)}
.mc-question:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.mc-prompt{font-size:14px;font-weight:500;color:var(--text);margin-bottom:12px;line-height:1.5}
.mc-options{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mc-option{padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);font-size:13px;color:var(--text);text-align:left;transition:all 0.15s}
.mc-option:hover:not(:disabled){border-color:var(--red);background:var(--red-light)}
.mc-option.selected{border-color:var(--red);background:var(--red-light);color:var(--red);font-weight:500}
.mc-option.correct{border-color:var(--green);background:var(--green-light);color:var(--green);font-weight:500}
.mc-option.wrong{border-color:var(--red);background:var(--red-light);color:var(--red);font-weight:500}

/* ── FILL BLANK ── */
.fill-item{display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;margin-bottom:16px;padding:14px 16px;background:var(--surface2);border-radius:var(--radius);font-size:15px;border:1px solid var(--border)}
.fill-item:last-child{margin-bottom:0}
.fill-text{font-family:'Fraunces',serif;font-size:16px;color:var(--text)}
.fill-input{font-family:'Fraunces',serif;font-size:16px;width:120px;padding:2px 8px;border-bottom:2px solid var(--border2);background:transparent;color:var(--text);border-top:none;border-left:none;border-right:none;border-radius:0;text-align:center}
.fill-input:focus{border-bottom-color:var(--red)}
.fill-input.correct{border-bottom-color:var(--green);color:var(--green)}
.fill-input.wrong{border-bottom-color:var(--red);color:var(--red)}
.fill-hint{font-size:10px;color:var(--text3);font-style:italic;margin-left:4px}
.fill-correction{font-size:11px;color:var(--green);margin-left:6px;font-weight:500}

/* ── SENTENCE CONSTRUCTION (DRAG) ── */
.sc-item{margin-bottom:20px;padding:16px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)}
.sc-item:last-child{margin-bottom:0}
.sc-translation{font-size:11px;color:var(--text3);font-style:italic;margin-bottom:12px}
.sc-drop-zone{min-height:48px;border:2px dashed var(--border2);border-radius:var(--radius);padding:8px 10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px;background:var(--surface);transition:border-color 0.15s}
.sc-drop-zone.correct{border-color:var(--green);border-style:solid;background:var(--green-light)}
.sc-drop-zone.wrong{border-color:var(--red);border-style:solid}
.sc-tiles{display:flex;flex-wrap:wrap;gap:6px}
.sc-tile{font-family:'Fraunces',serif;font-size:15px;font-weight:500;padding:5px 12px;background:var(--surface);border:1.5px solid var(--border2);border-radius:20px;cursor:grab;user-select:none;transition:all 0.15s;color:var(--text)}
.sc-tile:hover{border-color:var(--red);background:var(--red-light);color:var(--red)}
.sc-tile.placed{background:var(--red);border-color:var(--red);color:#fff;cursor:pointer}
.sc-tile.placed:hover{background:#a83330}
.sc-tile.punct{opacity:0.7;font-style:italic}

/* ── GRAMMAR TABLE ── */
.grammar-explanation{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6;padding:12px 16px;background:var(--surface2);border-radius:var(--radius);border-left:3px solid var(--red)}
.grammar-table{width:100%;border-collapse:collapse;font-size:14px}
.grammar-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:8px 12px;border-bottom:1px solid var(--border);text-align:center;background:var(--surface2)}
.grammar-table th:first-child{text-align:left}
.grammar-table td{padding:6px 8px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
.grammar-table td:first-child{font-size:12px;color:var(--text2);font-style:italic;text-align:left;padding-left:12px;white-space:nowrap}
.grammar-table tr:last-child td{border-bottom:none}
.grammar-input{width:100%;max-width:100px;text-align:center;padding:5px 8px;font-family:'Fraunces',serif;font-size:15px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text)}
.grammar-input:focus{border-color:var(--red);box-shadow:0 0 0 2px var(--red-light)}
.grammar-input.correct{border-color:var(--green);background:var(--green-light);color:var(--green)}
.grammar-input.wrong{border-color:var(--red);background:var(--red-light);color:var(--red)}
.grammar-correction{font-size:11px;color:var(--green);display:block;margin-top:2px}

/* ── TRANSLATION ── */
.translation-item{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;margin-bottom:12px;padding:14px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)}
.translation-item:last-child{margin-bottom:0}
.translation-prompt{font-family:'Fraunces',serif;font-size:15px;color:var(--text);font-style:italic;padding-right:8px;line-height:1.4}
.translation-input{width:100%;padding:8px 12px;font-family:'Fraunces',serif;font-size:15px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text)}
.translation-input:focus{border-color:var(--red);box-shadow:0 0 0 2px var(--red-light)}
.translation-input.correct{border-color:var(--green);background:var(--green-light)}
.translation-input.wrong{border-color:var(--red);background:var(--red-light)}
.translation-correction{font-size:11px;color:var(--green);margin-top:4px;display:block}

/* ── READING ── */
.reading-text{font-family:'Fraunces',serif;font-size:17px;line-height:1.9;color:var(--text);margin-bottom:20px;padding:20px;background:var(--surface2);border-radius:var(--radius);border-left:3px solid var(--red)}
.glossary{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.gloss-item{font-size:11px;padding:3px 10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text2)}
.gloss-da{font-weight:600;color:var(--text)}

/* ── CULTURAL NOTE ── */
.cultural-card{background:linear-gradient(135deg,#fdf6ec,#fef9f0);border:1px solid #e8d5a0;border-radius:var(--radius-lg);padding:24px}
.cultural-flag{font-size:32px;margin-bottom:12px}
.cultural-heading{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--text);margin-bottom:12px}
.cultural-text{font-size:14px;color:var(--text2);line-height:1.75}

/* ── LISTENING PLACEHOLDER ── */
.listening-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:12px;background:var(--surface2);border-radius:var(--radius);border:2px dashed var(--border2)}
.listening-icon{font-size:40px;opacity:0.4}
.listening-label{font-family:'Fraunces',serif;font-size:16px;color:var(--text3)}
.listening-sub{font-size:12px;color:var(--text3);max-width:300px;line-height:1.5}

/* ── UNIT COMPLETE ── */
.complete-screen{max-width:520px;margin:0 auto;padding:60px 20px;text-align:center}
.complete-icon{font-size:56px;margin-bottom:20px}
.complete-title{font-family:'Fraunces',serif;font-size:36px;font-weight:400;font-style:italic;color:var(--text);margin-bottom:8px}
.complete-sub{font-size:14px;color:var(--text2);margin-bottom:32px;line-height:1.6}
.score-breakdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:28px;text-align:left;box-shadow:var(--shadow-sm)}
.score-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.score-row:last-child{border-bottom:none}
.score-label{color:var(--text2)}
.score-val{font-weight:600;font-family:'DM Mono',monospace;font-size:12px}
.score-val.pass{color:var(--green)}
.score-val.fail{color:var(--red)}
.score-overall{padding-top:12px;margin-top:4px;border-top:2px solid var(--border);font-size:15px;font-weight:600}
.complete-actions{display:flex;gap:10px;justify-content:center}

/* ── BUTTONS ── */
.btn{font-family:'DM Sans',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.8px;padding:9px 22px;border-radius:4px;border:none;text-transform:uppercase}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover:not(:disabled){background:#a83330}
.btn-secondary{background:transparent;color:var(--text2);border:1.5px solid var(--border2)}
.btn-secondary:hover:not(:disabled){background:var(--surface2)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover:not(:disabled){background:#235f3e}
.check-bar{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.35s ease both}
@keyframes pop{0%{transform:scale(0.95)}60%{transform:scale(1.03)}100%{transform:scale(1)}}
.pop{animation:pop 0.25s ease both}

/* ── RESPONSIVE ── */
@media(max-width:560px){
  .mc-options{grid-template-columns:1fr}
  .translation-item{grid-template-columns:1fr}
  .matching-grid{gap:6px 10px}
  .vocab-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── UTILITIES ────────────────────────────────────────────────────────────────

// ─── DANISH LANGUAGE CHECKER ──────────────────────────────────────────────────

const DANISH_WORDLIST = new Set([
  "jeg","du","han","hun","det","den","vi","i","de","man",
  "mig","dig","ham","hende","os","dem","sig",
  "min","mit","mine","din","dit","dine","hans","hendes","vores","jeres","deres",
  "en","et","og","eller","men","for","som","at","af","med","til","fra",
  "på","om","under","over","ved","hos","efter","før","mellem","uden","mod",
  "da","når","hvis","fordi","selvom","mens","indtil","siden",
  "der","her","nu","så","meget","lidt","godt","også","bare","jo","nok",
  "hvad","hvem","hvor","hvorfor","hvordan","hvornår","hvilken","hvilket","hvilke",

function buildDict(base) {
  const d = new Set(base);
  base.forEach(w => {
    ["en","et","ene","erne","er","e","r","ede","te","de","t","ere","est","este","s","es","ne","nde"].forEach(sfx => {
      d.add(w + sfx);
    });
    if (w.length > 4 && w[w.length-1] === w[w.length-2]) {
      const stem = w.slice(0,-1);
      ["er","ede","et","ende","e"].forEach(sfx => d.add(stem + sfx));
    }
  });
  return d;
}

const DANISH_DICT = buildDict(DANISH_WORDLIST);

const PRONOUNS = new Set(["jeg","du","han","hun","den","det","vi","i","de","man"]);
const EN_NOUNS = new Set(["far","mor","bror","søster","lærer","elev","ven","veninde","hund","kat","bog","stol","dør","taske","skole","klasse","dag","uge","by","gade","bil","cykel","familie","mand","kvinde","dreng","pige","kæreste","onkel","tante","nabo","chef","sang","ting","blomst","skov","strand","gade","vej","uge","ferie","lejlighed"]);
const ET_NOUNS = new Set(["barn","hus","bord","vindue","hæfte","viskelæder","værelse","køkken","badeværelse","fag","år","land","hotel","fly","tog","museum","bibliotek","supermarked","hospital","problem","spørgsmål","svar","sprog","ord","navn","billede","brev","nummer","brev"]);

function tokeniseText(text) {
  const tokens = [];
  const re = /([\wæøåÆØÅ]+)|([^\wæøåÆØÅ\s]+)/giu;
  let m;
  while ((m = re.exec(text)) !== null) {
    tokens.push({ word: m[0], start: m.index, end: m.index + m[0].length, isWord: !!m[1] });
  }
  return tokens;
}

function checkSpelling(tokens) {
  return tokens.filter(t => {
    if (!t.isWord) return false;
    const w = t.word.toLowerCase();
    if (/^\d+$/.test(w)) return false;
    if (t.word[0] === t.word[0].toUpperCase() && t.start > 0) return false; // skip proper nouns
    return !DANISH_DICT.has(w);
  }).map(t => ({...t, type:"spelling"}));
}

function getSentences(text) {
  return text.split(/(?<=[.!?])\s+/).filter(s => s.trim().length > 0);
}

function checkV2(sentence) {
  const words = sentence.trim().split(/\s+/).map(w => w.toLowerCase().replace(/[,.!?;:]/g,""));
  if (words.length < 3) return null;
  const ADVERB_STARTERS = ["i dag","i morgen","i går","her","der","nu","så","derfor","normalt","altid","aldrig","sommetider","om morgenen","om aftenen","om natten","til sidst","først","derefter","bagefter","alligevel","desuden","faktisk"];
  const lower = sentence.toLowerCase();
  const startsWithAdverb = ADVERB_STARTERS.some(a => lower.startsWith(a));
  if (!startsWithAdverb) return null;
  // Find where the adverb ends and check if next word is a subject pronoun (V2 violation)
  const firstWord = words[0];
  const firstTwo  = words.slice(0,2).join(" ");
  const adverbEnd = ADVERB_STARTERS.find(a => lower.startsWith(a));
  if (!adverbEnd) return null;
  const afterAdverb = lower.slice(adverbEnd.length).trim().split(/\s+/);
  if (afterAdverb.length > 0 && PRONOUNS.has(afterAdverb[0].replace(/[,.!?]/g,""))) {
    return { type:"v2", message:`Word order (V2): After "${adverbEnd}", the verb should come before the subject. E.g. "I dag spiser jeg..." not "I dag jeg spiser..."` };
  }
  return null;
}

function checkArticles(sentence) {
  const warnings = [];
  const words = sentence.toLowerCase().split(/\s+/).map(w => w.replace(/[,.!?;:]/g,""));
  words.forEach((w, i) => {
    if (w !== "en" && w !== "et") return;
    const next = words[i+1];
    if (!next) return;
    const base = next.replace(/(en|et|erne|ene|er|e)$/,"");
    if (w === "en" && ET_NOUNS.has(base)) warnings.push({ type:"article", message:`"${next}" is an et-word — use "et ${next}" not "en ${next}"` });
    if (w === "et" && EN_NOUNS.has(base)) warnings.push({ type:"article", message:`"${next}" is an en-word — use "en ${next}" not "et ${next}"` });
  });
  return warnings;
}

function checkPossessives(sentence) {
  const warnings = [];
  const words = sentence.toLowerCase().split(/\s+/).map(w => w.replace(/[,.!?;:]/g,""));
  const POSS = { "min":"en","mit":"et","mine":"plural","din":"en","dit":"et","dine":"plural" };
  words.forEach((w, i) => {
    const gender = POSS[w];
    if (!gender) return;
    const next = words[i+1];
    if (!next) return;
    const base = next.replace(/(en|et|erne|ene|er|e)$/,"");
    if (gender === "en" && ET_NOUNS.has(base)) {
      const fix = (w==="min")?"mit":"dit";
      warnings.push({ type:"possessive", message:`"${next}" is an et-word — use "${fix} ${next}" not "${w} ${next}"` });
    }
    if (gender === "et" && EN_NOUNS.has(base)) {
      const fix = (w==="mit")?"min":"din";
      warnings.push({ type:"possessive", message:`"${next}" is an en-word — use "${fix} ${next}" not "${w} ${next}"` });
    }
  });
  return warnings;
}

function runDanishChecks(text) {
  const tokens   = tokeniseText(text);
  const spelling = checkSpelling(tokens);
  const sentences = getSentences(text);
  const grammar  = [];
  sentences.forEach(s => {
    const v2 = checkV2(s);
    if (v2) grammar.push(v2);
    checkArticles(s).forEach(e   => grammar.push(e));
    checkPossessives(s).forEach(e => grammar.push(e));
  });
  const wordCount = tokens.filter(t => t.isWord).length;
  const sentenceCount = sentences.length;
  // Score: start at 100, deduct per error
  const totalErrors = spelling.length + grammar.length;
  const errorRate   = wordCount > 0 ? totalErrors / wordCount : 0;
  const score       = Math.max(0, Math.round((1 - errorRate * 3) * 100));
  return { spelling, grammar, tokens, wordCount, sentenceCount, score };
}

function normalise(s) {
  return (s||"").trim().toLowerCase()
    .replace(/æ/g,"ae").replace(/ø/g,"oe").replace(/å/g,"aa")
    .replace(/é|è|ê/g,"e").replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ");
}

function checkAnswer(input, correct, alternatives=[]) {
  const n = normalise(input);
  const all = [correct, ...alternatives].map(normalise);
  return all.some(a => n === a || (n.length > 2 && a === n));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function pct(c, t) { return t > 0 ? Math.round((c/t)*100) : 0; }

// Score badge helper
function ScoreBadge({score, total, submitted}) {
  if (!submitted || total === 0) return null;
  const p = pct(score, total);
  const col = p >= 75 ? "var(--green)" : "var(--red)";
  return (
    <span className="section-score-badge" style={{background: p>=75?"var(--green-light)":"var(--red-light)", color:col, border:`1px solid ${p>=75?"var(--green-border)":"var(--red-border)"}`}}>
      {score}/{total} · {p}%
    </span>
  );
}

function toAudioStem(text) {
  return text.toLowerCase().trim()
    .replace(/[^\wæøå\s\-]/gu, "")
    .replace(/\s+/g, "_")
    .replace(/_+/g, "_")
    .replace(/^_|_$/g, "") || "audio";
}

function playAudio(stem, e) {
  if (e) e.stopPropagation();
  const audio = new Audio(`../audio/da/${stem}.mp3`);
  audio.play().catch(()=>{});
}

function VocabIntro({section}) {
  const [flipped, setFlipped] = React.useState({});
  const [playing, setPlaying] = React.useState(null);

  const handlePlay = (text, i, e) => {
    if (e) e.stopPropagation();
    const stem = toAudioStem(text);
    const audio = new Audio(`../audio/da/${stem}.mp3`);
    setPlaying(i);
    audio.play().catch(()=>{});
    audio.onended = () => setPlaying(null);
  };

  return (
    <div>
      <p className="section-instruction">Click a card to see an example sentence. Press 🔊 to hear the word.</p>
      <div className="vocab-grid">
        {section.words.map((w,i) => (
          <div key={i} className="vocab-card" onClick={()=>setFlipped(f=>({...f,[i]:!f[i]}))} style={{cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"6px"}}>
              <div className="vocab-da">{w.da}</div>
              <button
                onClick={(e)=>handlePlay(w.da, i, e)}
                style={{flexShrink:0,background:"none",border:"none",cursor:"pointer",fontSize:"16px",padding:"0 2px",opacity:playing===i?1:0.5,transition:"opacity 0.15s",lineHeight:1}}
                title="Play pronunciation">
                {playing===i ? "🔊" : "🔈"}
              </button>
            </div>
            <div className="vocab-en">{w.en}</div>
            {flipped[i] && <div className="vocab-example">{w.example}</div>}
            {!flipped[i] && <div style={{fontSize:"10px",color:"var(--text3)",marginTop:"4px"}}>tap for example ↓</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

function Matching({section, onScore}) {
  const pairs = React.useMemo(() => section.pairs, [section.id]);
  const [left]  = React.useState(() => shuffle(pairs.map((p,i)=>({id:i,text:p.da}))));
  const [right] = React.useState(() => shuffle(pairs.map((p,i)=>({id:i,text:p.en}))));
  const [matched, setMatched] = React.useState({});
  const [selL, setSelL] = React.useState(null);
  const [selR, setSelR] = React.useState(null);
  const [wrong, setWrong] = React.useState({l:null,r:null});
  const [attempts, setAttempts] = React.useState(0);
  const [submitted, setSubmitted] = React.useState(false);

  const COLORS = [
    {bg:"rgba(200,64,58,0.08)",border:"#c8403a"},
    {bg:"rgba(45,122,80,0.08)",border:"#2d7a50"},
    {bg:"rgba(60,100,200,0.08)",border:"#3c64c8"},
    {bg:"rgba(160,80,180,0.08)",border:"#a050b4"},
    {bg:"rgba(200,130,20,0.08)",border:"#c88214"},
    {bg:"rgba(20,140,160,0.08)",border:"#148ca0"},
    {bg:"rgba(80,160,80,0.08)",border:"#50a050"},
    {bg:"rgba(160,80,80,0.08)",border:"#a05050"},
  ];

  React.useEffect(()=>{
    if (selL===null || selR===null) return;
    setAttempts(a=>a+1);
    if (selL===selR) {
      const ci = Object.keys(matched).length % COLORS.length;
      const nm = {...matched, [selL]:ci};
      setMatched(nm);
      setSelL(null); setSelR(null);
      if (Object.keys(nm).length === pairs.length) {
        setSubmitted(true);
        const score = Math.round((pairs.length / Math.max(attempts+1, pairs.length)) * pairs.length);
        onScore(Math.min(pairs.length, score), pairs.length);
      }
    } else {
      setWrong({l:selL,r:selR});
      setTimeout(()=>{setWrong({l:null,r:null});setSelL(null);setSelR(null);},600);
    }
  },[selL,selR]);

  const mc = Object.keys(matched).length;
  const tileStyle = (id, side) => {
    const isM = matched[id]!==undefined;
    const col = isM ? COLORS[matched[id]] : null;
    const isSel = side==="l" ? selL===id : selR===id;
    const isW = side==="l" ? wrong.l===id : wrong.r===id;
    return {
      borderColor: isM?col.border : isW?"var(--red)" : isSel?"var(--red)" : "var(--border2)",
      background: isM?col.bg : isW?"var(--red-light)" : isSel?"var(--red-light)" : "var(--surface)",
      color: isM?col.border : isW?"var(--red)" : isSel?"var(--red)" : "var(--text)",
      opacity: isM?0.5:1, textDecoration:isM?"line-through":"none",
      fontWeight: isSel||isM?"600":"400"
    };
  };

  return (
    <div>
      <p className="section-instruction">{section.instruction}</p>
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}>
        <div style={{flex:1,height:"3px",background:"var(--surface2)",borderRadius:"2px",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${(mc/pairs.length)*100}%`,background:"var(--red)",transition:"width 0.4s"}}/>
        </div>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:"var(--text3)",whiteSpace:"nowrap"}}>{mc}/{pairs.length}</span>
      </div>
      {submitted && (
        <div className="pop" style={{padding:"12px 16px",background:"var(--green-light)",border:"1px solid var(--green-border)",borderRadius:"var(--radius)",marginBottom:"14px",textAlign:"center"}}>
          <span style={{fontFamily:"'Fraunces',serif",fontSize:"16px",color:"var(--green)",fontWeight:"600"}}>Alle par matchet! ✓</span>
        </div>
      )}
      <div className="matching-grid">

// ─── SENTENCE CONSTRUCTION ────────────────────────────────────────────────────

function SentenceConstruction({section, onScore}) {
  const initItems = React.useMemo(()=>section.items.map(it=>({
    ...it, shuffled: shuffle(it.words), placed: []
  })),[section.id]);

  const [items, setItems] = React.useState(initItems);
  const [submitted, setSubmitted] = React.useState(false);

  const place = (itemIdx, word, wordIdx) => {
    if (submitted) return;
    setItems(prev => prev.map((it,i) => {
      if (i!==itemIdx) return it;
      const newShuffled = it.shuffled.filter((_,j)=>j!==wordIdx);
      return {...it, shuffled:newShuffled, placed:[...it.placed, word]};
    }));
  };

  const unplace = (itemIdx, word, placedIdx) => {
    if (submitted) return;
    setItems(prev => prev.map((it,i) => {
      if (i!==itemIdx) return it;
      const newPlaced = it.placed.filter((_,j)=>j!==placedIdx);
      return {...it, shuffled:[...it.shuffled, word], placed:newPlaced};
    }));
  };

  const submit = () => {
    const correct = items.filter(it => it.placed.join(" ")===it.answer.join(" ")).length;
    setSubmitted(true);
    onScore(correct, items.length);
  };

  const reset = () => { setItems(initItems.map(it=>({...it,shuffled:shuffle(it.words),placed:[]}))); setSubmitted(false); };

  return (
    <div>
      <p className="section-instruction">{section.instruction}</p>
      {items.map((item,idx) => {
        const isCorrect = submitted && item.placed.join(" ")===item.answer.join(" ");
        const isWrong = submitted && !isCorrect;
        return (
          <div key={idx} className="sc-item">
            <div className="sc-translation">{item.translation}</div>
            <div className={`sc-drop-zone${isCorrect?" correct":isWrong?" wrong":""}`}>
              {item.placed.length===0 && <span style={{fontSize:"12px",color:"var(--text3)",fontStyle:"italic"}}>Drop words here…</span>}
              {item.placed.map((w,wi)=>(
                <span key={wi} className="sc-tile placed" onClick={()=>unplace(idx,w,wi)}>{w}</span>
              ))}
            </div>
            {submitted && isWrong && (
              <div style={{fontSize:"11px",color:"var(--green)",marginBottom:"8px"}}>
                ✓ {item.answer.join(" ")}
              </div>
            )}
            <div className="sc-tiles">
              {item.shuffled.map((w,wi)=>(
                <span key={wi} className={`sc-tile${/^[.,?!;:]$/.test(w)?" punct":""}`}
                  onClick={()=>place(idx,w,wi)}>{w}</span>
              ))}
            </div>
          </div>
        );
      })}
      <div className="check-bar">
        {submitted
          ? <button className="btn btn-secondary" onClick={reset}>Try Again</button>
          : <button className="btn btn-primary" disabled={items.some(it=>it.placed.length===0)} onClick={submit}>Check</button>
        }
      </div>
    </div>
  );
}

// ─── GRAMMAR TABLE ────────────────────────────────────────────────────────────

function GrammarTable({section, onScore}) {
  const totalCells = section.rows.reduce((s,r)=>s+r.answers.length,0);
  const [vals, setVals] = React.useState({});
  const [submitted, setSubmitted] = React.useState(false);

  const submit = () => {
    let correct = 0;
    section.rows.forEach((row,ri) => row.answers.forEach((ans,ci) => {
      if (checkAnswer(vals[`${ri}-${ci}`]||"", ans)) correct++;
    }));
    setSubmitted(true);
    onScore(correct, totalCells);
  };

  const reveal = () => {
    const nv = {};
    section.rows.forEach((row,ri) => row.answers.forEach((ans,ci) => { nv[`${ri}-${ci}`]=ans; }));
    setVals(nv); setSubmitted(true); onScore(0, totalCells);
  };

  const reset = () => { setVals({}); setSubmitted(false); };

  return (
    <div>
      {section.explanation && <div className="grammar-explanation">{section.explanation}</div>}
      <div style={{overflowX:"auto"}}>
        <table className="grammar-table">
          <thead>
            <tr>{section.headers.map((h,i)=><th key={i}>{h}</th>)}</tr>
          </thead>
          <tbody>
            {section.rows.map((row,ri)=>(
              <tr key={ri}>
                <td>{row.label}</td>
                {row.answers.map((ans,ci)=>{
                  const key=`${ri}-${ci}`;
                  const val=vals[key]||"";
                  const ok=submitted?checkAnswer(val,ans):null;
                  return (
                    <td key={ci}>
                      <input className={`grammar-input${submitted?(ok?" correct":" wrong"):""}`}
                        value={val} disabled={submitted}
                        onChange={e=>setVals(v=>({...v,[key]:e.target.value}))}
                        onKeyDown={e=>{if(e.key==="Enter"&&!submitted)submit();}}
                      />
                      {submitted&&!ok&&<span className="grammar-correction">{ans}</span>}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="check-bar">
        {submitted
          ? <button className="btn btn-secondary" onClick={reset}>Try Again</button>
          : <>
              <button className="btn btn-secondary" onClick={reveal}>Reveal</button>
              <button className="btn btn-primary" disabled={Object.keys(vals).length===0} onClick={submit}>Check</button>
            </>
        }
      </div>
    </div>
  );
}

// ─── FREE WRITING ────────────────────────────────────────────────────────────

function FreeWriting({section, onScore}) {
  const [text, setText]     = React.useState("");
  const [result, setResult] = React.useState(null);
  const MIN_WORDS            = section.min_words || 20;
  const PASS_PCT             = 85;

  const words = text.trim().split(/\s+/).filter(Boolean);
  const wordCount = words.length;
  const canSubmit = wordCount >= MIN_WORDS && !result;

  const check = () => {
    const r = runDanishChecks(text);
    const passed = r.score >= PASS_PCT;
    onScore(passed ? 1 : 0, 1);
    setResult({...r, passed});
  };

  const reset = () => { setText(""); setResult(null); };

  // Render annotated text with spelling errors highlighted
  const renderHighlighted = () => {
    if (!result) return null;
    const errMap = new Map(result.spelling.map(e => [e.start, e]));
    return result.tokens.map((t, i) => {
      if (!t.isWord) return <span key={i}>{t.word}</span>;
      const err = errMap.get(t.start);
      if (err) {
        return (
          <mark key={i} title="Unknown word — check spelling"
            style={{background:"rgba(200,64,58,0.15)",borderBottom:"2px solid #c8403a",
                    borderRadius:"2px",cursor:"help",padding:"0 1px"}}>
            {t.word}
          </mark>
        );
      }
      return <span key={i}>{t.word}</span>;
    }).reduce((acc, el, i) => {
      if (i === 0) return [el];
      return [...acc, <span key={"sp"+i}> </span>, el];
    }, []);
  };

  return (
    <div>
      {/* Prompt */}
      <div style={{fontSize:"15px",fontWeight:"500",color:"var(--text)",lineHeight:"1.6",marginBottom:"10px"}}>
        {section.prompt}
      </div>
      {section.guidance && (
        <div style={{fontSize:"12px",color:"var(--text3)",fontStyle:"italic",marginBottom:"12px",
                     padding:"8px 12px",background:"var(--surface2)",borderRadius:"4px",
                     borderLeft:"2px solid var(--border2)"}}>
          {section.guidance}
        </div>
      )}

      {/* Input or annotated result */}
      {!result ? (
        <textarea value={text} onChange={e=>setText(e.target.value)}
          placeholder={`Write your answer in Danish. Aim for at least ${MIN_WORDS} words.`}
          style={{width:"100%",minHeight:"180px",padding:"12px 14px",fontSize:"15px",
                  lineHeight:"1.8",fontFamily:"inherit",border:"1px solid var(--border)",
                  borderRadius:"6px",background:"var(--surface)",color:"var(--text)",
                  resize:"vertical",outline:"none"}}/>
      ) : (
        <div style={{minHeight:"180px",padding:"12px 14px",fontSize:"15px",lineHeight:"1.8",
                     border:"1px solid var(--border)",borderRadius:"6px",background:"var(--surface2)",
                     color:"var(--text)",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
          {renderHighlighted()}
        </div>
      )}

      {/* Word count + action bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                   marginTop:"8px",flexWrap:"wrap",gap:"8px"}}>
        <span style={{fontSize:"11px",fontFamily:"'DM Mono',monospace",
                      color:wordCount>=MIN_WORDS?"var(--green)":"var(--text3)"}}>
          {wordCount} / {MIN_WORDS} words minimum
        </span>
        {!result ? (
          <button className="btn btn-primary" disabled={!canSubmit} onClick={check}
            style={{fontSize:"13px",padding:"7px 20px",opacity:canSubmit?1:0.5}}>
            Check My Writing
          </button>
        ) : (
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:"13px",padding:"5px 16px",
                         borderRadius:"20px",
                         background:result.passed?"rgba(45,122,80,0.1)":"rgba(200,64,58,0.08)",
                         color:result.passed?"var(--green)":"#c8403a",
                         border:`1px solid ${result.passed?"var(--green)":"#c8403a"}`}}>
              {result.passed ? "✓ Pass" : "✗ Not yet"} · {result.score}%
            </div>
            <button className="btn btn-secondary" onClick={reset}
              style={{fontSize:"12px",padding:"5px 12px"}}>Edit & Retry</button>
          </div>
        )}
      </div>

      {/* Feedback panel */}
      {result && (
        <div style={{marginTop:"16px",display:"flex",flexDirection:"column",gap:"8px"}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",letterSpacing:"1px",color:"var(--text3)"}}>
            {result.wordCount} words · {result.sentenceCount} sentences · {result.spelling.length} unknown word{result.spelling.length!==1?"s":""} · {result.grammar.length} grammar note{result.grammar.length!==1?"s":""}
          </div>

          {result.spelling.length > 0 && (
            <div style={{padding:"10px 14px",background:"rgba(200,64,58,0.04)",
                         border:"1px solid rgba(200,64,58,0.2)",borderRadius:"6px"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:"9px",letterSpacing:"1px",
                           color:"#c8403a",marginBottom:"6px"}}>UNKNOWN WORDS</div>
              {result.spelling.map((e,i) => (
                <div key={i} style={{fontSize:"12px",color:"var(--text2)",marginBottom:"2px"}}>
                  · <span style={{fontStyle:"italic",color:"#c8403a"}}>{e.word}</span> — not in dictionary (check spelling)
                </div>
              ))}
            </div>
          )}

          {result.grammar.length > 0 && (
            <div style={{padding:"10px 14px",background:"rgba(180,120,10,0.05)",
                         border:"1px solid rgba(180,120,10,0.25)",borderRadius:"6px"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:"9px",letterSpacing:"1px",
                           color:"var(--gold)",marginBottom:"6px"}}>GRAMMAR NOTES</div>
              {result.grammar.map((e,i) => (
                <div key={i} style={{fontSize:"12px",color:"var(--text2)",marginBottom:"4px",lineHeight:"1.5"}}>
                  · {e.message}
                </div>
              ))}
            </div>
          )}

          {result.passed && result.spelling.length===0 && result.grammar.length===0 && (
            <div style={{fontSize:"13px",color:"var(--green)",fontStyle:"italic"}}>
              No errors detected — excellent work!
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── UNIT ASSESSMENT ─────────────────────────────────────────────────────────

function UnitAssessment({section, onPass}) {
  const [answers, setAnswers] = React.useState({});
  const [submitted, setSubmitted] = React.useState(false);
  const [score, setScore]     = React.useState(null);
  const THRESHOLD = 85;

  const questions = section.questions || [];

  const submit = () => {
    if (Object.keys(answers).length < questions.length) return;
    const correct = questions.filter((q,i) => {
      const given = (answers[i]||"").trim().toLowerCase();
      const ans   = (q.answer||"").trim().toLowerCase();
      const alts  = (q.alternatives||[]).map(a=>a.trim().toLowerCase());
      return given===ans || alts.includes(given);
    }).length;
    const pctScore = Math.round((correct/questions.length)*100);
    setScore({correct, total:questions.length, pct:pctScore});
    setSubmitted(true);
    if (pctScore >= THRESHOLD) onPass(correct, questions.length);
  };

  const reset = () => { setAnswers({}); setSubmitted(false); setScore(null); };

  const passed = score && score.pct >= THRESHOLD;

  return (
    <div>
      <div style={{background:"rgba(60,100,200,0.06)",border:"1px solid rgba(60,100,200,0.2)",borderRadius:"8px",padding:"14px 18px",marginBottom:"20px"}}>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",letterSpacing:"1.5px",color:"var(--blue)",marginBottom:"4px"}}>ENHEDSPRØVE — UNIT ASSESSMENT</div>
        <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:"1.6"}}>{section.instruction || "Answer all questions. You will not see which answers are correct until you submit. You need 85% to unlock the next unit."}</div>
      </div>

      {submitted && score && (
        <div style={{background:passed?"rgba(45,122,80,0.08)":"rgba(200,64,58,0.08)",border:`1px solid ${passed?"var(--green)":"#c8403a"}`,borderRadius:"8px",padding:"16px 20px",marginBottom:"24px",textAlign:"center"}}>
          <div style={{fontSize:"28px",marginBottom:"6px"}}>{passed?"🎉":"📚"}</div>
          <div style={{fontFamily:"'Fraunces',serif",fontSize:"22px",color:passed?"var(--green)":"#c8403a",marginBottom:"4px"}}>{passed?"Bestået!":"Ikke bestået"}</div>
          <div style={{fontSize:"14px",color:"var(--text2)"}}>{score.correct}/{score.total} correct · {score.pct}% {passed?`— next unit unlocked`:`— need ${THRESHOLD}%`}</div>
        </div>
      )}

      {questions.map((q,qi)=>{
        const isCorrect = submitted ? (
          (answers[qi]||"").trim().toLowerCase() === (q.answer||"").trim().toLowerCase() ||
          (q.alternatives||[]).map(a=>a.toLowerCase()).includes((answers[qi]||"").trim().toLowerCase())
        ) : null;

        return (
          <div key={qi} style={{marginBottom:"20px",padding:"16px 18px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"6px",borderLeft: submitted?(isCorrect?"3px solid var(--green)":"3px solid #c8403a"):"3px solid var(--border)"}}>
            <div style={{fontSize:"14px",fontWeight:"500",color:"var(--text)",marginBottom:"10px"}}>{qi+1}. {q.prompt}</div>
            {q.options ? (
              <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                {q.options.map((opt,oi)=>{
                  let bg = "var(--surface2)";
                  let border = "var(--border)";
                  let color = "var(--text)";
                  if (!submitted && answers[qi]===opt) { bg="rgba(60,100,200,0.1)"; border="var(--blue)"; color="var(--blue)"; }
                  if (submitted && opt===q.answer) { bg="rgba(45,122,80,0.1)"; border="var(--green)"; color="var(--green)"; }
                  if (submitted && answers[qi]===opt && opt!==q.answer) { bg="rgba(200,64,58,0.1)"; border="#c8403a"; color="#c8403a"; }
                  return (
                    <button key={oi} disabled={submitted}
                      onClick={()=>!submitted&&setAnswers(a=>({...a,[qi]:opt}))}
                      style={{textAlign:"left",padding:"8px 14px",borderRadius:"4px",border:`1px solid ${border}`,background:bg,color,cursor:submitted?"default":"pointer",fontSize:"14px",transition:"all 0.15s"}}>
                      {opt}
                    </button>
                  );
                })}
              </div>
            ) : (
              <div>
                <input
                  value={answers[qi]||""} disabled={submitted}
                  onChange={e=>setAnswers(a=>({...a,[qi]:e.target.value}))}
                  placeholder="Type your answer..."
                  style={{width:"100%",padding:"8px 12px",border:`1px solid ${submitted?(isCorrect?"var(--green)":"#c8403a"):"var(--border)"}`,borderRadius:"4px",fontSize:"14px",background:submitted?(isCorrect?"rgba(45,122,80,0.05)":"rgba(200,64,58,0.05)"):"var(--surface)",color:"var(--text)",outline:"none"}}
                />
                {submitted && !isCorrect && (
                  <div style={{marginTop:"6px",fontSize:"12px",color:"var(--green)"}}>✓ {q.answer}</div>
                )}
              </div>
            )}
          </div>
        );
      })}

      <div className="check-bar">
        {submitted
          ? <button className="btn btn-secondary" onClick={reset}>Prøv igen — Try Again</button>
          : <button className="btn btn-primary"
              disabled={Object.keys(answers).length < questions.length}
              onClick={submit}>
              Aflevér — Submit ({Object.keys(answers).length}/{questions.length})
            </button>
        }
      </div>
    </div>
  );
}

// ─── UNIT VIEW ────────────────────────────────────────────────────────────────

function UnitView({unit, courseUnit, savedScores, onBack, onComplete, onSectionScore, userId}) {
  const [activeSection, setActiveSection] = React.useState(unit.sections[0].id);
  const [scores, setScores] = React.useState(savedScores||{});
  const [showComplete, setShowComplete] = React.useState(false);

  const scoredSections = unit.sections.filter(s=>unit.completion.counted_sections.includes(s.id));
  const totalPossible = scoredSections.reduce((sum,s) => {
    const sc = scores[s.id];
    return sum + (sc ? sc.total : 0);
  }, 0);
  const totalCorrect = scoredSections.reduce((sum,s) => {
    const sc = scores[s.id];
    return sum + (sc ? sc.correct : 0);
  }, 0);
  const attempted = scoredSections.filter(s=>scores[s.id]).length;
  const overallPct = totalPossible > 0 ? pct(totalCorrect, totalPossible) : 0;
  const canComplete = attempted >= scoredSections.length;
  const assessmentSection = unit.sections.find(s=>s.type==="unit_assessment");
  const assessmentScore = assessmentSection ? scores[assessmentSection.id] : null;
  const assessmentPassed = assessmentScore ? Math.round((assessmentScore.correct/assessmentScore.total)*100) >= 85 : false;
  const passed = assessmentSection ? assessmentPassed : overallPct >= unit.completion.threshold;

  const handleScore = (sectionId, correct, total) => {
    setScores(s=>({...s,[sectionId]:{correct,total}}));
    // Persist immediately in background
    if (onSectionScore && unit.id) {
      onSectionScore(unit.id, sectionId, correct, total);
    }
  };

  const activeSec = unit.sections.find(s=>s.id===activeSection);

  if (showComplete) {
    return (
      <div className="unit-container">
        <div className="complete-screen fade-up">
          <div className="complete-icon">{passed?"🎉":"📚"}</div>
          <div className="complete-title">{passed?"Godt klaret!":"Prøv igen!"}</div>
          <div className="complete-sub">
            {passed
              ? courseUnit?.isAssessment
                ? `Module assessment passed — next module unlocked.`
                : `Unit assessment passed — next unit unlocked.`
              : courseUnit?.isAssessment
                ? `You need 85% to pass the module assessment. Keep practising.`
                : assessmentSection
                  ? `You need 85% on the unit assessment to unlock the next unit. Try again.`
                  : `You scored ${overallPct}% — the threshold is ${unit.completion.threshold}%. Review and try again.`
            }
          </div>
          <div className="score-breakdown">
            {scoredSections.map(s=>{
              const sc=scores[s.id];
              const p=sc?pct(sc.correct,sc.total):0;
              return (
                <div key={s.id} className="score-row">
                  <span className="score-label">{TYPE_LABELS[s.type]||s.type}</span>
                  <span className={`score-val ${p>=unit.completion.threshold?"pass":"fail"}`}>{sc?`${sc.correct}/${sc.total} · ${p}%`:"—"}</span>
                </div>
              );
            })}
            <div className="score-row score-overall">
              <span>Overall</span>
              <span className={`score-val ${passed?"pass":"fail"}`}>{overallPct}%</span>
            </div>
          </div>
          <div className="complete-actions">
            <button className="btn btn-secondary" onClick={()=>setShowComplete(false)}>Review Unit</button>
            {passed && <button className="btn btn-success" onClick={()=>onComplete(unit.id, scores)}>Next Unit →</button>}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="unit-container">
      <div className="unit-header">
        <div className="unit-header-meta">
          <span className="unit-header-module">Modul {courseUnit?.module || 1}</span>
          <span className="unit-header-sep">·</span>
          <span className="unit-header-module">Enhed {courseUnit?.week || 1}</span>
          <span className="unit-header-cefr">A1</span>
        </div>
        <h1 className="unit-title-big">{unit.title}</h1>
        <p className="unit-theme-big">{unit.theme}</p>
        <div className="unit-progress-bar">
          <div className="unit-progress-fill" style={{width:`${(attempted/scoredSections.length)*100}%`}}/>
        </div>
        <div className="unit-progress-label">{attempted}/{scoredSections.length} sections attempted{totalPossible>0?` · ${overallPct}% overall`:""}</div>
      </div>

      <div className="section-tabs">
        {unit.sections.map(s=>{
          const sc=scores[s.id];
          const isAssessmentTab=s.type==="unit_assessment";
          const isScored=unit.completion.counted_sections.includes(s.id);
          const isDone=isScored&&sc;
          const assessmentPassed=isAssessmentTab&&sc&&sc.correct/sc.total>=0.85;
          let cls="section-tab";
          if(s.id===activeSection)cls+=" active";
          if(isDone&&!isAssessmentTab)cls+=" complete";
          if(assessmentPassed)cls+=" complete";
          return (
            <button key={s.id} className={cls}
              onClick={()=>setActiveSection(s.id)}
              style={isAssessmentTab&&!assessmentPassed?{borderColor:"var(--blue)",color:s.id===activeSection?"#fff":"var(--blue)",background:s.id===activeSection?"var(--blue)":"transparent"}:{}}>
              {assessmentPassed?"✓ ":isAssessmentTab?"📋 ":isDone?"✓ ":""}{TYPE_LABELS[s.type]||s.type}
            </button>
          );
        })}
      </div>

      {activeSec && <SectionRenderer key={activeSec.id} section={activeSec} onScore={handleScore} scores={scores}/>}

      <div style={{display:"flex",justifyContent:"space-between",marginTop:"24px",flexWrap:"wrap",gap:"10px"}}>
        <button className="btn btn-secondary" onClick={onBack}>← Back to Course</button>
        {(canComplete || assessmentScore) && (
          <button className={`btn ${passed?"btn-success":"btn-secondary"}`} onClick={()=>setShowComplete(true)}>
            {passed?"Complete Unit ✓":"See Results"}
          </button>
        )}
      </div>
    </div>
  );
}

// ─── MODULE MAP ───────────────────────────────────────────────────────────────

function ModuleMap({course, progress, onSelectUnit}) {
  const [openModules, setOpenModules] = React.useState({1:true});

  const toggleModule = (id) => setOpenModules(o=>({...o,[id]:!o[id]}));

  const getUnitStatus = (unitId, unlocked) => {
    if (progress.completed?.includes(unitId)) return "complete";
    if (progress.current===unitId) return "in_progress";
    if (unlocked) return "available";
    return "locked";
  };

  const isUnitUnlocked = (moduleIdx, unitIdx) => {
    if (progress.isModerator) return true;
    const mod = course.modules[moduleIdx];
    // Nordic-only module requires explicit access grant
    if (mod.nordic_only) return progress.nordicAccess === true;
    // First unit of first module always unlocked
    if (unitIdx===0 && moduleIdx===0) return true;
    // Assessment (last unit of any module) always unlocked
    if (unitIdx===mod.weeks.length-1) return true;
    // First unit of subsequent modules: unlocked when previous module's assessment is complete
    if (unitIdx===0) {
      const prevMod = course.modules[moduleIdx-1];
      const assessmentId = prevMod.weeks[prevMod.weeks.length-1].id;
      return progress.completed?.includes(assessmentId);
    }
    // All other units: unlock sequentially
    return progress.completed?.includes(mod.weeks[unitIdx-1].id);
  };

  return (
    <div className="map-container">
      <div className="map-hero fade-up">
        <h1>Dansk</h1>
        <p>A CEFR-aligned course from complete beginner to B1+. Work through each module at your own pace — units unlock as you progress.</p>
      </div>

      {course.modules.map((mod, mi) => {
        const isOpen = openModules[mod.id];
        const completedInMod = mod.weeks.filter(w=>progress.completed?.includes(w.id)).length;
        const modPct = Math.round((completedInMod/mod.weeks.length)*100);
        return (
          <div key={mod.id} className="module-block fade-up" style={{animationDelay:`${mi*0.05}s`}}>
            <div className="module-header" onClick={()=>toggleModule(mod.id)}>
              <div className="module-badge" style={{background:mod.color}}>
                <span className="module-badge-inner">{mod.cefr}</span>
              </div>
              <div className="module-info">
                <div className="module-title">{mod.title} — {mod.subtitle}</div>
                <div className="module-sub">
                  {mod.nordic_only && !progress.nordicAccess && !progress.isModerator
                    ? "Tildeles manuelt af læreren · Kun for nordiske modersmålstalende"
                    : `${completedInMod}/${mod.weeks.length} units complete${completedInMod>0?` · ${modPct}%`:""}`
                  }
                </div>
              </div>
              <span className="module-cefr" style={{borderColor:mod.color,color:mod.color}}>{mod.cefr}</span>
              <span className={`module-chevron${isOpen?" open":""}`}>▾</span>
            </div>

            {isOpen && (
              <div className="unit-grid">
                {mod.weeks.map((unit, ui) => {
                  const unlocked = isUnitUnlocked(mi, ui);
                  const status = getUnitStatus(unit.id, unlocked);
                  const statusColor = status==="complete"?"var(--green)":status==="in_progress"?"var(--gold)":status==="available"?"var(--gold)":"var(--border2)";
                  const statusLabel = status==="complete"?"Complete":status==="in_progress"?"In Progress":status==="available"?"Available":"Locked";
                  return (
                    <div key={unit.id}
                      className={`unit-card ${status} ${!unlocked?"locked":""}`}
                      onClick={()=>unlocked&&onSelectUnit(unit.id)}>
                      {!unlocked && <span className="lock-icon">🔒</span>}
                      <div className="unit-week">
                        Enhed {unit.week}
                        {ui===mod.weeks.length-1 && <span style={{marginLeft:"6px",fontSize:"9px",letterSpacing:"1px",padding:"1px 5px",borderRadius:"8px",background:"rgba(60,100,200,0.1)",color:"var(--blue)",border:"1px solid var(--blue)",verticalAlign:"middle"}}>PRØVE</span>}
                      </div>
                      <div className="unit-title">{unit.title}</div>
                      <div className="unit-theme">{unit.theme}</div>
                      <div className="unit-status">
                        <div className="unit-status-dot" style={{background:statusColor}}/>
                        <span className="unit-status-label" style={{color:statusColor}}>{statusLabel}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}

      <div className="module-block fade-up" style={{animationDelay:"0.3s",opacity:0.6}}>
        <div className="module-header" style={{cursor:"default"}}>
          <div className="module-badge" style={{background:"#78716c"}}>
            <span className="module-badge-inner" style={{fontSize:"11px"}}>N</span>
          </div>
          <div className="module-info">
            <div className="module-title">Modul N — Nordic Track</div>
            <div className="module-sub">For Norwegian & Swedish L1 speakers · Contrastive linguistics overlay</div>
          </div>
          <span className="module-cefr" style={{borderColor:"#78716c",color:"#78716c"}}>N</span>
        </div>
      </div>
    </div>
  );
}

        </div>
      )}

      {error && (
        <div style={{maxWidth:"500px",margin:"60px auto",padding:"24px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",textAlign:"center"}}>
          <div style={{fontFamily:"'Fraunces',serif",fontSize:"18px",color:"var(--red)",marginBottom:"8px"}}>Fejl</div>
          <div style={{fontSize:"13px",color:"var(--text2)",marginBottom:"16px",fontFamily:"'DM Mono',monospace"}}>{error}</div>
          <div style={{fontSize:"12px",color:"var(--text3)"}}>Make sure you are serving from a local server (<code>npx serve .</code>) or Netlify, and that <code>course.json</code> and unit JSON files are in the same folder.</div>
        </div>
      )}

      {!loading && !error && !activeUnit && course && (
        <ModuleMap course={course} progress={progress} onSelectUnit={selectUnit}/>
      )}

      {!loading && !error && activeUnit && unitData && (
        <UnitView unit={unitData} courseUnit={getCourseUnit(activeUnit)} savedScores={unitData._savedScores||{}} onBack={()=>{setActiveUnit(null);setUnitData(null);}} onComplete={completeUnit} onSectionScore={saveSection} userId={user?.id}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
