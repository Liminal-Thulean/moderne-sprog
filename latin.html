// ─── HELPERS ──────────────────────────────────────────────────────────────────

function normalize(str) {
  return str.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[āa]/g,"a").replace(/[ēe]/g,"e").replace(/[īi]/g,"i")
    .replace(/[ōo]/g,"o").replace(/[ūu]/g,"u");
}

function checkAnswer(input, answer) {
  if (!input.trim()) return "empty";
  return normalize(input) === normalize(answer) ? "correct" : "wrong";
}

function getAnswers(category, word) {
  const patterns = category.type === "conjugation" ? CONJUGATION_PATTERNS : DECLENSION_PATTERNS;
  const pattern = patterns[category.pattern];
  return pattern.rows.map((row) =>
    row.suffixes.map((suf) => suf === null ? word.nom_sg : word.stem + suf)
  );
}

// ─── MATCHING MODE ────────────────────────────────────────────────────────────

// Build a flat pool of all {latin, english} pairs from all CATEGORIES
function buildMatchPool() {
  const pool = [];
  CATEGORIES.forEach(cat => {
    cat.words.forEach(w => {
      // For irregular verbs with multiple tables, just use the lemma
      const latin = w.lemma;
      const english = w.meaning;
      if (latin && english) pool.push({ latin, english, catId: cat.id });
    });
  });
  return pool;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const PAIRS_PER_ROUND = 8;

// Pastel pair colors — one per matched pair so lines/highlights share a color
const PAIR_COLORS = [
  { light: "#fef3c7", border: "#d97706", text: "#92400e" },
  { light: "#d1fae5", border: "#059669", text: "#065f46" },
  { light: "#dbeafe", border: "#2563eb", text: "#1e3a8a" },
  { light: "#fce7f3", border: "#db2777", text: "#831843" },
  { light: "#ede9fe", border: "#7c3aed", text: "#4c1d95" },
  { light: "#ffedd5", border: "#ea580c", text: "#7c2d12" },
  { light: "#cffafe", border: "#0891b2", text: "#164e63" },
  { light: "#dcfce7", border: "#16a34a", text: "#14532d" },
];

function MatchingMode() {
  const allPairs = React.useMemo(() => buildMatchPool(), []);

  const [round, setRound] = React.useState(0);
  const [roundPairs, setRoundPairs] = React.useState([]);
  const [leftItems, setLeftItems] = React.useState([]);   // shuffled latin
  const [rightItems, setRightItems] = React.useState([]); // shuffled english
  const [selectedLeft, setSelectedLeft] = React.useState(null);
  const [selectedRight, setSelectedRight] = React.useState(null);
  const [matched, setMatched] = React.useState({}); // id -> colorIdx
  const [wrong, setWrong] = React.useState({ left: null, right: null });
  const [roundDone, setRoundDone] = React.useState(false);
  const [totalCorrect, setTotalCorrect] = React.useState(0);
  const [totalAttempts, setTotalAttempts] = React.useState(0);

  const startRound = React.useCallback((roundNum) => {
    const start = (roundNum * PAIRS_PER_ROUND) % allPairs.length;
    // slice cyclically
    let slice = [];
    for (let i = 0; i < PAIRS_PER_ROUND; i++) {
      slice.push(allPairs[(start + i) % allPairs.length]);
    }
    // give each pair a unique id for this round
    const pairs = slice.map((p, i) => ({ ...p, id: i }));
    setRoundPairs(pairs);
    setLeftItems(shuffle(pairs.map(p => ({ id: p.id, text: p.latin }))));
    setRightItems(shuffle(pairs.map(p => ({ id: p.id, text: p.english }))));
    setMatched({});
    setSelectedLeft(null);
    setSelectedRight(null);
    setWrong({ left: null, right: null });
    setRoundDone(false);
  }, [allPairs]);

  React.useEffect(() => { startRound(0); }, []);

  // When both sides selected, check match
  React.useEffect(() => {
    if (selectedLeft === null || selectedRight === null) return;
    setTotalAttempts(a => a + 1);
    if (selectedLeft === selectedRight) {
      // correct
      const colorIdx = Object.keys(matched).length % PAIR_COLORS.length;
      setMatched(m => ({ ...m, [selectedLeft]: colorIdx }));
      setTotalCorrect(c => c + 1);
      setSelectedLeft(null);
      setSelectedRight(null);
      // check if round complete
      setTimeout(() => {
        setMatched(m => {
          if (Object.keys(m).length === PAIRS_PER_ROUND) setRoundDone(true);
          return m;
        });
      }, 300);
    } else {
      // wrong — flash red briefly
      setWrong({ left: selectedLeft, right: selectedRight });
      setTimeout(() => {
        setWrong({ left: null, right: null });
        setSelectedLeft(null);
        setSelectedRight(null);
      }, 700);
    }
  }, [selectedLeft, selectedRight]);

  const handleLeft = (id) => {
    if (matched[id] !== undefined) return;
    if (wrong.left !== null) return;
    setSelectedLeft(id);
  };

  const handleRight = (id) => {
    if (matched[id] !== undefined) return;
    if (wrong.left !== null) return;
    setSelectedRight(id);
  };

  const nextRound = () => {
    setRound(r => { const next = r + 1; startRound(next); return next; });
  };

  const matchedCount = Object.keys(matched).length;
  const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : null;

  const itemStyle = (id, side) => {
    const isMatched = matched[id] !== undefined;
    const colorIdx = isMatched ? matched[id] : null;
    const c = colorIdx !== null ? PAIR_COLORS[colorIdx] : null;
    const isSelected = side === "left" ? selectedLeft === id : selectedRight === id;
    const isWrong = side === "left" ? wrong.left === id : wrong.right === id;

    return {
      padding: "10px 16px",
      border: "1.5px solid",
      borderColor: isMatched ? c.border
        : isWrong ? "#9b2335"
        : isSelected ? "#b8973e"
        : "#d4bc84",
      borderRadius: "4px",
      background: isMatched ? c.light
        : isWrong ? "rgba(155,35,53,0.08)"
        : isSelected ? "rgba(184,151,62,0.12)"
        : "#fffdf6",
      color: isMatched ? c.text
        : isWrong ? "#9b2335"
        : "#2c1f0e",
      cursor: isMatched ? "default" : "pointer",
      fontFamily: side === "left" ? "'EB Garamond',serif" : "'EB Garamond',serif",
      fontSize: "15px",
      transition: "all 0.15s",
      textAlign: "center",
      userSelect: "none",
      opacity: isMatched ? 0.75 : 1,
      textDecoration: isMatched ? "line-through" : "none",
      fontStyle: side === "left" ? "italic" : "normal",
      minHeight: "44px",

  return (
    <div style={{ marginTop: "16px" }}>

      <div style={{ marginBottom: "16px", display: "flex", alignItems: "center", gap: "12px" }}>

        <div style={{ fontFamily: "'Cinzel',serif", fontSize: "11px", color: "#8a6a3a", whiteSpace: "nowrap" }}>
          {matchedCount} / {PAIRS_PER_ROUND} matched
        </div>
        {accuracy !== null && (
          <div style={{ fontFamily: "'Cinzel',serif", fontSize: "11px", color: "#8a6a3a", whiteSpace: "nowrap" }}>
            {accuracy}% accuracy
          </div>
        )}
      </div>

      {/* Instruction */}
      {!roundDone && (
        <div style={{ textAlign: "center", marginBottom: "14px", fontStyle: "italic", color: "#9a7a3a", fontSize: "13px" }}>
          Click a Latin word, then its English meaning
        </div>
      )}

      {/* Round complete banner */}
      {roundDone && (
        <div style={{ textAlign: "center", marginBottom: "16px", padding: "16px", background: "linear-gradient(180deg,#4a3010,#3a2410)", borderRadius: "4px", border: "1px solid #b8973e" }}>
          <div style={{ fontFamily: "'Cinzel',serif", fontSize: "20px", color: "#e8c97a", fontWeight: "700", marginBottom: "4px" }}>
            {accuracy === 100 ? "Optimus! 🏆" : accuracy >= 80 ? "Bene! ✓" : accuracy >= 60 ? "Satis" : "Melius studē!"}
          </div>
          <div style={{ color: "#c4a060", fontSize: "13px", marginBottom: "14px" }}>
            Round complete · {accuracy}% accuracy
          </div>
          <button onClick={nextRound} style={{ fontFamily: "'Cinzel',serif", fontSize: "11px", letterSpacing: "1.5px", padding: "9px 24px", background: "#8a6914", color: "#f5f0e8", border: "none", borderRadius: "2px", cursor: "pointer" }}>
            NEXT ROUND →
          </button>
        </div>
      )}

      {/* Two-column matching grid */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px 20px" }}>
        {/* Left column header */}
        <div style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", letterSpacing: "2px", color: "#8a6a3a", textAlign: "center", paddingBottom: "4px", borderBottom: "1px solid #d4bc84", textTransform: "uppercase" }}>Latin</div>
        <div style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", letterSpacing: "2px", color: "#8a6a3a", textAlign: "center", paddingBottom: "4px", borderBottom: "1px solid #d4bc84", textTransform: "uppercase" }}>English</div>

        {/* Items — left and right columns rendered together in grid */}
        {leftItems.map((item, i) => (
          <React.Fragment key={item.id}>
            <div onClick={() => handleLeft(item.id)} style={itemStyle(item.id, "left")}>
              {item.text}
            </div>
            <div onClick={() => handleRight(rightItems[i].id)} style={itemStyle(rightItems[i].id, "right")}>
              {rightItems[i].text}
            </div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

//  HOW TO ADD A NEW PASSAGE:
//  Add an object to PASSAGES: { id, title, author, work, date, intro, text }
//  text is plain Latin — no per-word annotation needed.
//
//  HOW TO ADD WORDS: edit latin_dict.json
//  key = lowercase, no diacritics.

const PASSAGES = [
  {
    id:"caesar_dbg_1_1", title:"Dē Bellō Gallicō I.1", author:"C. Iūlius Caesar",
    work:"Commentāriī Dē Bellō Gallicō", date:"58–49 BC",

    text:`Gallia est omnis divisa in partes tres, quarum unam incolunt Belgae, aliam Aquitani, tertiam qui ipsorum lingua Celtae, nostra Galli appellantur. Hi omnes lingua, institutis, legibus inter se differunt. Gallos ab Aquitanis Garumna flumen, a Belgis Matrona et Sequana dividit.`
  },
  {
    id:"cicero_cat_1_1", title:"In Catilīnam I.1", author:"M. Tullius Cicerō",
    work:"Ōrātiōnēs In Catilīnam", date:"63 BC",
    intro:"The thundering opening of Cicero's First Catilinarian — delivered in the Senate on November 8, 63 BC, with Catiline himself present.",
    text:`Quo usque tandem abutere, Catilina, patientia nostra? Quam diu etiam furor iste tuus nos eludet? Quem ad finem sese effrenata iactabit audacia?`
  },
  {
    id:"vergil_aen_1_1", title:"Aenēis I.1–7", author:"P. Vergilius Marō",
    work:"Aenēis", date:"29–19 BC",
    intro:"The invocation and proem of Vergil's Aeneid.",
    text:`Arma virumque cano, Troiae qui primus ab oris Italiam fato profugus Laviniaque venit litora, multum ille et terris iactatus et alto mari, vi superum, saevae memorem Iunonis ob iram.`
  },
];

function toKey(w) {
  return w.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z]/g,"");
}

function tokenise(text) {
  const tokens = [];
  text.trim().split(/\s+/).forEach(raw => {
    const m = raw.match(/^([^a-zA-Z\xC0-\xFF]*)([a-zA-Z\xC0-\xFF\-]+)([^a-zA-Z\xC0-\xFF]*)$/);
    if (m) {
      if (m[1]) tokens.push({type:"punct",text:m[1]});
      tokens.push({type:"word",text:m[2]});
      if (m[3]) tokens.push({type:"punct",text:m[3]});
    } else { tokens.push({type:"punct",text:raw}); }
  });
  return tokens;
}

const POS_COLORS = {
  noun:{bg:"rgba(45,106,79,0.15)",  border:"#2d6a4f"},
  verb:{bg:"rgba(74,52,16,0.15)",   border:"#8a6914"},
  adj: {bg:"rgba(60,30,100,0.12)",  border:"#6a3a9a"},
  adv: {bg:"rgba(20,80,120,0.12)",  border:"#2a6090"},
  prep:{bg:"rgba(120,40,20,0.12)",  border:"#902a14"},
  conj:{bg:"rgba(80,80,20,0.12)",   border:"#807814"},
  pron:{bg:"rgba(100,30,80,0.12)",  border:"#7a2060"},
  part:{bg:"rgba(20,100,100,0.12)", border:"#146a6a"},
  num: {bg:"rgba(140,60,0,0.12)",   border:"#8c3c00"},
};

function WordToken({ text, dict, activeId, setActiveId, idx }) {
  const isActive = activeId === idx;
  const entry = dict ? dict[toKey(text)] : null;
  const pc = entry ? (POS_COLORS[entry.pos] || POS_COLORS.noun) : null;
  return (
    <span style={{position:"relative",display:"inline"}}>
      <span onClick={()=>setActiveId(isActive?null:idx)} onMouseEnter={()=>setActiveId(idx)} onMouseLeave={()=>setActiveId(null)}
        style={{cursor:"pointer",fontStyle:"italic",
          borderBottom:isActive?(entry?"2px solid #b8973e":"2px solid #888"):(entry?"1px dotted #c9a84c":"none"),
          color:isActive?(entry?"#8a6914":"#888"):"#2c1f0e",
          background:isActive?"rgba(184,151,62,0.07)":"transparent",
          borderRadius:"2px",padding:"0 1px",transition:"all 0.1s"}}>
        {text}
      </span>
      {isActive && (
        <span style={{position:"absolute",bottom:"calc(100% + 10px)",left:"50%",transform:"translateX(-50%)",zIndex:200,width:"268px",background:"#1e1408",border:"1px solid "+(entry?"#8a6914":"#555"),borderRadius:"5px",boxShadow:"0 8px 32px rgba(0,0,0,0.5)",padding:"12px 14px",pointerEvents:"none"}}>
          <span style={{position:"absolute",bottom:"-6px",left:"50%",width:"10px",height:"10px",background:"#1e1408",border:"1px solid "+(entry?"#8a6914":"#555"),borderTop:"none",borderLeft:"none",transform:"translateX(-50%) rotate(45deg)",display:"block"}}/>
          {entry ? <>
            <div style={{display:"flex",alignItems:"baseline",gap:"8px",marginBottom:"7px",flexWrap:"wrap"}}>
              <span style={{fontFamily:"'EB Garamond',serif",fontStyle:"italic",fontSize:"18px",color:"#e8c97a"}}>{text}</span>
              <span style={{fontFamily:"'EB Garamond',serif",fontSize:"12px",color:"#c4a060",fontStyle:"italic"}}>{entry.lemma}</span>
            </div>
            <div style={{marginBottom:"6px"}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:"8px",letterSpacing:"1.5px",textTransform:"uppercase",padding:"2px 7px",borderRadius:"10px",background:pc.bg,border:"1px solid "+pc.border,color:pc.border}}>{entry.pos}</span>
            </div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:"12px",color:"#a09070",marginBottom:"5px",lineHeight:"1.4"}}>

            </div>
          </> : <>
            <div style={{fontFamily:"'EB Garamond',serif",fontStyle:"italic",fontSize:"17px",color:"#aaa",marginBottom:"8px"}}>{text}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"1px",color:"#666",textTransform:"uppercase",marginBottom:"5px"}}>Not yet in dictionary</div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:"11px",color:"#555",fontStyle:"italic"}}>Key to add: <span style={{fontFamily:"monospace",background:"#111",padding:"1px 5px",borderRadius:"2px",color:"#888"}}>"{toKey(text)}"</span></div>
          </>}
        </span>
      )}

  );
}

  const word = category.words[wordIdx];
  const tag = TAG[category.type];

  const tableData = React.useMemo(() => {
    if (category.type === "irregular") return word.tables.map(t => ({
      ...t, answers: t.rows.map(r => r.answers)
    }));
    const patterns = category.type === "conjugation" ? CONJUGATION_PATTERNS : DECLENSION_PATTERNS;
    const pattern = patterns[category.pattern];
    return [{ tense: null, headers: pattern.headers, rows: pattern.rows, answers: getAnswers(category, word) }];
  }, [catIdx, wordIdx]);

  const allCells = tableData.flatMap((t,ti) =>
    t.answers.flatMap((row,ri) => row.map((_,ci) => `${ti}-${ri}-${ci}`))
  );
  const total = allCells.length;
  const filledCount = allCells.filter(k => inputs[k]?.trim()).length;
  const score = submitted ? allCells.filter(k => {
    const [ti,ri,ci] = k.split("-").map(Number);
    return checkAnswer(inputs[k]||"", tableData[ti].answers[ri][ci]) === "correct";
  }).length : 0;

  const handleInput = (ti, key, val) => {
    setInputs(p => ({ ...p, [`${ti}-${key}`]: val }));
    if (submitted) setSubmitted(false);
  };

  const reset = () => { setInputs({}); setSubmitted(false); setShowAnswers(false); };

  const goWord = (dir) => {
    setWordIdx((wordIdx + dir + category.words.length) % category.words.length);
    reset();
  };

  const goCategory = (idx) => { setCatIdx(idx); setWordIdx(0); reset(); };

  return (
    <div style={{ minHeight:"100vh", background:"#f5f0e8", backgroundImage:"radial-gradient(ellipse at 15% 0%,rgba(180,140,80,0.09) 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,rgba(100,60,20,0.06) 0%,transparent 55%)", fontFamily:"'EB Garamond','Palatino Linotype',Palatino,serif", color:"#2c1f0e", paddingBottom:"60px" }}>

      {/* Platform topbar */}
      <nav className="topbar">
        <a href="index.html" className="topbar-logo">Language Nexus</a>
        <div className="topbar-sep" />
        <span className="topbar-lang">Latin</span>
        <div className="topbar-right">
          {userName && <span className="topbar-user">{userName}</span>}
          <button className="topbar-btn" onClick={() => supa && supa.auth.signOut().then(() => window.location.href = "/login.html")}>Sign Out</button>
        </div>
      </nav>

      <div style={{ maxWidth:"860px", margin:"0 auto", padding:"0 20px" }}>

        {/* Mode tabs */}
        <div style={{ display:"flex", gap:"0", marginTop:"24px", borderBottom:"2px solid #c9a84c" }}>
          {[["tables","📋  Practice Tables"],["matching","🔗  Vocabulary Matching"],["reader","📖  Reader"]].map(([m, label]) => (
            <button key={m} onClick={() => setMode(m)} style={{ fontFamily:"'Cinzel',serif", fontSize:"11px", letterSpacing:"1px", padding:"9px 22px", border:"none", borderBottom: mode===m?"2px solid #2c1f0e":"2px solid transparent", marginBottom:"-2px", background: mode===m?"#f5f0e8":"transparent", color: mode===m?"#2c1f0e":"#7a5c2a", cursor:"pointer", fontWeight: mode===m?"600":"400", transition:"all 0.15s" }}>
              {label}
            </button>
          ))}
        </div>

        {/* MATCHING MODE */}
        {mode === "matching" && <MatchingMode />}

        {/* READER MODE */}
        {mode === "reader" && <ReaderMode />}

        {/* TABLES MODE */}
        {mode === "tables" && <div>

        {/* Category pills */}
        <div style={{ marginTop:"20px", display:"flex", flexWrap:"wrap", gap:"5px" }}>
          {CATEGORIES.map((cat, i) => {
            const tc = TAG[cat.type];
            const active = i === catIdx;
            return (
              <button key={cat.id} onClick={() => goCategory(i)} style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"0.8px", padding:"4px 11px", border:"1px solid", borderColor: active?tc.bg:"#c9b48a", borderRadius:"20px", background: active?tc.bg:"transparent", color: active?tc.text:"#7a5c2a", cursor:"pointer", transition:"all 0.15s", whiteSpace:"nowrap" }}>
                {cat.label}
                <span style={{ fontFamily:"'EB Garamond',serif", fontWeight:"400", marginLeft:"4px", opacity:0.75, fontSize:"9px" }}>{cat.sublabel}</span>
              </button>
            );
          })}
        </div>

        {/* Main card */}
        <div style={{ marginTop:"16px", background:"#fffdf6", border:"1px solid #d4bc84", borderRadius:"4px", boxShadow:"0 2px 16px rgba(44,31,14,0.09)", overflow:"hidden" }}>

          {/* Card header */}
          <div style={{ background:"linear-gradient(180deg,#4a3010 0%,#3a2410 100%)", padding:"13px 22px", borderBottom:"2px solid #b8973e", display:"flex", alignItems:"center", gap:"14px" }}>
            <button onClick={() => goWord(-1)} style={{ background:"rgba(255,255,255,0.08)", border:"1px solid rgba(184,151,62,0.4)", borderRadius:"2px", color:"#e8c97a", cursor:"pointer", width:"30px", height:"30px", fontSize:"17px", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>‹</button>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", alignItems:"baseline", gap:"10px", flexWrap:"wrap" }}>
                <span style={{ fontFamily:"'Cinzel',serif", fontSize:"16px", fontWeight:"600", color:"#f0e4c4" }}>{word.lemma}</span>
                <span style={{ fontStyle:"italic", color:"#c4a060", fontSize:"14px" }}>— {word.meaning}</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:"8px", marginTop:"3px" }}>
                <span style={{ fontFamily:"'Cinzel',serif", fontSize:"8px", letterSpacing:"1.5px", padding:"2px 7px", borderRadius:"10px", background:tag.bg, color:tag.text, border:`1px solid ${tag.text}44` }}>{category.type.toUpperCase()}</span>
                <span style={{ fontFamily:"'Cinzel',serif", fontSize:"8px", color:"#8a6a3a", letterSpacing:"1px" }}>{category.sublabel.toUpperCase()}</span>
              </div>
            </div>
            <div style={{ textAlign:"center", color:"#8a6a3a", fontSize:"11px", flexShrink:0 }}>
              <div style={{ fontFamily:"'Cinzel',serif", fontSize:"15px", color:"#e8c97a", fontWeight:"600" }}>{wordIdx+1}</div>
              <div>of {category.words.length}</div>
            </div>
            <button onClick={() => goWord(1)} style={{ background:"rgba(255,255,255,0.08)", border:"1px solid rgba(184,151,62,0.4)", borderRadius:"2px", color:"#e8c97a", cursor:"pointer", width:"30px", height:"30px", fontSize:"17px", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>›</button>
          </div>

          <ScoreBar score={score} total={total} submitted={submitted} />

          {/* Tables */}
          <div style={{ padding:"16px 22px", display:"flex", flexDirection:"column", gap:"26px" }}>
            {tableData.map((t, ti) => {
              const subInputs = {};
              Object.entries(inputs).forEach(([k,v]) => {
                const [tIdx,...rest] = k.split("-");
                if (Number(tIdx)===ti) subInputs[rest.join("-")] = v;
              });
              return (
                <div key={ti}>
                  {t.tense && (
                    <div style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"2px", color:"#8a6914", marginBottom:"9px", textTransform:"uppercase", borderLeft:"3px solid #c9a84c", paddingLeft:"9px" }}>{t.tense}</div>
                  )}
                  <TableGrid headers={t.headers} rows={t.rows} answers={t.answers} inputs={subInputs} submitted={submitted} showAnswers={showAnswers} onInput={(key,val) => handleInput(ti,key,val)} />
                </div>
              );
            })}
          </div>

          {/* Controls */}
          <div style={{ padding:"13px 22px 17px", borderTop:"1px solid #e8dfc0", display:"flex", alignItems:"center", gap:"9px", flexWrap:"wrap" }}>
            <button onClick={() => setSubmitted(true)} disabled={filledCount===0} style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"1.5px", padding:"8px 20px", background: filledCount===0?"#c9b48a":"#3a2410", color:"#f0e4c4", border:"none", borderRadius:"2px", cursor: filledCount===0?"default":"pointer" }}>
              GRADE ({filledCount}/{total})
            </button>
            <button onClick={reset} style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"1.5px", padding:"8px 16px", background:"transparent", color:"#7a5c2a", border:"1px solid #c9b48a", borderRadius:"2px", cursor:"pointer" }}>RESET</button>
            {submitted && score < total && (
              <button onClick={() => setShowAnswers(v => !v)} style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"1.5px", padding:"8px 16px", background:"transparent", color: showAnswers?"#2d6a4f":"#9b2335", border:"1px solid", borderColor: showAnswers?"#2d6a4f":"#c9b48a", borderRadius:"2px", cursor:"pointer" }}>
                {showAnswers?"HIDE ANSWERS":"SHOW ANSWERS"}
              </button>
            )}
            <div style={{ marginLeft:"auto", display:"flex", gap:"7px" }}>
              <button onClick={() => goWord(-1)} style={{ fontFamily:"'Cinzel',serif", fontSize:"9px", letterSpacing:"1px", padding:"8px 13px", background:"transparent", color:"#7a5c2a", border:"1px solid #c9b48a", borderRadius:"2px", cursor:"pointer" }}>← PREV</button>
              <button onClick={() => goWord(1)} style={{ fontFamily:"'Cinzel',serif", fontSize:"9px", letterSpacing:"1px", padding:"8px 13px", background:"#8a6914", color:"#f5f0e8", border:"none", borderRadius:"2px", cursor:"pointer" }}>NEXT →</button>
            </div>
          </div>
        </div>

        <div style={{ marginTop:"14px", fontSize:"12px", color:"#9a7a3a", fontStyle:"italic", textAlign:"center" }}>
          Macrons optional · ā = a, ē = e, ī = i, ō = o, ū = u
        </div>
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
