<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — Language Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f7f5f0;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,0,0,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.card{position:relative;z-index:1;background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:48px 44px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.08);animation:fadeUp 0.4s ease both}
.logo{font-family:'Fraunces',serif;font-size:13px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:#a8a29e;text-align:center;margin-bottom:32px}
h1{font-family:'Fraunces',serif;font-size:32px;font-weight:300;font-style:italic;color:#1c1917;text-align:center;margin-bottom:8px;line-height:1.1}
.subtitle{font-size:13px;color:#78716c;text-align:center;margin-bottom:36px;line-height:1.6}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.divider-line{flex:1;height:1px;background:rgba(0,0,0,0.08)}
.divider-text{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#a8a29e}
.login-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:12px 20px;border-radius:6px;border:1.5px solid rgba(0,0,0,0.12);background:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#1c1917;cursor:pointer;transition:all 0.15s;margin-bottom:10px}
.login-btn:hover{background:#f7f5f0;border-color:rgba(0,0,0,0.2);box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.login-btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-icon{width:20px;height:20px;flex-shrink:0}
.footer-note{margin-top:28px;font-size:11px;color:#a8a29e;text-align:center;line-height:1.6}
.error{margin-top:16px;padding:10px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;font-size:12px;color:#dc2626;text-align:center;display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Language Nexus</div>
  <h1>Welcome</h1>
  <p class="subtitle">Sign in to begin or continue your journey.</p>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">Continue with</div>
    <div class="divider-line"></div>
  </div>
  <button class="login-btn" id="btn-google">
    <svg class="btn-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>
  <button class="login-btn" id="btn-microsoft">
    <svg class="btn-icon" viewBox="0 0 24 24">
      <path fill="#00A4EF" d="M0 0h11.377v11.372H0z"/>
      <path fill="#FFB900" d="M12.623 0H24v11.372H12.623z"/>
      <path fill="#00B4F0" d="M0 12.623h11.377V24H0z"/>
      <path fill="#FFB900" d="M12.623 12.623H24V24H12.623z"/>
    </svg>
    Continue with Microsoft
  </button>
  <div class="error" id="error-msg"></div>
  <p class="footer-note">By signing in you agree to your progress being stored securely. We never share your data.</p>
</div>

<script>
window.addEventListener("load", function() {
  const SUPABASE_URL = "https://tdyvlwiayrbkeqdcvtdi.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkeXZsd2lheXJia2VxZGN2dGRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNTcyNzAsImV4cCI6MjA4ODYzMzI3MH0.rw6VHSWf8m142kJVOFWZYQViU6NlHu8uPz7fwgxju94";

  // Check supabase loaded
  if (!window.supabase) {
    document.getElementById("error-msg").textContent = "Failed to load authentication library. Please check your internet connection.";
    document.getElementById("error-msg").style.display = "block";
    return;
  }

  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // If already logged in, redirect
  client.auth.getSession().then(function(result) {
    if (result.data && result.data.session) {
      window.location.href = "/index.html";
    }
  });

  function showError(msg) {
    var el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = "block";
  }

  function setLoading(loading) {
    document.getElementById("btn-google").disabled = loading;
    document.getElementById("btn-microsoft").disabled = loading;
  }

  document.getElementById("btn-google").addEventListener("click", function() {
    setLoading(true);
    client.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.origin + "/index.html" }
    }).then(function(result) {
      if (result.error) {
        showError(result.error.message);
        setLoading(false);
      }
    });
  });

  document.getElementById("btn-microsoft").addEventListener("click", function() {
    setLoading(true);
    client.auth.signInWithOAuth({
      provider: "azure",
      options: {
        scopes: "email profile",
        redirectTo: window.location.origin + "/index.html"
      }
    }).then(function(result) {
      if (result.error) {
        showError(result.error.message);
        setLoading(false);
      }
    });
  });
});
</script>
</body>
</html>
