<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Classical Chinese — Glossarium</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Noto+Serif+TC:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
/* ── glossarium.css ── */
/* ── Custom properties ───────────────────────────────────────────────────────
   These mirror the JS `C` object in each language's _shared.js.
   Dynamic/computed values stay as inline styles; static design lives here.   */

:root {
  /* Parchment palette */
  --c-bg:          #f5f0e8;
  --c-surface:     #fffdf6;
  --c-border:      #d4bc84;
  --c-border-dim:  #e8dfc0;
  --c-gold:        #b8973e;
  --c-gold-light:  #f0e4c4;
  --c-gold-dim:    #8a6914;
  --c-gold-faint:  rgba(184,151,62,0.10);
  --c-text:        #2c1f0e;
  --c-text-muted:  #9a7a3a;
  --c-red:         #c84030;
  --c-green:       #2d8a5f;

  /* Topbar */
  --topbar-bg:     #c8403a;
  --topbar-height: 52px;

  /* Card header dark gradient */
  --card-header-bg: linear-gradient(180deg, #4a3010 0%, #3a2410 100%);

  /* Typography */
  --font-serif:    'EB Garamond', 'Palatino Linotype', Palatino, serif;
  --font-display:  'Cinzel', serif;
  --font-logo:     'Fraunces', serif;

  /* Radii */
  --radius-sm:   2px;
  --radius-md:   4px;
  --radius-lg:   6px;
  --radius-pill: 20px;

  /* Transitions */
  --t-fast: 0.15s ease;
  --t-med:  0.25s ease;
  --t-slow: 0.4s  ease;

  /* Shadows */
  --shadow-card: 0 2px 16px rgba(44,31,14,0.09);
  --shadow-lift: 0 4px 18px rgba(44,31,14,0.13);
}

/* ── Resets ──────────────────────────────────────────────────────────────── */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--c-bg);
  color: var(--c-text);
  font-family: var(--font-serif);
  -webkit-font-smoothing: antialiased;
}

input:focus { outline: none; box-shadow: 0 0 0 2px rgba(184,151,62,0.3); }

button { transition: all var(--t-fast); }
button:hover { opacity: 0.85; }

details summary { list-style: none; cursor: pointer; user-select: none; }
details summary::-webkit-details-marker { display: none; }

::-webkit-scrollbar       { width: 6px; }
::-webkit-scrollbar-track { background: #f0e8d0; }
::-webkit-scrollbar-thumb { background: #c9a84c; border-radius: 3px; }

/* ── Page wrapper ────────────────────────────────────────────────────────── */

.gl-page {
  min-height: 100vh;
  background: var(--c-bg);
  background-image:
    radial-gradient(ellipse at 15% 0%,  rgba(180,140,80,0.09) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(100,60,20,0.06)  0%, transparent 55%);
  font-family: var(--font-serif);
  color: var(--c-text);
  padding-bottom: 60px;
}

.gl-content {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ── Topbar ──────────────────────────────────────────────────────────────── */

.topbar {
  background: var(--topbar-bg);
  padding: 0 24px;
  height: var(--topbar-height);
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(200,64,58,0.3);
}

.topbar-logo {
  font-family: var(--font-logo);
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 0.3px;
  text-decoration: none;
}
.topbar-logo:hover { opacity: 0.85; }

.topbar-sep    { width: 1px; height: 18px; background: rgba(255,255,255,0.25); }

.topbar-course {
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.5px;
}

/* ── Mode tabs ───────────────────────────────────────────────────────────── */

.mode-tabs {
  display: flex;
  flex-wrap: wrap;
  margin-top: 24px;
  border-bottom: 2px solid var(--c-gold);
}

.mode-tab {
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 1px;
  padding: 9px 22px;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  background: transparent;
  color: var(--c-text-muted);
  cursor: pointer;
  font-weight: 400;
  white-space: nowrap;
  transition: all var(--t-fast);
}

.mode-tab:hover { opacity: 1; color: var(--c-text); }

.mode-tab.active {
  background: var(--c-bg);
  color: var(--c-text);
  font-weight: 600;
  border-bottom-color: var(--c-text);
}

/* ── Cards ───────────────────────────────────────────────────────────────── */

.gl-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

.gl-card-header {
  background: var(--card-header-bg);
  padding: 13px 22px;
  border-bottom: 2px solid var(--c-gold);
  display: flex;
  align-items: center;
  gap: 14px;
}

.gl-card-body   { padding: 16px 22px; }

.gl-card-footer {
  padding: 13px 22px 17px;
  border-top: 1px solid var(--c-border-dim);
  display: flex;
  align-items: center;
  gap: 9px;
  flex-wrap: wrap;
}

/* ── Reader card ─────────────────────────────────────────────────────────── */

.reader-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
  padding: 24px 28px;
}

/* ── Library grid ────────────────────────────────────────────────────────── */

.library-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px,1fr));
  gap: 12px;
  margin-top: 20px;
}

.library-tile {
  text-align: left;
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  padding: 18px 20px;
  cursor: pointer;
  box-shadow: var(--shadow-card);
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
  display: block;
  width: 100%;
}
.library-tile:hover {
  opacity: 1;
  border-color: var(--c-gold);
  box-shadow: var(--shadow-lift);
}

/* ── Drill ───────────────────────────────────────────────────────────────── */

.drill-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 16px;
}

.drill-char-display {
  background: var(--card-header-bg);
  padding: 36px 20px 28px;
  text-align: center;
  border-bottom: 1px solid var(--c-border);
}

.drill-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.drill-toggle {
  display: flex;
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  overflow: hidden;
  width: fit-content;
  margin-bottom: 20px;
}

.drill-toggle-btn {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 1px;
  padding: 8px 18px;
  background: transparent;
  color: var(--c-text-muted);
  border: none;
  border-right: 1px solid var(--c-border);
  cursor: pointer;
  transition: all var(--t-fast);
}
.drill-toggle-btn:last-child { border-right: none; }
.drill-toggle-btn.active     { background: #3a2410; color: #e8c97a; }
.drill-toggle-btn.soon       { cursor: not-allowed; color: var(--c-border); }

/* ── Paradigm table ──────────────────────────────────────────────────────── */

.paradigm-table              { width: 100%; border-collapse: collapse; }
.paradigm-table th           { font-family: var(--font-display); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--c-text-muted); padding: 7px 8px; border-bottom: 1px solid var(--c-border); }
.paradigm-table td           { padding: 4px 5px; text-align: center; border-bottom: 1px solid var(--c-border-dim); }
.paradigm-table tr:nth-child(even) td { background: rgba(200,170,100,0.04); }

/* ── Buttons ─────────────────────────────────────────────────────────────── */

.btn {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 1.5px;
  padding: 8px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: none;
}
.btn-primary   { background: #3a2410; color: var(--c-gold-light); }
.btn-secondary { background: transparent; color: var(--c-text-muted); border: 1px solid var(--c-border); }
.btn-gold      { background: var(--c-gold-dim); color: #f5f0e8; }

.btn-pill {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 0.8px;
  padding: 4px 11px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--c-border);
  background: transparent;
  color: var(--c-text-muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--t-fast);
}
.btn-pill.active { background: #3a2410; border-color: var(--c-gold); color: var(--c-gold-light); }

/* ── Score bar ───────────────────────────────────────────────────────────── */

.score-bar {
  padding: 11px 22px;
  background: rgba(200,170,100,0.08);
  border-bottom: 1px solid var(--c-border);
  display: flex;
  align-items: center;
  gap: 14px;
}

/* ── Progress track ──────────────────────────────────────────────────────── */

.progress-track { height: 3px; background: var(--c-border-dim); border-radius: 2px; overflow: hidden; }
.progress-fill  { height: 100%; background: var(--c-gold); border-radius: 2px; transition: width var(--t-slow); }

/* ── Feedback ────────────────────────────────────────────────────────────── */

.feedback-correct {
  background: rgba(45,138,95,0.08);
  border: 1px solid var(--c-green);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  margin-top: 12px;
}
.feedback-wrong {
  background: rgba(200,64,48,0.07);
  border: 1px solid var(--c-red);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  margin-top: 12px;
}

/* ── POS badge ───────────────────────────────────────────────────────────── */

.pos-badge {
  font-family: var(--font-display);
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 10px;
  display: inline-block;
  white-space: nowrap;
}

/* ── Section / tense labels ──────────────────────────────────────────────── */

.section-label {
  font-family: var(--font-display);
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--c-text-muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.tense-label {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--c-gold-dim);
  text-transform: uppercase;
  border-left: 3px solid var(--c-gold);
  padding-left: 9px;
  margin-bottom: 9px;
}

/* ── Word list (reader character/vocab list) ─────────────────────────────── */

.word-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap: 4px;
  margin-top: 10px;
}
.word-list-item {
  display: flex;
  align-items: baseline;
  gap: 6px;
  padding: 5px 9px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--c-border-dim);
  background: rgba(200,170,100,0.05);
}
.word-list-item.missing {
  background: rgba(150,50,50,0.04);
  border-color: #e0c0c0;
}

/* ── Keyframes ───────────────────────────────────────────────────────────── */

@keyframes fadeIn    { from { opacity: 0; }                        to { opacity: 1; } }
@keyframes slideUp   { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px);  } to { opacity: 1; transform: translateY(0); } }
@keyframes scaleIn   { from { opacity: 0; transform: scale(0.96); }     to { opacity: 1; transform: scale(1); } }
@keyframes pulse     { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position:  400px 0; }
}

@keyframes correctFlash {
  0%   { background: rgba(45,138,95,0.00); }
  30%  { background: rgba(45,138,95,0.22); }
  100% { background: rgba(45,138,95,0.08); }
}

@keyframes wrongShake {
  0%,100% { transform: translateX(0);  }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX( 6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX( 4px); }
}

/* ── Animation utility classes ───────────────────────────────────────────── */
/*
   Usage in React:
     <div className="anim-fade-in">...</div>

   Re-trigger on state change (e.g. new card):
     <div key={cardIndex} className="anim-slide-up">...</div>

   Staggered list (add to parent):
     <div className="anim-stagger">{items.map(...)}</div>

   Loading skeleton:
     <div className="anim-shimmer" style={{height:18,borderRadius:4}} />
*/

.anim-fade-in    { animation: fadeIn    var(--t-med)  ease both; }
.anim-slide-up   { animation: slideUp   var(--t-med)  ease both; }
.anim-slide-down { animation: slideDown var(--t-fast) ease both; }
.anim-scale-in   { animation: scaleIn   var(--t-fast) ease both; }
.anim-pulse      { animation: pulse 1.5s ease infinite; }
.anim-correct    { animation: correctFlash 0.5s ease both; }
.anim-wrong      { animation: wrongShake   0.4s ease both; }

.anim-shimmer {
  background: linear-gradient(90deg, var(--c-border-dim) 25%, var(--c-surface) 50%, var(--c-border-dim) 75%);
  background-size: 400px 100%;
  animation: shimmer 1.4s ease infinite;
}

/* Staggered children — parent gets .anim-stagger, each child slides up with delay */
.anim-stagger > * { animation: slideUp var(--t-med) ease both; }
.anim-stagger > *:nth-child(1) { animation-delay: 0.00s; }
.anim-stagger > *:nth-child(2) { animation-delay: 0.05s; }
.anim-stagger > *:nth-child(3) { animation-delay: 0.10s; }
.anim-stagger > *:nth-child(4) { animation-delay: 0.15s; }
.anim-stagger > *:nth-child(5) { animation-delay: 0.20s; }
.anim-stagger > *:nth-child(6) { animation-delay: 0.25s; }
.anim-stagger > *:nth-child(7) { animation-delay: 0.30s; }
.anim-stagger > *:nth-child(8) { animation-delay: 0.35s; }

/* ── Responsive ──────────────────────────────────────────────────────────── */

@media (max-width: 600px) {
  .topbar        { padding: 0 14px; }
  .gl-content    { padding: 0 12px; }
  .reader-card   { padding: 16px 14px; }
  .gl-card-body  { padding: 12px 14px; }
  .drill-options { grid-template-columns: 1fr; }
  .library-grid  { grid-template-columns: 1fr; }
  .mode-tab      { padding: 9px 14px; font-size: 10px; }
}

/* ── chinese.css ── */

</style>

<div id="root"></div>

<!-- Load order: shared → data → components → App -->
<script type="text/babel">
// ── chinese_shared.js ──────────────────────────
// ─── COLOUR PALETTE ───────────────────────────────────────────────────────────
// Parchment/gold theme — matches Latin, Greek, Sanskrit

const C = {
  bg:         "#f5f0e8",
  surface:    "#fffdf6",
  card:       "#fffdf6",
  border:     "#d4bc84",
  borderDim:  "#e8dfc0",
  gold:       "#b8973e",
  goldLight:  "#f0e4c4",
  goldDim:    "#8a6914",
  goldFaint:  "rgba(184,151,62,0.10)",
  text:       "#2c1f0e",
  textMuted:  "#9a7a3a",
  red:        "#c84030",
  green:      "#2d8a5f",
};

const POS_COLORS = {
  noun:    { bg:"rgba(45,106,79,0.18)",   border:"#2d6a4f" },
  verb:    { bg:"rgba(180,120,20,0.18)",  border:"#b07818" },
  adj:     { bg:"rgba(80,40,140,0.18)",   border:"#6a3aaa" },
  adv:     { bg:"rgba(20,80,140,0.18)",   border:"#1a60aa" },
  particle:{ bg:"rgba(140,40,40,0.18)",   border:"#8a2828" },
  pronoun: { bg:"rgba(40,100,140,0.18)",  border:"#2878aa" },
  numeral: { bg:"rgba(100,60,0,0.18)",    border:"#7a4800" },
};

// ─── UTILITIES ────────────────────────────────────────────────────────────────

// ─── UTILITIES ───────────────────────────────────────────────────────────────

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function normalise(s) {
  return s.trim().toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g,"");
}

// ── chinese_data.js ──────────────────────────
// ─── CHARACTER DATA ───────────────────────────────────────────────────────────

const CHARACTERS = [
  { char:"人", pinyin:"rén",  eng:"person, people, human being",                          pos:"noun",           components:["亻"],           notes:"One of the most frequent characters in Classical Chinese. As a suffix it often means 'a person of' e.g. 學人 a scholar." },
  { char:"天", pinyin:"tiān", eng:"heaven, sky, nature, day",                             pos:"noun",           components:["一","大"],       notes:"In Classical thought 天 is the supreme moral order as well as the physical sky. Contrast 地 (earth)." },
  { char:"地", pinyin:"dì",   eng:"earth, ground, place, land",                           pos:"noun",           components:["土","也"],       notes:"Paired with 天 in the cosmological pair 天地 (heaven and earth = the universe)." },
  { char:"王", pinyin:"wáng", eng:"king, ruler, to rule",                                 pos:"noun/verb",      components:["三","丨"],       notes:"As a verb 王 means 'to act as king'. The three strokes represent Heaven, Humanity, Earth; the vertical connects them." },
  { char:"子", pinyin:"zǐ",   eng:"son, child, master, you (honorific)",                  pos:"noun",           components:["了","一"],       notes:"子 is used as an honorific title for philosophers: 孔子 (Confucius), 孟子 (Mencius)." },
  { char:"學", pinyin:"xué",  eng:"to learn, to study, learning",                         pos:"verb",           components:["爻","冖","子"],  notes:"The opening character of the Analects: 學而時習之。The traditional form shows hands above a child under a roof." },
  { char:"道", pinyin:"dào",  eng:"way, path, principle, to speak",                       pos:"noun/verb",      components:["首","辶"],       notes:"The central concept of Taoism. As a verb it means 'to say' or 'to lead'. Contains 首 (head) + 辶 (movement)." },
  { char:"德", pinyin:"dé",   eng:"virtue, moral power, character",                       pos:"noun",           components:["彳","十","目","心"], notes:"A key Confucian concept: inner moral cultivation that radiates outward. Related to 得 (to obtain)." },
  { char:"仁", pinyin:"rén",  eng:"benevolence, humaneness, goodness",                    pos:"noun",           components:["亻","二"],       notes:"The supreme Confucian virtue. Written 人 (person) + 二 (two) — benevolence exists between people." },
  { char:"義", pinyin:"yì",   eng:"righteousness, rightness, duty",                       pos:"noun",           components:["羊","我"],       notes:"One of the five cardinal Confucian virtues. Contrast with 利 (profit, advantage)." },
  { char:"禮", pinyin:"lǐ",   eng:"ritual, propriety, rites, courtesy",                   pos:"noun",           components:["示","豊"],       notes:"The system of social ritual and proper conduct. A core Confucian concern — ritual structures social harmony." },
  { char:"知", pinyin:"zhī",  eng:"to know, knowledge, wisdom",                           pos:"verb",           components:["矢","口"],       notes:"Also read zhì (wisdom as a noun). Distinct from 識 (to recognise, to be acquainted with)." },
  { char:"心", pinyin:"xīn",  eng:"heart, mind, thought, feeling",                        pos:"noun",           components:["心"],            notes:"In Classical Chinese the heart is the seat of both emotion and thought — there is no word/thought distinction." },
  { char:"國", pinyin:"guó",  eng:"state, kingdom, country",                              pos:"noun",           components:["囗","或"],       notes:"Literally 'people/territory enclosed by a border'. The 戰國 (Warring States) period takes its name from 諸國." },
  { char:"君", pinyin:"jūn",  eng:"ruler, lord, gentleman, you",                          pos:"noun",           components:["尹","口"],       notes:"君子 (the noble person / gentleman) is a key Confucian concept — the morally cultivated person." },
  { char:"民", pinyin:"mín",  eng:"people, subjects, the people",                         pos:"noun",           components:["氏","一"],       notes:"The governed populace as distinct from 君 (ruler). Mencius argued 民 are the most important element of a state." },
  { char:"文", pinyin:"wén",  eng:"writing, culture, civil, pattern",                     pos:"noun/adj",       components:["亠","乂"],       notes:"文言 (literary language) = the written classical style. Contrast 武 (martial, military)." },
  { char:"言", pinyin:"yán",  eng:"to speak, words, speech, saying",                      pos:"verb/noun",      components:["亠","口"],       notes:"言 as a noun means a word, statement or saying. 言而有信 = to speak and be trustworthy." },
  { char:"行", pinyin:"xíng", eng:"to walk, to act, conduct, practice",                   pos:"verb",           components:["彳","亍"],       notes:"Also read háng (a row, a profession). The pair 知行 (knowing and acting) is a key Neo-Confucian theme." },

// ─── HELPERS ─────────────────────────────────────────────────────────────────

// Build a set of 4 options: 1 correct + 3 wrong drawn from the pool.
// Returns array of { eng, pinyin, isCorrect } shuffled.
function buildOptions(correct, pool) {
  const distractors = shuffle(pool.filter(c => c.char !== correct.char))
    .slice(0, 3)
    .map(c => ({ label: c.eng.split(",")[0].trim(), pinyin: c.pinyin, isCorrect: false }));
  return shuffle([
    { label: correct.eng.split(",")[0].trim(), pinyin: correct.pinyin, isCorrect: true },
    ...distractors,
  ]);
}

// Characters available for the builder (must have components)
const BUILDER_CHARS = CHARACTERS.filter(c => c.components && c.components.length > 1);

// ─── MULTIPLE CHOICE CARD ─────────────────────────────────────────────────────

function MultipleChoiceCard({ char, options, status, onSelect, onNext }) {
  const pc = POS_COLORS[char.pos.split("/")[0]] || POS_COLORS.noun;
  return (
    <div style={{ background: C.surface, border: "1px solid " + C.border, borderRadius: "6px", overflow: "hidden", marginBottom: "16px" }}>

      {/* Character display */}
      <div style={{ background: "linear-gradient(180deg,#4a3010 0%,#3a2410 100%)", padding: "36px 20px 28px", textAlign: "center", borderBottom: "1px solid " + C.border }}>
        <div style={{ fontFamily: "'Noto Serif TC',serif", fontSize: "100px", color: "#f0e4c4", lineHeight: 1, marginBottom: "14px" }}>
          {char.char}
        </div>
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: "10px" }}>
          <span style={{ fontFamily: "'Cinzel',serif", fontSize: "8px", letterSpacing: "1.5px", padding: "2px 8px", borderRadius: "10px", background: pc.bg, border: "1px solid " + pc.border, color: pc.border }}>
            {char.pos}
          </span>
          {char.components && (
            <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: "14px", color: "rgba(255,255,255,0.35)", letterSpacing: "4px" }}>
              {char.components.join(" + ")}
            </span>
          )}
        </div>
      </div>

      {/* Options */}
      <div style={{ padding: "20px 22px" }}>
        <div style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", letterSpacing: "2px", color: C.textMuted, textTransform: "uppercase", marginBottom: "12px" }}>
          Select the correct meaning:
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px" }}>
          {options.map((opt, i) => {
            let bg = C.surface, border = C.border, color = C.text, labelColor = C.textMuted;
            if (status) {
              if (opt.isCorrect) {
                bg = "rgba(45,138,95,0.10)"; border = C.green; color = C.green; labelColor = C.green;
              } else if (!opt.isCorrect && status === opt.label) {
                bg = "rgba(200,64,48,0.10)"; border = C.red; color = C.red; labelColor = C.red;
              } else {
                color = C.textMuted; labelColor = "#c9b48a";
              }
            }
            return (
              <button key={i} onClick={() => !status && onSelect(opt)}
                disabled={!!status}
                style={{
                  textAlign: "left", padding: "12px 14px",
                  background: bg, border: "1px solid " + border,
                  borderRadius: "4px", cursor: status ? "default" : "pointer",
                  transition: "all 0.15s",
                }}>
                <div style={{ fontFamily: "'EB Garamond',serif", fontSize: "15px", color: color, lineHeight: 1.3, marginBottom: "3px" }}>
                  {opt.label}
                </div>
                <div style={{ fontFamily: "'EB Garamond',serif", fontSize: "11px", color: labelColor, fontStyle: "italic" }}>
                  {opt.pinyin}
                </div>
              </button>
            );
          })}
        </div>

        {/* Feedback */}
        {status && (
          <div style={{ marginTop: "14px", padding: "12px 16px", background: status === "correct" ? "rgba(45,138,95,0.08)" : "rgba(200,64,48,0.07)", border: "1px solid " + (status === "correct" ? C.green : C.red), borderRadius: "4px" }}>
            <div style={{ fontFamily: "'Cinzel',serif", fontSize: "10px", letterSpacing: "1px", color: status === "correct" ? C.green : C.red, marginBottom: "6px" }}>
              {status === "correct" ? "✓  CORRECT" : "✗  INCORRECT"}
            </div>
            <div style={{ fontFamily: "'EB Garamond',serif", fontSize: "15px", color: C.text, marginBottom: "3px" }}>
              <span style={{ fontFamily: "'Noto Serif TC',serif", marginRight: "8px" }}>{char.char}</span>
              {char.eng}
            </div>
            <div style={{ fontFamily: "'EB Garamond',serif", fontSize: "12px", color: C.textMuted, fontStyle: "italic", marginBottom: char.notes ? "6px" : "0" }}>
              {char.pinyin}
            </div>
            {char.notes && (
              <div style={{ fontFamily: "'EB Garamond',serif", fontSize: "12px", color: C.textMuted, fontStyle: "italic", lineHeight: "1.6", borderTop: "1px solid " + C.borderDim, paddingTop: "8px", marginTop: "6px" }}>
                {char.notes}
              </div>
            )}
          </div>
        )}

        {/* Next button */}
        {status && (
          <button onClick={onNext}
            style={{ marginTop: "12px", width: "100%", fontFamily: "'Cinzel',serif", fontSize: "10px", letterSpacing: "1.5px", padding: "10px", background: C.goldDim, color: "#f5f0e8", border: "none", borderRadius: "3px", cursor: "pointer" }}>
            NEXT →
          </button>
        )}
      </div>
    </div>
  );
}

// ─── MAIN CHAR DRILL ─────────────────────────────────────────────────────────

function CharDrill() {
  const [drillMode, setDrillMode] = React.useState(DRILL_MODES.MULTIPLE_CHOICE);

  // Multiple-choice state
  const [mcOrder]  = React.useState(() => shuffle([...Array(CHARACTERS.length).keys()]));
  const [mcIdx,  setMcIdx]  = React.useState(0);
  const [options, setOptions] = React.useState(() => buildOptions(CHARACTERS[0], CHARACTERS));
  const [mcStatus, setMcStatus] = React.useState(null); // null | "correct" | wrong_label
  const [mcScore, setMcScore]   = React.useState({ c: 0, w: 0 });

  // Builder state (wired up, component itself is a stub)
  const [bOrder]   = React.useState(() => shuffle([...Array(BUILDER_CHARS.length).keys()]));
  const [bIdx,   setBIdx]   = React.useState(0);
  const [bScore, setBScore] = React.useState({ c: 0, w: 0 });

  // ── Multiple choice handlers ────────────────────────────────────────────────
  const mcChar = CHARACTERS[mcOrder[mcIdx % mcOrder.length]];

  const handleMcSelect = (opt) => {
    const correct = opt.isCorrect;
    setMcStatus(correct ? "correct" : opt.label);
    setMcScore(s => correct ? { ...s, c: s.c + 1 } : { ...s, w: s.w + 1 });
  };

  const handleMcNext = () => {
    const nextIdx = mcIdx + 1;
    const nextChar = CHARACTERS[mcOrder[nextIdx % mcOrder.length]];
    setMcIdx(nextIdx);
    setOptions(buildOptions(nextChar, CHARACTERS));
    setMcStatus(null);
  };

  // ── Builder handlers ────────────────────────────────────────────────────────
  const bChar = BUILDER_CHARS.length > 0 ? BUILDER_CHARS[bOrder[bIdx % bOrder.length]] : null;

  const handleBNext = () => setBIdx(i => i + 1);

  // ── Shared progress ─────────────────────────────────────────────────────────
  const ismc   = drillMode === DRILL_MODES.MULTIPLE_CHOICE;
  const pool   = ismc ? CHARACTERS : BUILDER_CHARS;
  const idx    = ismc ? mcIdx : bIdx;
  const score  = ismc ? mcScore : bScore;
  const total  = score.c + score.w;
  const acc    = total > 0 ? Math.round((score.c / total) * 100) : null;

  return (
    <div style={{ marginTop: "20px" }}>

      {/* Drill type toggle */}
      <div style={{ display: "flex", gap: "0", marginBottom: "20px", border: "1px solid " + C.border, borderRadius: "4px", overflow: "hidden", alignSelf: "flex-start", width: "fit-content" }}>
        {[
          [DRILL_MODES.MULTIPLE_CHOICE, "Multiple Choice"],
          [DRILL_MODES.BUILDER,         "Hanzi Builder"],
        ].map(([mode, label]) => {
          const active = drillMode === mode;
          const isBuilder = mode === DRILL_MODES.BUILDER;
          return (
            <button key={mode}
              onClick={() => !isBuilder && setDrillMode(mode)}
              title={isBuilder ? "Coming soon" : ""}
              style={{
                fontFamily: "'Cinzel',serif", fontSize: "10px", letterSpacing: "1px",
                padding: "8px 18px",
                background: active ? "#3a2410" : "transparent",
                color: active ? "#e8c97a" : isBuilder ? C.border : C.textMuted,
                border: "none",
                borderRight: mode === DRILL_MODES.MULTIPLE_CHOICE ? "1px solid " + C.border : "none",
                cursor: isBuilder ? "not-allowed" : "pointer",
                transition: "all 0.15s",
                position: "relative",
              }}>
              {label}
              {isBuilder && (
                <span style={{ marginLeft: "6px", fontFamily: "'EB Garamond',serif", fontSize: "9px", fontStyle: "italic", color: C.border }}>
                  soon
                </span>
              )}
            </button>
          );
        })}
      </div>

      {/* Progress bar */}
      <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "20px" }}>
        <div style={{ flex: 1, height: "3px", background: C.borderDim, borderRadius: "2px", overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${((idx % pool.length) / pool.length) * 100}%`, background: C.gold, transition: "width 0.4s" }} />
        </div>
        <span style={{ fontFamily: "'Cinzel',serif", fontSize: "10px", color: C.textMuted, whiteSpace: "nowrap" }}>
          {(idx % pool.length) + 1} / {pool.length}
          {acc !== null && <span style={{ marginLeft: "8px", color: acc >= 80 ? C.green : acc >= 60 ? C.gold : C.red }}>{acc}% acc</span>}
        </span>
      </div>

      {/* Active drill card */}
      {drillMode === DRILL_MODES.MULTIPLE_CHOICE && (
        <MultipleChoiceCard
          char={mcChar}
          options={options}
          status={mcStatus}
          onSelect={handleMcSelect}
          onNext={handleMcNext}
        />
      )}
      {drillMode === DRILL_MODES.BUILDER && bChar && (
        <BuilderCard
          char={bChar}
          onCorrect={() => { setBScore(s => ({...s, c: s.c+1})); }}
          onWrong={()   => { setBScore(s => ({...s, w: s.w+1})); }}
          onNext={handleBNext}
        />
      )}
      {drillMode === DRILL_MODES.BUILDER && BUILDER_CHARS.length === 0 && (
        <div style={{ padding: "40px", textAlign: "center", fontFamily: "'EB Garamond',serif", fontSize: "14px", color: C.textMuted, fontStyle: "italic" }}>
          No characters with component data yet — add components[] to CHARACTERS in chinese_data.js.
        </div>
      )}

      {/* Score summary */}
      {total > 0 && (
        <div style={{ display: "flex", gap: "16px", justifyContent: "center", fontFamily: "'Cinzel',serif", fontSize: "10px", letterSpacing: "1px" }}>
          <span style={{ color: C.green }}>✓ {score.c} correct</span>
          <span style={{ color: C.textMuted }}>·</span>
          <span style={{ color: C.red }}>✗ {score.w} wrong</span>
          <span style={{ color: C.textMuted }}>·</span>
          <span style={{ color: C.textMuted }}>{total} attempted</span>
        </div>
      )}
    </div>
  );
}

// ── chinese_reader.js ──────────────────────────
// ─── READER ───────────────────────────────────────────────────────────────────

function ReaderMode() {
  const [dict, setDict]         = React.useState(null);
  const [err, setErr]           = React.useState(null);
  const [view, setView]         = React.useState("library");
  const [pidx, setPidx]         = React.useState(null);
  const [activeId, setActiveId] = React.useState(null);

  React.useEffect(() => {
    fetch("chinese_dict.json")
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(setDict).catch(e => setErr(e.message));
  }, []);

  // All hooks unconditional — guard with null checks
  const passage    = pidx !== null ? PASSAGES[pidx] : null;
  const tokens     = React.useMemo(() => passage ? passage.text.split(" ").filter(t => t.length > 0) : [], [pidx]);
  const charTokens = tokens.filter(t => /[\u4e00-\u9fff]/.test(t));
  const inDict     = dict ? charTokens.filter(t => dict[t]).length : 0;
  const coverage   = charTokens.length > 0 ? Math.round((inDict / charTokens.length) * 100) : 0;
  const isPunct    = t => /^[，。？！；：「」『』、]$/.test(t);

  const openPassage = (i) => { setPidx(i); setView("reading"); setActiveId(null); };
  const back        = ()  => { setView("library"); setActiveId(null); };

  // ── Library view ─────────────────────────────────────────────────────────────
  if (view === "library") {
    return (
      <div style={{ marginTop: "20px" }}>
        <div style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", letterSpacing: "3px", color: C.textMuted, textTransform: "uppercase", marginBottom: "14px" }}>Select a text</div>
        {err && (
          <div style={{ padding: "10px 14px", background: "rgba(180,30,30,0.06)", border: "1px solid #c88080", borderRadius: "4px", marginBottom: "12px", fontFamily: "'EB Garamond',serif", fontSize: "13px", color: "#c06060" }}>
            Dictionary not loaded — hover popups unavailable. ({err})
          </div>
        )}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px,1fr))", gap: "12px" }}>
          {PASSAGES.map((p, i) => (
            <button key={p.id} onClick={() => openPassage(i)}
              style={{ textAlign: "left", background: C.surface, border: "1px solid " + C.border, borderRadius: "4px", padding: "18px 20px", cursor: "pointer", boxShadow: "0 2px 10px rgba(44,31,14,0.07)", transition: "all 0.15s", display: "block", width: "100%" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = C.gold; e.currentTarget.style.boxShadow = "0 4px 18px rgba(44,31,14,0.13)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.boxShadow = "0 2px 10px rgba(44,31,14,0.07)"; }}>
              <div style={{ fontFamily: "'Noto Serif TC',serif", fontSize: "22px", fontWeight: "600", color: C.text, marginBottom: "6px", letterSpacing: "2px" }}>{p.title}</div>
              <div style={{ fontFamily: "'EB Garamond',serif", fontStyle: "italic", fontSize: "12px", color: C.textMuted, marginBottom: "10px" }}>{p.source} · {p.date}</div>
              {p.intro && <div style={{ fontFamily: "'EB Garamond',serif", fontSize: "13px", color: "#5a4020", lineHeight: "1.5" }}>{p.intro}</div>}
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ── Reading view ──────────────────────────────────────────────────────────────
  let wc = 0;

  return (
    <div style={{ marginTop: "16px" }}>
      {/* Breadcrumb + passage tabs */}
      <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "12px", flexWrap: "wrap" }}>
        <button onClick={back} style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", letterSpacing: "1.5px", padding: "5px 12px", background: "transparent", color: C.textMuted, border: "1px solid " + C.border, borderRadius: "2px", cursor: "pointer" }}>← LIBRARY</button>
        <div style={{ marginLeft: "auto", display: "flex", gap: "5px", flexWrap: "wrap" }}>
          {PASSAGES.map((p, i) => (
            <button key={p.id} onClick={() => { setPidx(i); setActiveId(null); }}
              style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", letterSpacing: "0.5px", padding: "4px 10px", border: "1px solid", borderColor: i === pidx ? C.gold : C.border, borderRadius: "12px", background: i === pidx ? "#3a2410" : "transparent", color: i === pidx ? C.goldLight : C.textMuted, cursor: "pointer", transition: "all 0.15s" }}>
              {p.title}
            </button>
          ))}
        </div>
      </div>

      <div style={{ background: C.surface, border: "1px solid " + C.border, borderRadius: "4px", boxShadow: "0 2px 16px rgba(44,31,14,0.09)", padding: "24px 28px" }}>
        {/* Header */}
        <div style={{ marginBottom: "16px", paddingBottom: "14px", borderBottom: "1px solid " + C.borderDim }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: "8px" }}>
            <div>
              <h2 style={{ fontFamily: "'Noto Serif TC',serif", fontSize: "18px", fontWeight: "600", color: C.text, marginBottom: "4px" }}>{passage.title}</h2>
              <div style={{ fontFamily: "'EB Garamond',serif", fontStyle: "italic", fontSize: "13px", color: C.textMuted }}>{passage.source} · {passage.date}</div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: "3px", flexShrink: 0 }}>
              <div style={{ fontFamily: "'Cinzel',serif", fontSize: "8px", letterSpacing: "1px", color: C.textMuted, textTransform: "uppercase" }}>Dictionary coverage</div>
              <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                <div style={{ width: "70px", height: "3px", background: C.borderDim, borderRadius: "2px", overflow: "hidden" }}>
                  <div style={{ height: "100%", width: coverage + "%", background: coverage > 80 ? C.gold : coverage > 50 ? "#c88030" : C.red, transition: "width 0.5s" }} />
                </div>
                <span style={{ fontFamily: "'Cinzel',serif", fontSize: "11px", color: C.goldDim, fontWeight: "600" }}>{coverage}%</span>
              </div>
              <div style={{ fontFamily: "'EB Garamond',serif", fontSize: "11px", color: C.textMuted, fontStyle: "italic" }}>{inDict}/{charTokens.length} chars</div>
            </div>
          </div>
          {passage.intro && (
            <div style={{ marginTop: "10px", fontFamily: "'EB Garamond',serif", fontSize: "13px", color: C.textMuted, lineHeight: "1.6", fontStyle: "italic" }}>{passage.intro}</div>
          )}
        </div>

        {/* POS legend */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: "4px", marginBottom: "16px", alignItems: "center" }}>
          {Object.entries(POS_COLORS).map(([pos, c]) => (
            <span key={pos} style={{ fontFamily: "'Cinzel',serif", fontSize: "8px", letterSpacing: "1px", textTransform: "uppercase", padding: "2px 6px", borderRadius: "10px", background: c.bg, border: "1px solid " + c.border, color: c.border }}>{pos}</span>
          ))}
          <span style={{ fontFamily: "'EB Garamond',serif", fontSize: "12px", color: C.textMuted, fontStyle: "italic", marginLeft: "6px" }}>
            {dict ? "tap any character" : "loading dictionary…"}
          </span>
        </div>

        {/* Text */}
        <div style={{ fontFamily: "'Noto Serif TC',serif", fontSize: "26px", lineHeight: "2.8", color: C.text, marginBottom: "20px", letterSpacing: "2px" }}>
          {tokens.map((token, i) => {
            if (isPunct(token)) return <span key={i} style={{ color: C.textMuted }}>{token}</span>;
            const id = wc++;
            const entry = dict ? dict[token] : null;
            const pc = entry ? (POS_COLORS[entry.pos] || POS_COLORS.noun) : null;
            const isActive = activeId === id;
            return (
              <React.Fragment key={i}>
                <span style={{ position: "relative", display: "inline-block" }}
                  onMouseEnter={() => entry && setActiveId(id)}
                  onMouseLeave={() => setActiveId(null)}>
                  <span onClick={() => setActiveId(isActive ? null : id)}
                    style={{ cursor: entry ? "pointer" : "default", borderBottom: entry ? "2px solid " + (pc.border + "88") : "none", background: isActive ? (pc ? pc.bg : "transparent") : "transparent", borderRadius: "2px", padding: "0 1px", transition: "all 0.15s" }}>
                    {token}
                  </span>
                  {isActive && entry && (
                    <div style={{ position: "absolute", top: "110%", left: "50%", transform: "translateX(-50%)", background: C.surface, border: "1px solid " + C.border, borderRadius: "4px", padding: "8px 12px", zIndex: 100, minWidth: "160px", boxShadow: "0 4px 16px rgba(44,31,14,0.20)", textAlign: "left", pointerEvents: "none" }}>
                      <div style={{ fontFamily: "'Noto Serif TC',serif", fontSize: "22px", color: C.text, marginBottom: "2px" }}>{token}</div>
                      <div style={{ fontFamily: "'EB Garamond',serif", fontSize: "12px", color: C.textMuted, marginBottom: "4px" }}>{entry.pinyin}</div>
                      <div style={{ fontFamily: "'Cinzel',serif", fontSize: "8px", padding: "1px 5px", borderRadius: "8px", background: pc.bg, border: "1px solid " + pc.border, color: pc.border, display: "inline-block", marginBottom: "4px" }}>{entry.pos}</div>
                      <div style={{ fontFamily: "'EB Garamond',serif", fontSize: "13px", color: C.text }}>{entry.eng}</div>
                      {entry.notes && <div style={{ fontFamily: "'EB Garamond',serif", fontSize: "11px", color: C.textMuted, marginTop: "4px", fontStyle: "italic", lineHeight: "1.4" }}>{entry.notes}</div>}
                    </div>
                  )}
                </span>
              </React.Fragment>
            );
          })}
        </div>

        {/* Prev / Next */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: "10px", borderTop: "1px solid " + C.borderDim, marginBottom: "16px" }}>
          <button onClick={() => { setPidx(p => p - 1); setActiveId(null); }} disabled={pidx === 0}
            style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", letterSpacing: "1px", padding: "8px 16px", background: "transparent", color: pidx === 0 ? C.border : C.textMuted, border: "1px solid", borderColor: pidx === 0 ? C.borderDim : C.border, borderRadius: "2px", cursor: pidx === 0 ? "default" : "pointer" }}>
            ← PREV
          </button>
          <span style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", color: C.textMuted, letterSpacing: "1px" }}>{pidx + 1} / {PASSAGES.length}</span>
          <button onClick={() => { setPidx(p => p + 1); setActiveId(null); }} disabled={pidx === PASSAGES.length - 1}
            style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", letterSpacing: "1px", padding: "8px 16px", background: pidx === PASSAGES.length - 1 ? "transparent" : C.goldDim, color: pidx === PASSAGES.length - 1 ? C.border : "#f5f0e8", border: "1px solid", borderColor: pidx === PASSAGES.length - 1 ? C.borderDim : C.goldDim, borderRadius: "2px", cursor: pidx === PASSAGES.length - 1 ? "default" : "pointer" }}>
            NEXT →
          </button>
        </div>

        {/* Character list */}
        <details>
          <summary style={{ fontFamily: "'Cinzel',serif", fontSize: "10px", letterSpacing: "2px", color: C.goldDim, cursor: "pointer", userSelect: "none", textTransform: "uppercase" }}>
            ▸ Character List ({inDict} found · {charTokens.length - inDict} missing)
          </summary>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px,1fr))", gap: "4px", marginTop: "10px" }}>
            {charTokens.map((token, i) => {
              const entry = dict ? dict[token] : null;
              const pc = entry ? (POS_COLORS[entry.pos] || POS_COLORS.noun) : null;
              return (
                <div key={i} style={{ display: "flex", alignItems: "baseline", gap: "6px", padding: "5px 9px", background: entry ? "rgba(200,170,100,0.05)" : "rgba(150,50,50,0.04)", border: "1px solid", borderColor: entry ? C.borderDim : "#e0c0c0", borderRadius: "3px" }}>
                  <span style={{ fontFamily: "'Noto Serif TC',serif", fontSize: "18px", color: entry ? C.text : "#c08080", minWidth: "28px" }}>{token}</span>
                  {entry
                    ? <><span style={{ fontFamily: "'Cinzel',serif", fontSize: "8px", padding: "1px 5px", borderRadius: "8px", background: pc.bg, border: "1px solid " + pc.border, color: pc.border, whiteSpace: "nowrap" }}>{entry.pos}</span>
                        <span style={{ fontFamily: "'EB Garamond',serif", fontSize: "12px", color: C.textMuted, fontStyle: "italic" }}>{entry.pinyin} — {entry.eng}</span></>
                    : <span style={{ fontFamily: "'Cinzel',serif", fontSize: "8px", color: "#c08080" }}>not in dictionary</span>
                  }
                </div>
              );
            })}
          </div>
        </details>
      </div>
    </div>
  );
}

// ── chinese_matching.js ──────────────────────────
// ─── MATCHING MODE ────────────────────────────────────────────────────────────

const MATCH_COLORS = [
  {light:"rgba(212,168,64,0.12)",  border:"#d4a840"},
  {light:"rgba(80,160,100,0.12)",  border:"#50a064"},
  {light:"rgba(80,120,200,0.12)",  border:"#5078c8"},
  {light:"rgba(200,80,80,0.12)",   border:"#c85050"},
  {light:"rgba(160,80,200,0.12)",  border:"#a050c8"},
  {light:"rgba(80,180,180,0.12)",  border:"#50b4b4"},
  {light:"rgba(200,140,40,0.12)",  border:"#c88c28"},
  {light:"rgba(100,180,80,0.12)",  border:"#64b450"},
];
const PAIRS_PER_ROUND = 8;

function MatchingMode() {
  const allPairs = React.useMemo(()=>CHARACTERS.map(c=>({left:c.char,right:c.eng.split(",")[0].trim()})),[]);
  const [round, setRound]     = React.useState(0);
  const [left, setLeft]       = React.useState([]);
  const [right, setRight]     = React.useState([]);
  const [matched, setMatched] = React.useState({});
  const [selL, setSelL]       = React.useState(null);
  const [selR, setSelR]       = React.useState(null);
  const [wrong, setWrong]     = React.useState({l:null,r:null});
  const [done, setDone]       = React.useState(false);
  const [corr, setCorr]       = React.useState(0);
  const [att, setAtt]         = React.useState(0);

  const startRound = React.useCallback((r)=>{
    const start=(r*PAIRS_PER_ROUND)%allPairs.length;
    const slice=Array.from({length:PAIRS_PER_ROUND},(_,i)=>({...allPairs[(start+i)%allPairs.length],id:i}));
    setLeft(shuffle(slice.map(p=>({id:p.id,text:p.left}))));
    setRight(shuffle(slice.map(p=>({id:p.id,text:p.right}))));
    setMatched({}); setSelL(null); setSelR(null);
    setWrong({l:null,r:null}); setDone(false);
  },[allPairs]);

  React.useEffect(()=>{startRound(0);},[]);

  React.useEffect(()=>{
    if(selL===null||selR===null) return;
    setAtt(a=>a+1);
    if(selL===selR){
      const ci=Object.keys(matched).length%MATCH_COLORS.length;
      const nm={...matched,[selL]:ci};
      setMatched(nm); setCorr(c=>c+1);
      setSelL(null); setSelR(null);
      if(Object.keys(nm).length===PAIRS_PER_ROUND) setTimeout(()=>setDone(true),300);
    } else {
      setWrong({l:selL,r:selR});
      setTimeout(()=>{setWrong({l:null,r:null});setSelL(null);setSelR(null);},650);
    }
  },[selL,selR]);

  const mc=Object.keys(matched).length;
  const acc=att>0?Math.round((corr/att)*100):null;

  const tile=(id,side)=>{
    const isM=matched[id]!==undefined;
    const col=isM?MATCH_COLORS[matched[id]]:null;
    const isSel=side==="l"?selL===id:selR===id;
    const isW=side==="l"?wrong.l===id:wrong.r===id;
    return {
      padding:"10px 8px", border:"1.5px solid",
      borderColor:isM?col.border:isW?"#c85050":isSel?C.gold:C.border,
      borderRadius:"4px",
      background:isM?col.light:isW?"rgba(200,80,80,0.1)":isSel?C.goldFaint:C.card,
      color:isM?col.border:isW?"#c87070":isSel?C.goldLight:C.text,
      cursor:isM?"default":"pointer", transition:"all 0.15s", textAlign:"center",
      userSelect:"none", opacity:isM?0.55:1, textDecoration:isM?"line-through":"none",
      minHeight:"52px", display:"flex", alignItems:"center", justifyContent:"center",
    };
  };

  return (
    <div style={{marginTop:"20px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"12px"}}>
        <div style={{flex:1,height:"3px",background:C.borderDim,borderRadius:"2px",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${(mc/PAIRS_PER_ROUND)*100}%`,background:C.gold,transition:"width 0.4s"}}/>
        </div>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:"10px",color:C.textMuted,whiteSpace:"nowrap"}}>{mc}/{PAIRS_PER_ROUND}{acc!==null?` · ${acc}% acc`:""}</span>
      </div>
      {!done && <div style={{textAlign:"center",marginBottom:"10px",color:C.textMuted,fontSize:"12px",fontFamily:"'Cinzel',serif",letterSpacing:"0.5px"}}>Match each character to its English meaning</div>}
      {done && (
        <div style={{textAlign:"center",padding:"16px",background:C.surface,border:"1px solid "+C.border,borderRadius:"6px",marginBottom:"14px"}}>
          <div style={{fontFamily:"'Noto Serif TC',serif",fontSize:"22px",color:C.text,marginBottom:"4px"}}>
            {acc===100?"善！🎋":acc>=80?"甚好！✓":acc>=60?"尚可":"再學！"}
          </div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"10px",color:C.textMuted,letterSpacing:"1px",marginBottom:"12px"}}>{acc}% ACCURACY</div>
          <button onClick={()=>{setRound(r=>{const n=r+1;startRound(n);return n;});}} style={{fontFamily:"'Cinzel',serif",fontSize:"10px",letterSpacing:"1.5px",padding:"8px 22px",background:C.gold,color:"#1a1000",border:"none",borderRadius:"3px",cursor:"pointer"}}>NEXT ROUND →</button>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"2px",color:C.textMuted,textAlign:"center",paddingBottom:"4px",borderBottom:"1px solid "+C.border}}>CHARACTER</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"2px",color:C.textMuted,textAlign:"center",paddingBottom:"4px",borderBottom:"1px solid "+C.border}}>ENGLISH</div>
        {left.map((item,i)=>(
          <React.Fragment key={item.id}>
            <div onClick={()=>!matched[item.id]&&wrong.l===null&&setSelL(item.id)} style={tile(item.id,"l")}>
              <span style={{fontFamily:"'Noto Serif TC',serif",fontSize:"28px",lineHeight:1}}>{item.text}</span>
            </div>
            <div onClick={()=>!matched[right[i].id]&&wrong.l===null&&setSelR(right[i].id)} style={tile(right[i].id,"r")}>
              <span style={{fontFamily:"'EB Garamond',serif",fontSize:"14px",fontStyle:"italic"}}>{right[i].text}</span>
            </div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
// chinese.html is intentionally thin — all logic lives in the modules above.
//
// Add a passage:       edit chinese_data.js   → PASSAGES
// Add a character:     edit chinese_data.js   → CHARACTERS
// Add a pattern:       edit chinese_data.js   → PATTERNS
// Edit the reader:     edit chinese_reader.js
// Edit the drill:      edit chinese_drill.js  (hanzi builder goes here)
// Edit patterns view:  edit chinese_patterns.js
// Edit matching:       edit chinese_matching.js

const MODES = [
  ["drill",    "✏️  Character Drill"],
  ["reader",   "📖  Reader"],
  ["patterns", "⊞  Grammar Patterns"],
  ["matching", "🔗  Matching"],
];

function App() {
  const [mode, setMode] = React.useState("drill");

  return (
    <div className="gl-page">

      {/* Topbar — matches Danish/Greek/Latin/Sanskrit */}
      <nav className="topbar">
        <a href="../index.html" className="topbar-logo">Glossarium</a>
        <div className="topbar-sep"/>
        <span className="topbar-course">文言文</span>
      </nav>

      <div className="gl-content">
        {/* Mode tabs */}
        <div className="mode-tabs">
          {MODES.map(([m, label]) => (
            <button key={m} onClick={() => setMode(m)}
              className={`mode-tab${mode === m ? " active" : ""}`}>
              {label}
            </button>
          ))}
        </div>

        {mode === "drill"    && <CharDrill />}
        {mode === "reader"   && <ReaderMode />}
        {mode === "patterns" && <PatternsMode />}
        {mode === "matching" && <MatchingMode />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
