<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Classical Chinese — Glossarium</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Noto+Serif+TC:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
/* @@STYLES@@ */
</style>
</head>
<body>
<div id="root"></div>

<!-- Load order: shared → data → components → App -->
<script type="text/babel">
// @@MODULES@@

// ─── APP ──────────────────────────────────────────────────────────────────────
// chinese.html is intentionally thin — all logic lives in the modules above.
//
// Add a passage:       edit chinese_data.js   → PASSAGES
// Add a character:     edit chinese_data.js   → CHARACTERS
// Add a pattern:       edit chinese_data.js   → PATTERNS
// Edit the reader:     edit chinese_reader.js
// Edit the drill:      edit chinese_drill.js  (hanzi builder goes here)
// Edit patterns view:  edit chinese_patterns.js
// Edit matching:       edit chinese_matching.js

const MODES = [
  ["drill",    "✏️  Character Drill"],
  ["reader",   "📖  Reader"],
  ["patterns", "⊞  Grammar Patterns"],
  ["matching", "🔗  Matching"],
];

function App() {
  const [mode, setMode] = React.useState("drill");

  return (
    <div className="gl-page">

      {/* Topbar — matches Danish/Greek/Latin/Sanskrit */}
      <nav className="topbar">
        <a href="../index.html" className="topbar-logo">Glossarium</a>
        <div className="topbar-sep"/>
        <span className="topbar-course">文言文</span>
      </nav>

      <div className="gl-content">
        {/* Mode tabs */}
        <div className="mode-tabs">
          {MODES.map(([m, label]) => (
            <button key={m} onClick={() => setMode(m)}
              className={`mode-tab${mode === m ? " active" : ""}`}>
              {label}
            </button>
          ))}
        </div>

        {mode === "drill"    && <CharDrill />}
        {mode === "reader"   && <ReaderMode />}
        {mode === "patterns" && <PatternsMode />}
        {mode === "matching" && <MatchingMode />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
