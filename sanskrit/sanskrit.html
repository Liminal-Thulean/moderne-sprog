// ─── HELPERS ─────────────────────────────────────────────

function normalize(s) {
  return s.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/ā/g,"a").replace(/ī/g,"i").replace(/ū/g,"u")
    .replace(/ṭ/g,"t").replace(/ḍ/g,"d").replace(/ṇ/g,"n")
    .replace(/ś/g,"s").replace(/ṣ/g,"s")
    .replace(/ḥ/g,"h").replace(/ṃ/g,"m")
    .replace(/ṛ/g,"r").replace(/ṅ/g,"n").replace(/ñ/g,"n")
    .trim();
}

function checkAnswer(input, answer) {
  if (!input.trim()) return "empty";
  const alts = answer.split("/").map(a => normalize(a.trim()));
  return alts.includes(normalize(input)) ? "correct" : "wrong";
}

function getAnswers(cat, word) {
  const pat = cat.type === "conjugation" ? CONJ[cat.pattern] : DECL[cat.pattern];
  return pat.rows.map(row =>
    row.s.map(suf => {
      const stem = (pat.augment && word.augStem) ? word.augStem : word.stem;
      return stem + suf;
    })
  );
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ─── SCORE BAR ────────────────────────────────────────────

function ScoreBar({ score, total, submitted }) {
  if (!submitted) return null;
  const pct = Math.round((score/total)*100);
  const grade =
    pct===100 ? { label:"सुन्दरम्!", color: C.correct }
    : pct>=80  ? { label:"साधु!",    color: "#4a9c6a" }
    : pct>=60  ? { label:"मध्यम्",   color: "#8a7014" }
    :            { label:"पुनः पठ!", color: C.wrong   };
  return (
    <div style={{ padding:"11px 22px", background:"rgba(200,170,100,0.08)", borderBottom:"1px solid "+C.border, display:"flex", alignItems:"center", gap:"14px" }}>
      <div className="deva" style={{ fontSize:"17px", fontWeight:"600", color:grade.color, minWidth:"120px" }}>{grade.label}</div>
      <div style={{ flex:1 }}>
        <div style={{ height:"4px", background:"#e8dfc0", borderRadius:"2px", overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${pct}%`, background:grade.color, borderRadius:"2px", transition:"width 0.6s" }} />
        </div>
      </div>
      <div style={{ fontSize:"13px", color:C.textMuted, minWidth:"70px", textAlign:"right" }}>{score}/{total} · {pct}%</div>
    </div>
  );
}

// ─── MATCHING MODE ────────────────────────────────────────

const PAIRS = 8;

function MatchingMode() {
  const pool = React.useMemo(() => {
    const p = [];
    CATEGORIES.forEach(cat => cat.words.forEach(w => {
      p.push({ left: w.dv + " / " + w.iast, right: w.meaning });
    }));
    return p;
  }, []);

  const [round, setRound] = React.useState(0);
  const [left, setLeft]   = React.useState([]);
  const [right, setRight] = React.useState([]);
  const [matched, setMatched] = React.useState({});
  const [selL, setSelL]   = React.useState(null);
  const [selR, setSelR]   = React.useState(null);
  const [wrong, setWrong] = React.useState({l:null,r:null});
  const [done, setDone]   = React.useState(false);
  const [corr, setCorr]   = React.useState(0);
  const [att, setAtt]     = React.useState(0);

  const startRound = React.useCallback((r) => {
    const start = (r * PAIRS) % pool.length;
    const slice = Array.from({length:PAIRS},(_,i)=>({...pool[(start+i)%pool.length],id:i}));
    setLeft(shuffle(slice.map(p=>({id:p.id,text:p.left}))));
    setRight(shuffle(slice.map(p=>({id:p.id,text:p.right}))));
    setMatched({}); setSelL(null); setSelR(null);
    setWrong({l:null,r:null}); setDone(false);
  },[pool]);

  React.useEffect(()=>{ startRound(0); },[]);

  React.useEffect(()=>{
    if (selL===null||selR===null) return;
    setAtt(a=>a+1);
    if (selL===selR) {
      const ci = Object.keys(matched).length % PAIR_COLORS.length;
      const nm = {...matched, [selL]:ci};
      setMatched(nm); setCorr(c=>c+1);
      setSelL(null); setSelR(null);
      if (Object.keys(nm).length===PAIRS) setTimeout(()=>setDone(true),300);
    } else {
      setWrong({l:selL,r:selR});
      setTimeout(()=>{ setWrong({l:null,r:null}); setSelL(null); setSelR(null); },650);
    }
  },[selL,selR]);

  const mc = Object.keys(matched).length;
  const acc = att>0 ? Math.round((corr/att)*100) : null;

  const tile = (id, side) => {
    const isM = matched[id]!==undefined;
    const c = isM ? PAIR_COLORS[matched[id]] : null;
    const isSel = side==="l"?selL===id:selR===id;
    const isW = side==="l"?wrong.l===id:wrong.r===id;
    return {
      padding:"9px 8px", border:"1.5px solid",
      borderColor: isM?c.border:isW?C.wrong:isSel?C.gold:C.border,
      borderRadius:"4px",
      background: isM?c.light:isW?"rgba(155,35,53,0.12)":isSel?"rgba(212,168,64,0.1)":C.surface,
      color: isM?c.text:isW?C.wrong:isSel?C.gold:C.text,
      cursor:isM?"default":"pointer", transition:"all 0.15s", textAlign:"center",
      userSelect:"none", opacity:isM?0.6:1, textDecoration:isM?"line-through":"none",
      minHeight:"50px", display:"flex", alignItems:"center", justifyContent:"center",
    };
  };

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:"12px", marginBottom:"12px" }}>
        <div style={{ flex:1, height:"4px", background:"#e8dfc0", borderRadius:"2px", overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${(mc/PAIRS)*100}%`, background:"#b8973e", transition:"width 0.4s" }} />
        </div>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", color:C.textMuted, whiteSpace:"nowrap" }}>
          {mc}/{PAIRS}{acc!==null?` · ${acc}% acc`:""}
        </div>
      </div>
      {!done && <div style={{ textAlign:"center", marginBottom:"10px", color:C.textMuted, fontSize:"12px", fontStyle:"italic" }}>Click a Sanskrit word, then its English meaning</div>}
      {done && (
        <div style={{ textAlign:"center", padding:"14px", background:"linear-gradient(180deg,#4a3010,#3a2410)", border:"1px solid #b8973e", borderRadius:"4px", marginBottom:"14px" }}>
          <div className="deva" style={{ fontSize:"18px", color:"#f0e4c4", fontWeight:"700", marginBottom:"4px" }}>
            {acc===100?"सुन्दरम्! 🪷":acc>=80?"साधु! ✓":"पुनः पठ!"}
          </div>
          <div style={{ color:C.textMuted, fontSize:"12px", marginBottom:"10px" }}>{acc}% accuracy</div>
          <button onClick={()=>{ setRound(r=>{ const n=r+1; startRound(n); return n; }); }} style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"1.5px", padding:"8px 20px", background:"#8a6914", color:"#f5f0e8", border:"none", borderRadius:"2px", cursor:"pointer" }}>NEXT ROUND →</button>
        </div>
      )}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"7px 14px" }}>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:"9px", letterSpacing:"2px", color:C.textMuted, textAlign:"center", paddingBottom:"4px", borderBottom:"1px solid "+C.border }}>SANSKRIT</div>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:"9px", letterSpacing:"2px", color:C.textMuted, textAlign:"center", paddingBottom:"4px", borderBottom:"1px solid "+C.border }}>ENGLISH</div>
        {left.map((item,i)=>(
          <React.Fragment key={item.id}>
            <div onClick={()=>!matched[item.id]&&wrong.l===null&&setSelL(item.id)} style={tile(item.id,"l")}>
              <span className="deva" style={{ fontSize:"14px" }}>{item.text}</span>
            </div>
            <div onClick={()=>!matched[right[i].id]&&wrong.l===null&&setSelR(right[i].id)} style={tile(right[i].id,"r")}>
              <span style={{ fontFamily:"'EB Garamond',serif", fontSize:"14px", fontStyle:"italic" }}>{right[i].text}</span>
            </div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

              )}
              <div style={{ marginLeft:"auto", display:"flex", gap:"6px" }}>
                <button onClick={()=>goWord(-1)} style={{ fontFamily:"'Cinzel',serif", fontSize:"9px", letterSpacing:"1px", padding:"8px 12px", background:"transparent", color:C.textMuted, border:"1px solid #c9b48a", borderRadius:"2px", cursor:"pointer" }}>← PREV</button>
                <button onClick={()=>goWord(1)}  style={{ fontFamily:"'Cinzel',serif", fontSize:"9px", letterSpacing:"1px", padding:"8px 12px", background:"#8a6914", color:"#f5f0e8", border:"none", borderRadius:"2px", cursor:"pointer" }}>NEXT →</button>
              </div>
            </div>
          </div>

          <div style={{ marginTop:"12px", fontSize:"11px", color:"#9a7a3a", fontStyle:"italic", textAlign:"center" }}>
            Diacritics optional · ā=a · ī=i · ū=u · ś/ṣ=s · ṭ/ṭh=t/th · ḥ=h · ṛ=r
          </div>
        </>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
