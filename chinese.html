// ─── UTILITIES ───────────────────────────────────────────────────────────────

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function normalise(s) {
  return s.trim().toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g,"");
}

// ─── CHARACTER DRILL ──────────────────────────────────────────────────────────

function CharDrill() {
  const [order]     = React.useState(() => shuffle([...Array(CHARACTERS.length).keys()]));
  const [idx, setIdx] = React.useState(0);
  const [input, setInput]   = React.useState("");
  const [status, setStatus] = React.useState(null); // null | "correct" | "wrong"
  const [showHint, setShowHint] = React.useState(false);
  const [score, setScore]   = React.useState({c:0,w:0});

  const char = CHARACTERS[order[idx % order.length]];

  const check = () => {
    if (!input.trim()) return;
    const answers = char.eng.split(",").map(a => normalise(a));
    const attempt = normalise(input);
    const ok = answers.some(a => attempt === a || a.includes(attempt) || attempt.includes(a.split(" ")[0]));
    if (ok) {
      setStatus("correct");
      setScore(s => ({...s, c:s.c+1}));
    } else {
      setStatus("wrong");
      setScore(s => ({...s, w:s.w+1}));
    }
  };

  const next = () => {
    setIdx(i => i+1);
    setInput(""); setStatus(null); setShowHint(false);
  };

  const total = score.c + score.w;
  const acc = total > 0 ? Math.round((score.c/total)*100) : null;

  return (
    <div style={{marginTop:"20px"}}>
      {/* Progress */}
      <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px"}}>
        <div style={{flex:1,height:"3px",background:C.borderDim,borderRadius:"2px",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${((idx%CHARACTERS.length)/CHARACTERS.length)*100}%`,background:C.gold,transition:"width 0.4s"}}/>
        </div>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:"10px",color:C.textMuted,whiteSpace:"nowrap"}}>
          {idx%CHARACTERS.length+1}/{CHARACTERS.length}{acc!==null?` · ${acc}% acc`:""}
        </span>
      </div>

      {/* Card */}
      <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:"6px",overflow:"hidden",marginBottom:"16px"}}>
        {/* Character display */}
        <div style={{background:"linear-gradient(180deg,#140e04,#1e1508)",padding:"40px 20px",textAlign:"center",borderBottom:"1px solid "+C.border}}>
          <div style={{fontFamily:"'Noto Serif TC',serif",fontSize:"96px",color:C.goldLight,lineHeight:1,marginBottom:"12px",textShadow:"0 2px 20px rgba(212,168,64,0.3)"}}>
            {char.char}
          </div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"2px",color:C.textMuted,textTransform:"uppercase"}}>
            {char.pos}
          </div>
        </div>

        {/* Input area */}
        <div style={{padding:"20px 24px"}}>
          <div style={{fontFamily:"'EB Garamond',serif",fontSize:"13px",color:C.textMuted,marginBottom:"10px",fontStyle:"italic"}}>
            Enter the English meaning:
          </div>
          <div style={{display:"flex",gap:"8px"}}>
            <input
              value={input}
              onChange={e=>{setInput(e.target.value);setStatus(null);}}
              onKeyDown={e=>{if(e.key==="Enter") status?next():check();}}
              disabled={!!status}
              placeholder="e.g. person"
              style={{flex:1,background:C.surface,border:"1px solid",borderColor:status==="correct"?C.green:status==="wrong"?C.red:C.border,borderRadius:"3px",padding:"9px 12px",fontFamily:"'EB Garamond',serif",fontSize:"16px",color:C.text}}
            />
            {!status
              ? <button onClick={check} disabled={!input.trim()} style={{fontFamily:"'Cinzel',serif",fontSize:"10px",letterSpacing:"1.5px",padding:"9px 18px",background:input.trim()?C.gold:"#3a2a10",color:input.trim()?"#1a1000":C.textMuted,border:"none",borderRadius:"3px",cursor:input.trim()?"pointer":"default"}}>CHECK</button>
              : <button onClick={next} style={{fontFamily:"'Cinzel',serif",fontSize:"10px",letterSpacing:"1.5px",padding:"9px 18px",background:C.gold,color:"#1a1000",border:"none",borderRadius:"3px",cursor:"pointer"}}>NEXT →</button>
            }
          </div>

          {/* Feedback */}
          {status==="correct" && (
            <div style={{marginTop:"12px",padding:"10px 14px",background:"rgba(58,138,80,0.12)",border:"1px solid "+C.green,borderRadius:"3px"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"10px",letterSpacing:"1px",color:C.green,marginBottom:"4px"}}>✓ CORRECT</div>
              <div style={{fontFamily:"'EB Garamond',serif",fontSize:"14px",color:C.text}}>{char.eng}</div>
              <div style={{fontFamily:"'EB Garamond',serif",fontSize:"12px",color:C.textMuted,fontStyle:"italic",marginTop:"3px"}}>Pinyin: {char.pinyin}</div>
            </div>
          )}
          {status==="wrong" && (
            <div style={{marginTop:"12px",padding:"10px 14px",background:"rgba(200,64,48,0.1)",border:"1px solid "+C.red,borderRadius:"3px"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"10px",letterSpacing:"1px",color:C.red,marginBottom:"4px"}}>✗ INCORRECT</div>
              <div style={{fontFamily:"'EB Garamond',serif",fontSize:"14px",color:C.text}}>{char.eng}</div>
              <div style={{fontFamily:"'EB Garamond',serif",fontSize:"12px",color:C.textMuted,fontStyle:"italic",marginTop:"3px"}}>Pinyin: {char.pinyin}</div>
            </div>
          )}

          {/* Hint / notes */}
          {char.notes && (
            <button onClick={()=>setShowHint(v=>!v)} style={{marginTop:"10px",background:"transparent",border:"none",fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"1.5px",color:C.textMuted,cursor:"pointer",textTransform:"uppercase",padding:0}}>
              {showHint?"▾ HIDE NOTE":"▸ SHOW NOTE"}
            </button>
          )}
          {showHint && char.notes && (
            <div style={{marginTop:"8px",fontFamily:"'EB Garamond',serif",fontSize:"13px",color:C.textMuted,fontStyle:"italic",lineHeight:"1.6",borderLeft:"2px solid "+C.border,paddingLeft:"12px"}}>
              {char.notes}

          )}

      </div>
    </div>
  );
}

// ─── READER ───────────────────────────────────────────────────────────────────

function ReaderMode() {
  const [dict, setDict]         = React.useState(null);
  const [err, setErr]           = React.useState(null);
  const [pidx, setPidx]         = React.useState(0);
  const [activeId, setActiveId] = React.useState(null);

  React.useEffect(()=>{
    fetch("chinese_dict.json")
      .then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(setDict).catch(e=>setErr(e.message));
  },[]);

  const passage = PASSAGES[pidx];
  // Tokenise: each space-separated item is a token
  const tokens = passage.text.split(" ").filter(t=>t.length>0);
  const charTokens = tokens.filter(t=>/[\u4e00-\u9fff]/.test(t));
  const inDict = dict ? charTokens.filter(t=>dict[t]).length : 0;
  const coverage = charTokens.length>0 ? Math.round((inDict/charTokens.length)*100) : 0;

  const isPunct = t => /^[，。？！；：「」『』、]$/.test(t);
  let wc = 0;

  return (
    <div style={{marginTop:"20px"}}>
      {/* Passage selector */}
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"14px"}}>
        {PASSAGES.map((p,i)=>(
          <button key={p.id} onClick={()=>{setPidx(i);setActiveId(null);}} style={{fontFamily:"'Cinzel',serif",fontSize:"10px",letterSpacing:"0.8px",padding:"5px 14px",border:"1px solid",borderColor:i===pidx?C.gold:C.border,borderRadius:"20px",background:i===pidx?"#2a1e08":"transparent",color:i===pidx?C.goldLight:C.textMuted,cursor:"pointer",transition:"all 0.15s",whiteSpace:"nowrap"}}>
            {p.title}
          </button>
        ))}
      </div>

      {err && (
        <div style={{padding:"14px",background:"rgba(180,30,30,0.08)",border:"1px solid #c88080",borderRadius:"4px",marginBottom:"12px"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"10px",letterSpacing:"1px",color:"#c84040",marginBottom:"5px"}}>DICTIONARY NOT FOUND</div>
          <div style={{fontFamily:"'EB Garamond',serif",fontSize:"13px",color:C.textMuted,lineHeight:"1.6"}}>
            Could not load <code>chinese_dict.json</code>. Ensure it is in the same folder and you are serving from Netlify or <code>npx serve .</code>
          </div>
          <div style={{fontFamily:"'EB Garamond',serif",fontSize:"12px",color:"#c06060",marginTop:"5px",fontStyle:"italic"}}>Error: {err}</div>
        </div>
      )}

      <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:"6px",padding:"24px 28px"}}>
        {/* Header */}
        <div style={{marginBottom:"16px",paddingBottom:"14px",borderBottom:"1px solid "+C.borderDim}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:"8px"}}>
            <div>
              <h2 style={{fontFamily:"'Noto Serif TC',serif",fontSize:"18px",fontWeight:"600",color:C.goldLight,marginBottom:"4px"}}>{passage.title}</h2>
              <div style={{fontFamily:"'EB Garamond',serif",fontStyle:"italic",fontSize:"13px",color:C.textMuted}}>{passage.source} · {passage.date}</div>
            </div>
            {dict && (
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"3px",flexShrink:0}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:"8px",letterSpacing:"1px",color:C.textMuted,textTransform:"uppercase"}}>Dictionary coverage</div>
                <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <div style={{width:"70px",height:"3px",background:C.borderDim,borderRadius:"2px",overflow:"hidden"}}>
                    <div style={{height:"100%",width:coverage+"%",background:coverage>80?C.gold:coverage>50?"#c88030":"#c84030",transition:"width 0.5s"}}/>
                  </div>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:"11px",color:C.goldDim,fontWeight:"600"}}>{coverage}%</span>
                </div>
                <div style={{fontFamily:"'EB Garamond',serif",fontSize:"11px",color:C.textMuted,fontStyle:"italic"}}>{inDict}/{charTokens.length} characters</div>
              </div>
            )}
          </div>
          {passage.intro && <div style={{marginTop:"10px",fontFamily:"'EB Garamond',serif",fontSize:"13px",color:C.textMuted,lineHeight:"1.6",fontStyle:"italic"}}>{passage.intro}</div>}
        </div>

        {/* POS legend */}
        <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"16px",alignItems:"center"}}>
          {Object.entries(POS_COLORS).map(([pos,c])=>(
            <span key={pos} style={{fontFamily:"'Cinzel',serif",fontSize:"8px",letterSpacing:"1px",textTransform:"uppercase",padding:"2px 6px",borderRadius:"10px",background:c.bg,border:"1px solid "+c.border,color:c.border}}>{pos}</span>
          ))}
          <span style={{fontFamily:"'EB Garamond',serif",fontSize:"12px",color:C.textMuted,fontStyle:"italic",marginLeft:"6px"}}>{dict?"hover or tap any character":"loading dictionary…"}</span>
        </div>

        {/* Text */}
        <div style={{fontFamily:"'Noto Serif TC',serif",fontSize:"32px",lineHeight:"2.6",color:C.text,marginBottom:"20px",letterSpacing:"2px"}}>
          {tokens.map((token,i)=>{
            if (isPunct(token)) return <span key={i} style={{color:C.textMuted,fontSize:"28px"}}>{token}</span>;
            const id = wc++;
            const entry = dict ? dict[token] : null;
            const isActive = activeId===id;
            const pc = entry?(POS_COLORS[entry.pos]||POS_COLORS.noun):null;
            return (
              <span key={i} style={{position:"relative",display:"inline-block"}}>
                <span onClick={()=>setActiveId(isActive?null:id)} onMouseEnter={()=>setActiveId(id)} onMouseLeave={()=>setActiveId(null)}
                  style={{cursor:"pointer",
                    borderBottom:isActive?(entry?"2px solid "+C.gold:"2px solid #888"):(entry?"1px dotted "+C.goldDim:"none"),
                    color:isActive?(entry?C.gold:"#888"):C.text,
                    background:isActive?C.goldFaint:"transparent",
                    borderRadius:"2px",padding:"0 1px",transition:"all 0.1s",display:"inline-block"}}>
                  {token}

                {isActive && (
                  <span style={{position:"absolute",bottom:"calc(100% + 10px)",left:"50%",transform:"translateX(-50%)",zIndex:200,width:"260px",background:"#100c04",border:"1px solid "+(entry?C.goldDim:"#555"),borderRadius:"5px",boxShadow:"0 8px 32px rgba(0,0,0,0.7)",padding:"12px 14px",pointerEvents:"none",fontFamily:"'EB Garamond',serif"}}>
                    <span style={{position:"absolute",bottom:"-6px",left:"50%",width:"10px",height:"10px",background:"#100c04",border:"1px solid "+(entry?C.goldDim:"#555"),borderTop:"none",borderLeft:"none",transform:"translateX(-50%) rotate(45deg)",display:"block"}}/>
                    {entry ? <>
                      <div style={{display:"flex",alignItems:"baseline",gap:"10px",marginBottom:"7px",flexWrap:"wrap"}}>
                        <span style={{fontFamily:"'Noto Serif TC',serif",fontSize:"26px",color:C.goldLight,lineHeight:1}}>{token}</span>
                        <span style={{fontSize:"14px",color:C.textMuted,fontStyle:"italic"}}>{entry.pinyin}</span>
                      </div>
                      {entry.pos && <div style={{marginBottom:"6px"}}>
                        <span style={{fontFamily:"'Cinzel',serif",fontSize:"8px",letterSpacing:"1.5px",textTransform:"uppercase",padding:"2px 7px",borderRadius:"10px",background:pc.bg,border:"1px solid "+pc.border,color:pc.border}}>{entry.pos}</span>
                      </div>}
                      <div style={{fontSize:"13px",color:C.goldLight,lineHeight:"1.4",marginBottom:entry.notes?"7px":"0"}}>
                        <span style={{fontFamily:"'Cinzel',serif",fontSize:"7px",letterSpacing:"1px",color:C.textMuted,textTransform:"uppercase",marginRight:"5px"}}>Meaning</span>"{entry.eng}"
                      </div>
                      {entry.notes && <div style={{fontSize:"11px",fontStyle:"italic",color:C.textMuted,borderTop:"1px solid "+C.borderDim,paddingTop:"6px",lineHeight:"1.5"}}>
                        <span style={{fontFamily:"'Cinzel',serif",fontSize:"7px",letterSpacing:"1px",color:"#5a4a2a",textTransform:"uppercase",marginRight:"5px",fontStyle:"normal"}}>Note</span>{entry.notes}
                      </div>}
                    </> : <>
                      <div style={{fontFamily:"'Noto Serif TC',serif",fontSize:"26px",color:"#aaa",marginBottom:"8px",lineHeight:1}}>{token}</div>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"1px",color:"#666",textTransform:"uppercase",marginBottom:"5px"}}>Not yet in dictionary</div>
                      <div style={{fontSize:"11px",color:"#555",fontStyle:"italic"}}>Key to add: <span style={{fontFamily:"monospace",background:"#0a0804",padding:"1px 5px",borderRadius:"2px",color:"#888"}}>"{token}"</span></div>
                    </>}
                  </span>
                )}
              </span>
            );
          })}
        </div>

        {/* Word list */}
        <details>
          <summary style={{fontFamily:"'Cinzel',serif",fontSize:"10px",letterSpacing:"2px",color:C.goldDim,cursor:"pointer",userSelect:"none",textTransform:"uppercase"}}>
            ▸ Character List {dict?`(${inDict} found · ${charTokens.length-inDict} missing)`:""}
          </summary>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:"4px",marginTop:"10px"}}>
            {charTokens.map((token,i)=>{
              const entry=dict?dict[token]:null;
              const pc=entry?(POS_COLORS[entry.pos]||POS_COLORS.noun):null;
              return (
                <div key={i} style={{display:"flex",alignItems:"baseline",gap:"8px",padding:"6px 10px",background:entry?C.goldFaint:"rgba(150,50,50,0.06)",border:"1px solid",borderColor:entry?C.borderDim:"#3a2020",borderRadius:"3px"}}>
                  <span style={{fontFamily:"'Noto Serif TC',serif",fontSize:"20px",color:entry?C.gold:"#c08080",minWidth:"28px",lineHeight:1}}>{token}</span>
                  {entry?<>
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:"8px",padding:"1px 5px",borderRadius:"8px",background:pc.bg,border:"1px solid "+pc.border,color:pc.border,whiteSpace:"nowrap"}}>{entry.pos}</span>
                    <span style={{fontFamily:"'EB Garamond',serif",fontSize:"12px",color:C.textMuted,fontStyle:"italic"}}>{entry.eng.split(",")[0]}</span>
                  </>:<span style={{fontFamily:"'Cinzel',serif",fontSize:"8px",color:"#c08080"}}>{dict?"not in dictionary":"loading…"}</span>}
                </div>

        </details>
      </div>
    </div>
  );
}

// ─── MATCHING MODE ────────────────────────────────────────────────────────────

const MATCH_COLORS = [
  {light:"rgba(212,168,64,0.12)",  border:"#d4a840"},
  {light:"rgba(80,160,100,0.12)",  border:"#50a064"},
  {light:"rgba(80,120,200,0.12)",  border:"#5078c8"},
  {light:"rgba(200,80,80,0.12)",   border:"#c85050"},
  {light:"rgba(160,80,200,0.12)",  border:"#a050c8"},
  {light:"rgba(80,180,180,0.12)",  border:"#50b4b4"},
  {light:"rgba(200,140,40,0.12)",  border:"#c88c28"},
  {light:"rgba(100,180,80,0.12)",  border:"#64b450"},
];
const PAIRS_PER_ROUND = 8;

function MatchingMode() {
  const allPairs = React.useMemo(()=>CHARACTERS.map(c=>({left:c.char,right:c.eng.split(",")[0].trim()})),[]);
  const [round, setRound]     = React.useState(0);
  const [left, setLeft]       = React.useState([]);
  const [right, setRight]     = React.useState([]);
  const [matched, setMatched] = React.useState({});
  const [selL, setSelL]       = React.useState(null);
  const [selR, setSelR]       = React.useState(null);
  const [wrong, setWrong]     = React.useState({l:null,r:null});
  const [done, setDone]       = React.useState(false);
  const [corr, setCorr]       = React.useState(0);
  const [att, setAtt]         = React.useState(0);

  const startRound = React.useCallback((r)=>{
    const start=(r*PAIRS_PER_ROUND)%allPairs.length;
    const slice=Array.from({length:PAIRS_PER_ROUND},(_,i)=>({...allPairs[(start+i)%allPairs.length],id:i}));
    setLeft(shuffle(slice.map(p=>({id:p.id,text:p.left}))));
    setRight(shuffle(slice.map(p=>({id:p.id,text:p.right}))));
    setMatched({}); setSelL(null); setSelR(null);
    setWrong({l:null,r:null}); setDone(false);
  },[allPairs]);

  React.useEffect(()=>{startRound(0);},[]);

  React.useEffect(()=>{
    if(selL===null||selR===null) return;
    setAtt(a=>a+1);
    if(selL===selR){
      const ci=Object.keys(matched).length%MATCH_COLORS.length;
      const nm={...matched,[selL]:ci};
      setMatched(nm); setCorr(c=>c+1);
      setSelL(null); setSelR(null);
      if(Object.keys(nm).length===PAIRS_PER_ROUND) setTimeout(()=>setDone(true),300);
    } else {
      setWrong({l:selL,r:selR});
      setTimeout(()=>{setWrong({l:null,r:null});setSelL(null);setSelR(null);},650);
    }
  },[selL,selR]);

  const mc=Object.keys(matched).length;
  const acc=att>0?Math.round((corr/att)*100):null;

  const tile=(id,side)=>{
    const isM=matched[id]!==undefined;
    const col=isM?MATCH_COLORS[matched[id]]:null;
    const isSel=side==="l"?selL===id:selR===id;
    const isW=side==="l"?wrong.l===id:wrong.r===id;
    return {
      padding:"10px 8px", border:"1.5px solid",
      borderColor:isM?col.border:isW?"#c85050":isSel?C.gold:C.border,
      borderRadius:"4px",
      background:isM?col.light:isW?"rgba(200,80,80,0.1)":isSel?C.goldFaint:C.card,
      color:isM?col.border:isW?"#c87070":isSel?C.goldLight:C.text,
      cursor:isM?"default":"pointer", transition:"all 0.15s", textAlign:"center",
      userSelect:"none", opacity:isM?0.55:1, textDecoration:isM?"line-through":"none",
      minHeight:"52px", display:"flex", alignItems:"center", justifyContent:"center",
    };
  };

  return (
    <div style={{marginTop:"20px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"12px"}}>
        <div style={{flex:1,height:"3px",background:C.borderDim,borderRadius:"2px",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${(mc/PAIRS_PER_ROUND)*100}%`,background:C.gold,transition:"width 0.4s"}}/>
        </div>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:"10px",color:C.textMuted,whiteSpace:"nowrap"}}>{mc}/{PAIRS_PER_ROUND}{acc!==null?` · ${acc}% acc`:""}</span>
      </div>
      {!done && <div style={{textAlign:"center",marginBottom:"10px",color:C.textMuted,fontSize:"12px",fontFamily:"'Cinzel',serif",letterSpacing:"0.5px"}}>Match each character to its English meaning</div>}
      {done && (
        <div style={{textAlign:"center",padding:"16px",background:C.card,border:"1px solid "+C.border,borderRadius:"6px",marginBottom:"14px"}}>
          <div style={{fontFamily:"'Noto Serif TC',serif",fontSize:"22px",color:C.goldLight,marginBottom:"4px"}}>
            {acc===100?"善！🎋":acc>=80?"甚好！✓":acc>=60?"尚可":"再學！"}
          </div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"10px",color:C.textMuted,letterSpacing:"1px",marginBottom:"12px"}}>{acc}% ACCURACY</div>
          <button onClick={()=>{setRound(r=>{const n=r+1;startRound(n);return n;});}} style={{fontFamily:"'Cinzel',serif",fontSize:"10px",letterSpacing:"1.5px",padding:"8px 22px",background:C.gold,color:"#1a1000",border:"none",borderRadius:"3px",cursor:"pointer"}}>NEXT ROUND →</button>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"2px",color:C.textMuted,textAlign:"center",paddingBottom:"4px",borderBottom:"1px solid "+C.border}}>CHARACTER</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"2px",color:C.textMuted,textAlign:"center",paddingBottom:"4px",borderBottom:"1px solid "+C.border}}>ENGLISH</div>
        {left.map((item,i)=>(
          <React.Fragment key={item.id}>
            <div onClick={()=>!matched[item.id]&&wrong.l===null&&setSelL(item.id)} style={tile(item.id,"l")}>
              <span style={{fontFamily:"'Noto Serif TC',serif",fontSize:"28px",lineHeight:1}}>{item.text}</span>
            </div>
            <div onClick={()=>!matched[right[i].id]&&wrong.l===null&&setSelR(right[i].id)} style={tile(right[i].id,"r")}>
              <span style={{fontFamily:"'EB Garamond',serif",fontSize:"14px",fontStyle:"italic"}}>{right[i].text}</span>
            </div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

        <div style={{display:"flex",flexWrap:"wrap",marginTop:"24px",borderBottom:"2px solid "+C.border}}>
          {MODES.map(([m,label])=>(
            <button key={m} onClick={()=>setMode(m)} style={{fontFamily:"'Cinzel',serif",fontSize:"10px",letterSpacing:"0.8px",padding:"9px 18px",border:"none",borderBottom:mode===m?"2px solid "+C.gold:"2px solid transparent",marginBottom:"-2px",background:mode===m?C.card:"transparent",color:mode===m?C.goldLight:C.textMuted,cursor:"pointer",fontWeight:mode===m?"600":"400",transition:"all 0.15s",whiteSpace:"nowrap"}}>
              {label}
            </button>
          ))}
        </div>

        {mode==="drill"    && <CharDrill />}
        {mode==="reader"   && <ReaderMode />}
        {mode==="patterns" && <PatternsMode />}
        {mode==="matching" && <MatchingMode />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
