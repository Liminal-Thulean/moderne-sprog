// ─── HELPERS ──────────────────────────────────────────────────────────────────

function normalize(str) {
  // Allow ø=oe, å=aa, æ=ae as alternates
  return str.trim().toLowerCase()
    .replace(/ø/g, "oe").replace(/å/g, "aa").replace(/æ/g, "ae")
    .replace(/\s*\/\s*.*/g, "") // take first of "x / y" alternates
    .trim();
}

function checkAnswer(input, answer) {
  if (!input.trim()) return "empty";
  const normInput = normalize(input);
  // Check against all "/" separated alternatives
  const alts = answer.split("/").map(a => normalize(a.trim()));
  return (alts.includes(normInput) || alts.includes(normalize(input))) ? "correct" : "wrong";
}

// ─── SCORE BAR ────────────────────────────────────────────────────────────────

function ScoreBar({ score, total, submitted }) {
  if (!submitted) return null;
  const pct = Math.round((score / total) * 100);
  const grade =
    pct === 100 ? { label: "Fremragende!", color: "#2d7a4f" }
    : pct >= 80  ? { label: "Godt klaret!", color: "#3a8a5a" }
    : pct >= 60  ? { label: "Ikke dårligt", color: "#8a7014" }
    :              { label: "Øv! Prøv igen", color: "#c8403a" };
  return (
    <div style={{ padding:"12px 24px", background:"#f8faf8", borderBottom:"1px solid #e0eae0", display:"flex", alignItems:"center", gap:"16px" }}>
      <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"16px", fontWeight:"600", color:grade.color, minWidth:"150px" }}>{grade.label}</div>
      <div style={{ flex:1 }}>
        <div style={{ height:"5px", background:"#e0eae0", borderRadius:"3px", overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${pct}%`, background:grade.color, borderRadius:"3px", transition:"width 0.6s ease" }} />
        </div>
      </div>
      <div style={{ fontSize:"13px", color: COLORS.textMuted, fontWeight:"500", minWidth:"80px", textAlign:"right" }}>{score}/{total} · {pct}%</div>
    </div>
  );
}

// ─── MATCHING MODE ────────────────────────────────────────────────────────────

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

const PAIRS_PER_ROUND = 8;

const MATCH_COLORS = [
  { light:"rgba(200,64,58,0.1)",    border:"#c8403a", text:"#c8403a" },
  { light:"rgba(30,100,60,0.1)",    border:"#1a6a40", text:"#2a8a50" },
  { light:"rgba(30,80,160,0.1)",    border:"#1a50aa", text:"#2a70cc" },
  { light:"rgba(140,80,0,0.1)",     border:"#8a5000", text:"#aa6810" },
  { light:"rgba(80,30,120,0.1)",    border:"#501e78", text:"#7030aa" },
  { light:"rgba(0,120,120,0.1)",    border:"#007878", text:"#009a9a" },
  { light:"rgba(160,100,0,0.1)",    border:"#a06400", text:"#c07800" },
  { light:"rgba(20,80,20,0.1)",     border:"#145014", text:"#1a6e1a" },
];

function buildMatchPool() {
  const pool = [];
  CATEGORIES.forEach(cat => cat.words.forEach(w => {
    const danish = cat.type === "noun" ? w.indef_sg
      : cat.type === "verb" ? w.infinitive
      : cat.type === "adjective" ? w.common
      : w.en;
    if (danish && danish !== "—") pool.push({ left: w.en, right: danish });
  }));
  return pool;
}

function MatchingMode() {
  const allPairs = React.useMemo(() => buildMatchPool(), []);
  const [round, setRound]     = React.useState(0);
  const [left, setLeft]       = React.useState([]);
  const [right, setRight]     = React.useState([]);
  const [matched, setMatched] = React.useState({});
  const [selL, setSelL]       = React.useState(null);
  const [selR, setSelR]       = React.useState(null);
  const [wrong, setWrong]     = React.useState({l:null, r:null});
  const [done, setDone]       = React.useState(false);
  const [corr, setCorr]       = React.useState(0);
  const [att, setAtt]         = React.useState(0);

  const startRound = React.useCallback((r) => {
    const start = (r * PAIRS_PER_ROUND) % allPairs.length;
    const slice = Array.from({length:PAIRS_PER_ROUND}, (_,i) => ({
      ...allPairs[(start+i) % allPairs.length], id: i
    }));
    setLeft(shuffle(slice.map(p => ({id:p.id, text:p.left}))));
    setRight(shuffle(slice.map(p => ({id:p.id, text:p.right}))));
    setMatched({}); setSelL(null); setSelR(null);
    setWrong({l:null,r:null}); setDone(false);
  }, [allPairs]);

  React.useEffect(() => { startRound(0); }, []);

  React.useEffect(() => {
    if (selL===null || selR===null) return;
    setAtt(a => a+1);
    if (selL === selR) {
      const ci = Object.keys(matched).length % MATCH_COLORS.length;
      const nm = {...matched, [selL]: ci};
      setMatched(nm); setCorr(c => c+1);
      setSelL(null); setSelR(null);
      if (Object.keys(nm).length === PAIRS_PER_ROUND) setTimeout(() => setDone(true), 300);
    } else {
      setWrong({l:selL, r:selR});
      setTimeout(() => { setWrong({l:null,r:null}); setSelL(null); setSelR(null); }, 650);
    }
  }, [selL, selR]);

  const mc = Object.keys(matched).length;
  const acc = att > 0 ? Math.round((corr/att)*100) : null;

  const tile = (id, side) => {
    const isM = matched[id] !== undefined;
    const c = isM ? MATCH_COLORS[matched[id]] : null;
    const isSel = side==="l" ? selL===id : selR===id;
    const isW   = side==="l" ? wrong.l===id : wrong.r===id;
    return {
      padding:"10px 10px", border:"1.5px solid",
      borderColor: isM?c.border : isW?COLORS.wrong : isSel?COLORS.accent : COLORS.border,
      borderRadius:"5px",
      background: isM?c.light : isW?"rgba(200,64,58,0.08)" : isSel?"rgba(200,64,58,0.05)" : COLORS.card,
      color: isM?c.text : isW?COLORS.wrong : isSel?COLORS.accent : COLORS.text,
      cursor: isM?"default":"pointer", transition:"all 0.15s", textAlign:"center",
      userSelect:"none", opacity:isM?0.55:1, textDecoration:isM?"line-through":"none",
      minHeight:"50px", display:"flex", alignItems:"center", justifyContent:"center",
    };
  };

  return (
    <div style={{ marginTop:"16px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:"12px", marginBottom:"12px" }}>
        <div style={{ flex:1, height:"4px", background:COLORS.border, borderRadius:"2px", overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${(mc/PAIRS_PER_ROUND)*100}%`, background:COLORS.accent, transition:"width 0.4s" }} />
        </div>
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"10px", color:COLORS.textMuted, whiteSpace:"nowrap" }}>
          {mc}/{PAIRS_PER_ROUND}{acc!==null ? ` · ${acc}% acc` : ""}
        </div>
      </div>
      {!done && <div style={{ textAlign:"center", marginBottom:"10px", color:COLORS.textMuted, fontSize:"12px", fontFamily:"'DM Sans',sans-serif" }}>Click an English word, then its Danish translation</div>}
      {done && (
        <div style={{ textAlign:"center", padding:"16px", background:"#fafcfa", border:"1px solid "+COLORS.border, borderRadius:"6px", marginBottom:"14px" }}>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"20px", color:COLORS.accent, fontWeight:"700", marginBottom:"4px" }}>
            {acc===100 ? "Fremragende! 🇩🇰" : acc>=80 ? "Godt klaret! ✓" : acc>=60 ? "Ikke dårligt" : "Øv! Prøv igen"}
          </div>
          <div style={{ color:COLORS.textMuted, fontSize:"12px", fontFamily:"'DM Sans',sans-serif", marginBottom:"12px" }}>{acc}% accuracy</div>
          <button onClick={() => { setRound(r => { const n=r+1; startRound(n); return n; }); }}
            style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"10px", letterSpacing:"1.5px", fontWeight:"600", padding:"8px 22px", background:COLORS.accent, color:"#fff", border:"none", borderRadius:"3px", cursor:"pointer" }}>
            NEXT ROUND →
          </button>
        </div>
      )}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px 16px" }}>
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"9px", letterSpacing:"2px", color:COLORS.textMuted, textAlign:"center", paddingBottom:"4px", borderBottom:"1px solid "+COLORS.border, fontWeight:"600" }}>ENGLISH</div>
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"9px", letterSpacing:"2px", color:COLORS.textMuted, textAlign:"center", paddingBottom:"4px", borderBottom:"1px solid "+COLORS.border, fontWeight:"600" }}>DANISH</div>
        {left.map((item, i) => (
          <React.Fragment key={item.id}>
            <div onClick={() => !matched[item.id] && wrong.l===null && setSelL(item.id)} style={tile(item.id,"l")}>
              <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"14px", fontWeight:"500" }}>{item.text}</span>
            </div>
            <div onClick={() => !matched[right[i].id] && wrong.l===null && setSelR(right[i].id)} style={tile(right[i].id,"r")}>
              <span style={{ fontFamily:"'Source Serif 4',serif", fontSize:"15px" }}>{right[i].text}</span>
            </div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

          </div>
          <div style={{ marginBottom:"6px" }}>
            <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"8px", letterSpacing:"1.5px", textTransform:"uppercase", padding:"2px 7px", borderRadius:"10px", background:pc.bg, border:"1px solid "+pc.border, color:pc.border, fontWeight:"600" }}>{token.pos}</span>
          </div>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"11px", color:COLORS.textMuted, marginBottom:"5px", lineHeight:"1.4" }}>
            <span style={{ fontSize:"8px", letterSpacing:"1px", color:"#aabcaa", textTransform:"uppercase", marginRight:"5px" }}>Form</span>{token.parse}
          </div>
          <div style={{ fontFamily:"'Source Serif 4',serif", fontSize:"14px", color:COLORS.text, fontWeight:"600", marginBottom:token.note?"7px":"0", lineHeight:"1.4" }}>
            <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"8px", letterSpacing:"1px", color:"#aabcaa", textTransform:"uppercase", marginRight:"5px", fontWeight:"400" }}>Meaning</span>"{token.eng}"
          </div>
          {token.note && (
            <div style={{ fontFamily:"'Source Serif 4',serif", fontSize:"12px", fontStyle:"italic", color:COLORS.textMuted, borderTop:"1px solid "+COLORS.border, paddingTop:"6px", lineHeight:"1.5" }}>
              <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"8px", letterSpacing:"1px", color:"#aabcaa", textTransform:"uppercase", marginRight:"5px", fontStyle:"normal", fontWeight:"600" }}>Note</span>{token.note}
            </div>
          )}
        </span>
      )}
    </span>
  );
}

function ReaderMode() {
  const [pidx, setPidx] = React.useState(0);
  const [activeId, setActiveId] = React.useState(null);
  const passage = PASSAGES[pidx];
  let wc = 0;
  return (
    <div style={{ marginTop:"16px" }}>
      <div style={{ display:"flex", flexWrap:"wrap", gap:"6px", marginBottom:"14px" }}>
        {PASSAGES.map((p,i) => (
          <button key={p.id} onClick={()=>{ setPidx(i); setActiveId(null); }} style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"10px", letterSpacing:"0.5px", fontWeight:"500", padding:"5px 14px", border:"1px solid", borderColor:i===pidx?COLORS.accent:COLORS.border, borderRadius:"20px", background:i===pidx?COLORS.headerBg:"transparent", color:i===pidx?"#fff":COLORS.textMuted, cursor:"pointer", transition:"all 0.15s", whiteSpace:"nowrap" }}>
            {p.author} · {p.title}
          </button>
        ))}
      </div>
      <div style={{ background:COLORS.card, border:"1px solid "+COLORS.border, borderRadius:"6px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)", padding:"24px 28px" }}>
        <div style={{ marginBottom:"14px", paddingBottom:"12px", borderBottom:"1px solid "+COLORS.border }}>
          <h2 style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"17px", fontWeight:"600", color:COLORS.text, marginBottom:"3px" }}>{passage.title}</h2>
          <div style={{ fontFamily:"'Source Serif 4',serif", fontStyle:"italic", fontSize:"13px", color:COLORS.textMuted }}>{passage.author} · <em>{passage.work}</em> · {passage.date}</div>
          {passage.intro && <div style={{ marginTop:"8px", fontFamily:"'Source Serif 4',serif", fontSize:"13px", color:COLORS.textMuted, lineHeight:"1.6", fontStyle:"italic" }}>{passage.intro}</div>}
        </div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:"4px", marginBottom:"14px" }}>
          {Object.entries(POS_COLORS_D).map(([pos,c])=>(
            <span key={pos} style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"8px", letterSpacing:"1px", textTransform:"uppercase", padding:"2px 6px", borderRadius:"10px", background:c.bg, border:"1px solid "+c.border, color:c.border, fontWeight:"600" }}>{pos}</span>
          ))}
          <span style={{ fontFamily:"'Source Serif 4',serif", fontSize:"12px", color:COLORS.textMuted, fontStyle:"italic", marginLeft:"6px", alignSelf:"center" }}>hover or tap any word</span>
        </div>
        <div style={{ fontFamily:"'Source Serif 4',serif", fontSize:"22px", lineHeight:"2.4", color:COLORS.text, marginBottom:"18px" }}>
          {passage.lines.map((line,li)=>(
            <span key={li}>
              {line.map((token,ti)=>{
                if (typeof token==="string") return <span key={ti} style={{color:COLORS.textMuted}}>{token}</span>;
                const id=wc++;
                return <WordTokenD key={ti} token={token} activeId={activeId} setActiveId={setActiveId} idx={id} />;
              })}
              {li<passage.lines.length-1 && " "}
            </span>
          ))}
        </div>
        <details>
          <summary style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"10px", letterSpacing:"2px", color:COLORS.textMuted, cursor:"pointer", userSelect:"none", textTransform:"uppercase", fontWeight:"600" }}>▸ Full Word List</summary>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(250px,1fr))", gap:"4px", marginTop:"10px" }}>
            {passage.lines.flat().filter(t=>typeof t==="object").map((token,i)=>{
              const pc=POS_COLORS_D[token.pos]||POS_COLORS_D.noun;
              return (
                <div key={i} style={{ display:"flex", alignItems:"baseline", gap:"6px", padding:"5px 9px", background:"rgba(26,100,48,0.04)", border:"1px solid "+COLORS.border, borderRadius:"3px" }}>
                  <span style={{ fontFamily:"'Source Serif 4',serif", fontSize:"15px", color:COLORS.accent, minWidth:"80px" }}>{token.w}</span>
                  <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"8px", padding:"1px 5px", borderRadius:"8px", background:pc.bg, border:"1px solid "+pc.border, color:pc.border, whiteSpace:"nowrap", fontWeight:"600" }}>{token.pos}</span>
                  <span style={{ fontFamily:"'Source Serif 4',serif", fontSize:"12px", color:COLORS.textMuted, fontStyle:"italic" }}>{token.eng}</span>
                </div>
              );
            })}
          </div>
        </details>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  const [mode, setMode] = React.useState("tables");
  const [catIdx, setCatIdx] = React.useState(0);
  const [wordIdx, setWordIdx] = React.useState(0);
  const [inputs, setInputs] = React.useState({});
  const [submitted, setSubmitted] = React.useState(false);
  const [showAnswers, setShowAnswers] = React.useState(false);

  const category = CATEGORIES[catIdx];
  const word = category.words[wordIdx];
  const tag = TAG[category.type] || TAG.noun;

  // Count all fillable cells
  const allKeys = React.useMemo(() => {
    if (category.type === "noun") return ["indef_sg","def_sg","indef_pl","def_pl"].filter(k => word[k] !== "—");
    if (category.type === "verb") return ["infinitive","present","past","future","perfect"];
    if (category.type === "adjective") return ["common","neuter","plural","definite"];
    if (category.type === "pronoun") {
      const keys = [];
      word.tables.forEach((t,ti) => t.rows.forEach((row,ri) => row.answers.forEach((_,ci) => keys.push(`${ti}-${ri}-${ci}`))));
      return keys;
    }
    return [];
  }, [catIdx, wordIdx]);

  const total = allKeys.length;
  const filledCount = allKeys.filter(k => inputs[k]?.trim()).length;

  const score = React.useMemo(() => {
    if (!submitted) return 0;
    return allKeys.filter(k => {
      const val = inputs[k] || "";
      let answer = "";
      if (category.type === "noun") answer = word[k];
      else if (category.type === "verb") answer = word[k];
      else if (category.type === "adjective") answer = word[k];
      else if (category.type === "pronoun") {
        const [ti,ri,ci] = k.split("-").map(Number);
        answer = word.tables[ti].rows[ri].answers[ci];
      }
      return checkAnswer(val, answer) === "correct";
    }).length;
  }, [submitted, inputs, catIdx, wordIdx]);

  const handleInput = (key, val) => {
    setInputs(p => ({ ...p, [key]: val }));
    if (submitted) setSubmitted(false);
  };
  const reset = () => { setInputs({}); setSubmitted(false); setShowAnswers(false); };
  const goWord = (dir) => { setWordIdx((wordIdx + dir + category.words.length) % category.words.length); reset(); };
  const goCategory = (idx) => { setCatIdx(idx); setWordIdx(0); reset(); };

  const wordDisplay = category.type === "pronoun" ? word.en
    : category.type === "noun" ? word.en
    : word.en;

  return (
    <div style={{ minHeight:"100vh", background: COLORS.bg, fontFamily:"'Source Serif 4','Georgia',serif", color: COLORS.text, paddingBottom:"60px" }}>

      {/* Header — Danish flag red */}
      <header style={{ background: COLORS.headerBg, padding:"20px 32px 16px", display:"flex", alignItems:"flex-end", gap:"20px", borderBottom:"4px solid "+COLORS.accentDark }}>
        <div>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"10px", letterSpacing:"4px", color:"rgba(255,255,255,0.6)", marginBottom:"4px", fontWeight:"500" }}>DANSK GRAMMATIK</div>
          <h1 style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"22px", fontWeight:"600", color:"#ffffff", margin:0, letterSpacing:"0.5px" }}>Danish Practice Tables</h1>
        </div>
        <div style={{ marginLeft:"auto", fontStyle:"italic", color:"rgba(255,255,255,0.5)", fontSize:"13px", paddingBottom:"2px" }}>
          Øvelse gør mester
        </div>
      </header>

      <div style={{ maxWidth:"860px", margin:"0 auto", padding:"0 20px" }}>

        {/* Mode tabs */}
        <div style={{ display:"flex", marginTop:"20px", borderBottom:"2px solid "+COLORS.border }}>
          {[["tables","📋  Practice Tables"],["matching","🔗  Vocabulary Matching"],["reader","📖  Reader"]].map(([m,label]) => (
            <button key={m} onClick={()=>setMode(m)} style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"11px", letterSpacing:"0.5px", fontWeight:mode===m?"600":"400", padding:"9px 20px", border:"none", borderBottom:mode===m?"2px solid "+COLORS.accent:"2px solid transparent", marginBottom:"-2px", background:mode===m?COLORS.card:"transparent", color:mode===m?COLORS.accent:COLORS.textMuted, cursor:"pointer", transition:"all 0.15s" }}>
              {label}
            </button>
          ))}
        </div>

        {/* MATCHING MODE */}
        {mode === "matching" && <MatchingMode />}

        {/* READER MODE */}
        {mode === "reader" && <ReaderMode />}

        {/* TABLES MODE */}
        {mode === "tables" && <div>

        {/* Category pills */}
        <div style={{ marginTop:"20px", display:"flex", flexWrap:"wrap", gap:"5px" }}>
          {CATEGORIES.map((cat, i) => {
            const tc = TAG[cat.type] || TAG.noun;
            const active = i === catIdx;
            return (
              <button key={cat.id} onClick={() => goCategory(i)} style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"10px", letterSpacing:"0.8px", fontWeight:"500", padding:"4px 12px", border:"1px solid", borderColor: active?tc.text+"88":"#c8d8c8", borderRadius:"20px", background: active?tc.bg:"transparent", color: active?tc.text: COLORS.textMuted, cursor:"pointer", whiteSpace:"nowrap" }}>
                {cat.label}
                <span style={{ opacity:0.65, marginLeft:"4px", fontSize:"9px" }}>{cat.sublabel}</span>
              </button>
            );
          })}
        </div>

        {/* Card */}
        <div style={{ marginTop:"16px", background: COLORS.card, border:"1px solid "+COLORS.border, borderRadius:"6px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)", overflow:"hidden" }}>

          {/* Card header */}
          <div style={{ background:"#fafcfa", borderBottom:"2px solid "+COLORS.border, padding:"14px 22px", display:"flex", alignItems:"center", gap:"14px" }}>
            <button onClick={() => goWord(-1)} style={{ background:COLORS.bg, border:"1px solid "+COLORS.border, borderRadius:"3px", color: COLORS.accent, cursor:"pointer", width:"30px", height:"30px", fontSize:"17px", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:"bold" }}>‹</button>

            <div style={{ flex:1 }}>
              <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"18px", fontWeight:"600", color: COLORS.text }}>{wordDisplay}</div>
              <div style={{ display:"flex", alignItems:"center", gap:"8px", marginTop:"3px" }}>
                <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"8px", letterSpacing:"1.5px", padding:"2px 7px", borderRadius:"10px", background:tag.bg, color:tag.text, border:`1px solid ${tag.text}44`, fontWeight:"600" }}>{category.type.toUpperCase()}</span>
                <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"9px", color: COLORS.textMuted, letterSpacing:"0.5px" }}>{category.sublabel}</span>
              </div>
            </div>

            <div style={{ textAlign:"center", color: COLORS.textMuted, fontSize:"11px", flexShrink:0, fontFamily:"'DM Sans',sans-serif" }}>
              <div style={{ fontSize:"15px", color: COLORS.accent, fontWeight:"700" }}>{wordIdx+1}</div>
              <div>of {category.words.length}</div>
            </div>

            <button onClick={() => goWord(1)} style={{ background:COLORS.bg, border:"1px solid "+COLORS.border, borderRadius:"3px", color: COLORS.accent, cursor:"pointer", width:"30px", height:"30px", fontSize:"17px", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:"bold" }}>›</button>
          </div>

          <ScoreBar score={score} total={total} submitted={submitted} />

          {/* Content */}
          <div style={{ padding:"18px 22px" }}>
            {category.type === "noun" && (
              <NounTable word={word} inputs={inputs} submitted={submitted} showAnswers={showAnswers} onInput={handleInput} />
            )}
            {category.type === "verb" && (
              <VerbTable word={word} inputs={inputs} submitted={submitted} showAnswers={showAnswers} onInput={handleInput} />
            )}
            {category.type === "adjective" && (
              <AdjectiveTable word={word} inputs={inputs} submitted={submitted} showAnswers={showAnswers} onInput={handleInput} />
            )}
            {category.type === "pronoun" && (
              <PronounTableGroup tables={word.tables} inputs={inputs} submitted={submitted} showAnswers={showAnswers} onInput={handleInput} />
            )}
          </div>

          {/* Controls */}
          <div style={{ padding:"13px 22px 17px", borderTop:"1px solid "+COLORS.border, display:"flex", alignItems:"center", gap:"9px", flexWrap:"wrap" }}>
            <button onClick={() => setSubmitted(true)} disabled={filledCount===0}
              style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"10px", letterSpacing:"1.5px", fontWeight:"600", padding:"8px 20px", background: filledCount===0?"#c8d8c8":COLORS.accent, color:"#fff", border:"none", borderRadius:"3px", cursor:filledCount===0?"default":"pointer" }}>
              GRADE ({filledCount}/{total})
            </button>
            <button onClick={reset} style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"10px", letterSpacing:"1.5px", fontWeight:"600", padding:"8px 16px", background:"transparent", color: COLORS.textMuted, border:"1px solid "+COLORS.border, borderRadius:"3px", cursor:"pointer" }}>RESET</button>
            {submitted && score < total && (
              <button onClick={() => setShowAnswers(v => !v)} style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"10px", letterSpacing:"1.5px", fontWeight:"600", padding:"8px 16px", background:"transparent", color: showAnswers?COLORS.correct:COLORS.wrong, border:"1px solid", borderColor: showAnswers?COLORS.correct:COLORS.border, borderRadius:"3px", cursor:"pointer" }}>
                {showAnswers ? "HIDE ANSWERS" : "SHOW ANSWERS"}
              </button>
            )}
            <div style={{ marginLeft:"auto", display:"flex", gap:"7px" }}>
              <button onClick={() => goWord(-1)} style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"9px", letterSpacing:"1px", fontWeight:"600", padding:"8px 13px", background:"transparent", color: COLORS.textMuted, border:"1px solid "+COLORS.border, borderRadius:"3px", cursor:"pointer" }}>← PREV</button>
              <button onClick={() => goWord(1)} style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"9px", letterSpacing:"1px", fontWeight:"600", padding:"8px 13px", background: COLORS.accent, color:"#fff", border:"none", borderRadius:"3px", cursor:"pointer" }}>NEXT →</button>
            </div>
          </div>
        </div>

        <div style={{ marginTop:"14px", fontSize:"11px", color: COLORS.textMuted, fontStyle:"italic", textAlign:"center", fontFamily:"'DM Sans',sans-serif" }}>
          Danish special characters optional: ø = oe · å = aa · æ = ae
        </div>
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
