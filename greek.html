// ─── HELPERS ──────────────────────────────────────────────────────────────────

// For Greek, we do a more aggressive normalize: strip all diacritics entirely
function normalize(str) {
  return str.trim().toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f\u0370-\u03ff\u1f00-\u1fff]/g, (c) => {
      // keep basic Greek letters, strip combining marks
      return c;
    })
    // Actually: strip combining diacritical marks only
    .replace(/[\u0300-\u036f]/g, "")
    // Normalize final sigma
    .replace(/ς/g, "σ")
    // Strip breathings and accents already handled above via NFD decomposition
    ;
}

// Two strings match if stripped of all accents/breathings/final sigma distinction
function greekMatch(input, answer) {
  const strip = (s) => s.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/ς/g, "σ")
    .replace(/\s*\/\s*.*/g, "") // allow partial match for alternate forms like "ἐμοῦ / μου"
    .trim();
  const a = strip(input);
  const b = strip(answer);
  if (!a) return "empty";
  // also allow matching any of the "/" separated alternatives
  const alts = answer.split("/").map(s => strip(s.trim()));
  return (a === b || alts.includes(a)) ? "correct" : "wrong";
}

function getAnswers(category, word) {
  const patterns = category.type === "conjugation" ? CONJ_PATTERNS : DECL_PATTERNS;
  const pattern = patterns[category.pattern];
  return pattern.rows.map((row) =>
    row.suffixes.map((suf, ci) => {
      if (suf === null) return word.nom_sg || "";
      // Pick correct stem based on tense
      let stem = word.stem;
      if (pattern.augment && word.augmentedStem) stem = word.augmentedStem;
      if (pattern.useFutureStem && word.futureStem) stem = word.futureStem;
      if (pattern.useAoristStem && word.aoristStem) stem = word.aoristStem;
      return stem + suf;
    })
  );
}

// ─── MATCHING MODE ────────────────────────────────────────────────────────────

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

const PAIRS_PER_ROUND = 8;

const MATCH_COLORS = [
  { light:"rgba(251,191,36,0.12)",  border:"#d97706", text:"#fcd34d" },
  { light:"rgba(96,165,250,0.12)",  border:"#2563eb", text:"#93c5fd" },
  { light:"rgba(52,211,153,0.12)",  border:"#059669", text:"#6ee7b7" },
  { light:"rgba(248,113,113,0.12)", border:"#dc2626", text:"#fca5a5" },
  { light:"rgba(192,132,252,0.12)", border:"#7c3aed", text:"#d8b4fe" },
  { light:"rgba(251,146,60,0.12)",  border:"#ea580c", text:"#fdba74" },
  { light:"rgba(34,211,238,0.12)",  border:"#0891b2", text:"#67e8f9" },
  { light:"rgba(163,230,53,0.12)",  border:"#65a30d", text:"#bef264" },
];

function buildMatchPool() {
  const pool = [];
  CATEGORIES.forEach(cat => cat.words.forEach(w => {
    pool.push({ left: w.lemma, right: w.meaning });
  }));
  return pool;
}

function MatchingMode() {
  const allPairs = React.useMemo(() => buildMatchPool(), []);
  const [round, setRound]     = React.useState(0);
  const [left, setLeft]       = React.useState([]);
  const [right, setRight]     = React.useState([]);
  const [matched, setMatched] = React.useState({});
  const [selL, setSelL]       = React.useState(null);
  const [selR, setSelR]       = React.useState(null);
  const [wrong, setWrong]     = React.useState({l:null, r:null});
  const [done, setDone]       = React.useState(false);
  const [corr, setCorr]       = React.useState(0);
  const [att, setAtt]         = React.useState(0);

  const startRound = React.useCallback((r) => {
    const start = (r * PAIRS_PER_ROUND) % allPairs.length;
    const slice = Array.from({length:PAIRS_PER_ROUND}, (_,i) => ({
      ...allPairs[(start+i) % allPairs.length], id: i
    }));
    setLeft(shuffle(slice.map(p => ({id:p.id, text:p.left}))));
    setRight(shuffle(slice.map(p => ({id:p.id, text:p.right}))));
    setMatched({}); setSelL(null); setSelR(null);
    setWrong({l:null,r:null}); setDone(false);
  }, [allPairs]);

  React.useEffect(() => { startRound(0); }, []);

  React.useEffect(() => {
    if (selL===null || selR===null) return;
    setAtt(a => a+1);
    if (selL === selR) {
      const ci = Object.keys(matched).length % MATCH_COLORS.length;
      const nm = {...matched, [selL]: ci};
      setMatched(nm); setCorr(c => c+1);
      setSelL(null); setSelR(null);
      if (Object.keys(nm).length === PAIRS_PER_ROUND) setTimeout(() => setDone(true), 300);
    } else {
      setWrong({l:selL, r:selR});
      setTimeout(() => { setWrong({l:null,r:null}); setSelL(null); setSelR(null); }, 650);
    }
  }, [selL, selR]);

  const mc = Object.keys(matched).length;
  const acc = att > 0 ? Math.round((corr/att)*100) : null;

  const tile = (id, side) => {
    const isM = matched[id] !== undefined;
    const c = isM ? MATCH_COLORS[matched[id]] : null;
    const isSel = side==="l" ? selL===id : selR===id;
    const isW   = side==="l" ? wrong.l===id : wrong.r===id;
    return {
      padding:"10px 8px", border:"1.5px solid",
      borderColor: isM?c.border : isW?"#9b3535" : isSel?"#7ec8f0" : "#1e3a5c",
      borderRadius:"4px",
      background: isM?c.light : isW?"rgba(155,53,53,0.1)" : isSel?"rgba(126,200,240,0.08)" : "#0d1e35",
      color: isM?c.text : isW?"#c87070" : isSel?"#c8dff0" : "#8ab0d0",
      cursor: isM?"default":"pointer", transition:"all 0.15s", textAlign:"center",
      userSelect:"none", opacity:isM?0.6:1, textDecoration:isM?"line-through":"none",
      minHeight:"50px", display:"flex", alignItems:"center", justifyContent:"center",
    };
  };

  return (
    <div style={{ marginTop:"16px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:"12px", marginBottom:"12px" }}>
        <div style={{ flex:1, height:"4px", background:"#1e3a5c", borderRadius:"2px", overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${(mc/PAIRS_PER_ROUND)*100}%`, background:"#4a7ab5", transition:"width 0.4s" }} />
        </div>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", color:"#4a7ab5", whiteSpace:"nowrap" }}>
          {mc}/{PAIRS_PER_ROUND}{acc!==null ? ` · ${acc}% acc` : ""}
        </div>
      </div>
      {!done && <div style={{ textAlign:"center", marginBottom:"10px", color:"#3a5a80", fontSize:"12px", fontStyle:"italic" }}>Click a Greek word, then its English meaning</div>}
      {done && (
        <div style={{ textAlign:"center", padding:"16px", background:"linear-gradient(180deg,#060e1e,#0a1628)", border:"1px solid #1e4a80", borderRadius:"4px", marginBottom:"14px" }}>
          <div style={{ fontFamily:"'EB Garamond',serif", fontSize:"20px", color:"#c8dff0", fontWeight:"600", marginBottom:"4px" }}>
            {acc===100 ? "Ἄριστα! 🏛️" : acc>=80 ? "Εὖγε! ✓" : acc>=60 ? "Μέτριος" : "Μελέτα!"}
          </div>
          <div style={{ color:"#3a5a80", fontSize:"12px", marginBottom:"12px" }}>{acc}% accuracy</div>
          <button onClick={() => { setRound(r => { const n=r+1; startRound(n); return n; }); }} style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"1.5px", padding:"8px 22px", background:"#1a4a80", color:"#c8dff0", border:"none", borderRadius:"2px", cursor:"pointer" }}>
            NEXT ROUND →
          </button>
        </div>
      )}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px 16px" }}>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:"9px", letterSpacing:"2px", color:"#3a5a80", textAlign:"center", paddingBottom:"4px", borderBottom:"1px solid #1e3a5c" }}>GREEK</div>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:"9px", letterSpacing:"2px", color:"#3a5a80", textAlign:"center", paddingBottom:"4px", borderBottom:"1px solid #1e3a5c" }}>ENGLISH</div>
        {left.map((item, i) => (
          <React.Fragment key={item.id}>
            <div onClick={() => !matched[item.id] && wrong.l===null && setSelL(item.id)} style={tile(item.id,"l")}>
              <span style={{ fontFamily:"'EB Garamond',serif", fontSize:"16px" }}>{item.text}</span>
            </div>
            <div onClick={() => !matched[right[i].id] && wrong.l===null && setSelR(right[i].id)} style={tile(right[i].id,"r")}>
              <span style={{ fontFamily:"'EB Garamond',serif", fontSize:"14px", fontStyle:"italic" }}>{right[i].text}</span>
            </div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

const POS_COLORS_G = {
  noun: {bg:"rgba(30,100,160,0.15)", border:"#1a6aaa"},
  verb: {bg:"rgba(30,100,70,0.15)",  border:"#1a7a50"},

  prep: {bg:"rgba(160,40,40,0.15)",  border:"#aa3030"},
  conj: {bg:"rgba(40,120,120,0.15)", border:"#308080"},
  pron: {bg:"rgba(40,80,160,0.15)",  border:"#3060c0"},
  part: {bg:"rgba(160,80,20,0.15)",  border:"#c06010"},
  art:  {bg:"rgba(60,60,60,0.15)",   border:"#606060"},
  num:  {bg:"rgba(100,60,0,0.15)",   border:"#804800"},
};

function WordTokenG({ token, activeId, setActiveId, idx }) {
  const isActive = activeId === idx;
  const pc = POS_COLORS_G[token.pos] || POS_COLORS_G.noun;
  return (
    <span style={{ position:"relative", display:"inline" }}>
      <span onClick={()=>setActiveId(isActive?null:idx)} onMouseEnter={()=>setActiveId(idx)} onMouseLeave={()=>setActiveId(null)}
        style={{ cursor:"pointer", borderBottom:isActive?"2px solid #7ec8f0":"2px solid transparent", color:isActive?"#4a7ab5":"#c8dff0", background:isActive?"rgba(126,200,240,0.08)":"transparent", borderRadius:"2px", padding:"0 1px", transition:"all 0.1s" }}>
        {token.w}
      </span>
      {isActive && (
        <span style={{ position:"absolute", bottom:"calc(100% + 10px)", left:"50%", transform:"translateX(-50%)", zIndex:200, width:"268px", background:"#060e1e", border:"1px solid #1e4a80", borderRadius:"5px", boxShadow:"0 8px 32px rgba(0,0,0,0.6)", padding:"12px 14px", pointerEvents:"none" }}>
          <span style={{ position:"absolute", bottom:"-6px", left:"50%", width:"10px", height:"10px", background:"#060e1e", border:"1px solid #1e4a80", borderTop:"none", borderLeft:"none", transform:"translateX(-50%) rotate(45deg)", display:"block" }} />
          <div style={{ display:"flex", alignItems:"baseline", gap:"8px", marginBottom:"7px", flexWrap:"wrap" }}>
            <span style={{ fontFamily:"'EB Garamond',serif", fontSize:"18px", color:"#c8dff0", fontWeight:"500" }}>{token.w}</span>
            <span style={{ fontFamily:"'EB Garamond',serif", fontSize:"12px", color:"#6a9ac0", fontStyle:"italic" }}>{token.lemma}</span>
          </div>
          <div style={{ marginBottom:"6px" }}>
            <span style={{ fontFamily:"'Cinzel',serif", fontSize:"8px", letterSpacing:"1.5px", textTransform:"uppercase", padding:"2px 7px", borderRadius:"10px", background:pc.bg, border:"1px solid "+pc.border, color:pc.border }}>{token.pos}</span>
          </div>
          <div style={{ fontFamily:"'EB Garamond',serif", fontSize:"12px", color:"#7a9ab8", marginBottom:"5px", lineHeight:"1.4" }}>
            <span style={{ fontFamily:"'Cinzel',serif", fontSize:"7px", letterSpacing:"1px", color:"#3a5a78", textTransform:"uppercase", marginRight:"5px" }}>Form</span>{token.parse}
          </div>
          <div style={{ fontFamily:"'EB Garamond',serif", fontSize:"13px", color:"#c8dff0", marginBottom:token.note?"7px":"0", lineHeight:"1.4" }}>
            <span style={{ fontFamily:"'Cinzel',serif", fontSize:"7px", letterSpacing:"1px", color:"#3a5a78", textTransform:"uppercase", marginRight:"5px" }}>Meaning</span>"{token.eng}"
          </div>
          {token.note && (
            <div style={{ fontFamily:"'EB Garamond',serif", fontSize:"11px", fontStyle:"italic", color:"#4a6a88", borderTop:"1px solid #1e3a5c", paddingTop:"6px", lineHeight:"1.5" }}>
              <span style={{ fontFamily:"'Cinzel',serif", fontSize:"7px", letterSpacing:"1px", color:"#2a4a68", textTransform:"uppercase", marginRight:"5px", fontStyle:"normal" }}>Note</span>{token.note}
            </div>
          )}
        </span>
      )}
    </span>
  );
}

          <button key={p.id} onClick={()=>{ setPidx(i); setActiveId(null); }} style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"0.8px", padding:"5px 14px", border:"1px solid", borderColor:i===pidx?"#4a7ab5":"#1e3a5c", borderRadius:"20px", background:i===pidx?"#0a1e35":"transparent", color:i===pidx?"#7ec8f0":"#4a7ab5", cursor:"pointer", transition:"all 0.15s", whiteSpace:"nowrap" }}>
            {p.author} · {p.title}
          </button>
        ))}
      </div>

        <div style={{ marginBottom:"14px", paddingBottom:"12px", borderBottom:"1px solid #162840" }}>
          <h2 style={{ fontFamily:"'Cinzel',serif", fontSize:"17px", fontWeight:"700", color:"#c8dff0", marginBottom:"3px" }}>{passage.title}</h2>
          <div style={{ fontFamily:"'EB Garamond',serif", fontStyle:"italic", fontSize:"13px", color:"#4a7ab5" }}>{passage.author} · <em>{passage.work}</em> · {passage.date}</div>
          {passage.intro && <div style={{ marginTop:"8px", fontFamily:"'EB Garamond',serif", fontSize:"13px", color:"#3a5a80", lineHeight:"1.6", fontStyle:"italic" }}>{passage.intro}</div>}
        </div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:"4px", marginBottom:"14px" }}>
          {Object.entries(POS_COLORS_G).map(([pos,c])=>(
            <span key={pos} style={{ fontFamily:"'Cinzel',serif", fontSize:"8px", letterSpacing:"1px", textTransform:"uppercase", padding:"2px 6px", borderRadius:"10px", background:c.bg, border:"1px solid "+c.border, color:c.border }}>{pos}</span>
          ))}
          <span style={{ fontFamily:"'EB Garamond',serif", fontSize:"12px", color:"#3a5a80", fontStyle:"italic", marginLeft:"6px", alignSelf:"center" }}>hover or tap any word</span>
        </div>
        <div style={{ fontFamily:"'EB Garamond',serif", fontSize:"22px", lineHeight:"2.4", color:"#c8dff0", marginBottom:"18px" }}>
          {passage.lines.map((line,li)=>(
            <span key={li}>
              {line.map((token,ti)=>{
                if (typeof token==="string") return <span key={ti} style={{color:"#3a5a80"}}>{token}</span>;
                const id=wc++;
                return <WordTokenG key={ti} token={token} activeId={activeId} setActiveId={setActiveId} idx={id} />;
              })}
              {li<passage.lines.length-1 && " "}
            </span>
          ))}
        </div>
        <details>
          <summary style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"2px", color:"#4a7ab5", cursor:"pointer", userSelect:"none", textTransform:"uppercase" }}>▸ Full Word List</summary>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(250px,1fr))", gap:"4px", marginTop:"10px" }}>
            {passage.lines.flat().filter(t=>typeof t==="object").map((token,i)=>{
              const pc=POS_COLORS_G[token.pos]||POS_COLORS_G.noun;
              return (
                <div key={i} style={{ display:"flex", alignItems:"baseline", gap:"6px", padding:"5px 9px", background:"rgba(30,80,140,0.06)", border:"1px solid #162840", borderRadius:"3px" }}>
                  <span style={{ fontFamily:"'EB Garamond',serif", fontSize:"15px", color:"#4a7ab5", minWidth:"80px" }}>{token.w}</span>
                  <span style={{ fontFamily:"'Cinzel',serif", fontSize:"8px", padding:"1px 5px", borderRadius:"8px", background:pc.bg, border:"1px solid "+pc.border, color:pc.border, whiteSpace:"nowrap" }}>{token.pos}</span>
                  <span style={{ fontFamily:"'EB Garamond',serif", fontSize:"12px", color:"#4a7ab5", fontStyle:"italic" }}>{token.eng}</span>
                </div>
              );
            })}
          </div>
        </details>
      </div>
    </div>
  );
}

      ...t, answers: t.rows.map(r => r.answers)
    }));
    const patterns = category.type === "conjugation" ? CONJ_PATTERNS : DECL_PATTERNS;
    const pattern = patterns[category.pattern];
    return [{ tense: null, headers: pattern.headers, rows: pattern.rows, answers: getAnswers(category, word) }];
  }, [catIdx, wordIdx]);

  const allCells = tableData.flatMap((t,ti) =>
    t.answers.flatMap((row,ri) => row.map((_,ci) => `${ti}-${ri}-${ci}`))
  );
  const total = allCells.length;
  const filledCount = allCells.filter(k => inputs[k]?.trim()).length;
  const score = submitted ? allCells.filter(k => {
    const [ti,ri,ci] = k.split("-").map(Number);
    return greekMatch(inputs[k]||"", tableData[ti].answers[ri][ci]) === "correct";
  }).length : 0;

  const handleInput = (ti, key, val) => {
    setInputs(p => ({ ...p, [`${ti}-${key}`]: val }));
    if (submitted) setSubmitted(false);
  };
  const reset = () => { setInputs({}); setSubmitted(false); setShowAnswers(false); };
  const goWord = (dir) => { setWordIdx((wordIdx + dir + category.words.length) % category.words.length); reset(); };
  const goCategory = (idx) => { setCatIdx(idx); setWordIdx(0); reset(); };

  return (
    <div style={{ minHeight:"100vh", background:"#0a1628", backgroundImage:"radial-gradient(ellipse at 20% 0%,rgba(30,80,160,0.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(60,20,120,0.1) 0%,transparent 60%)", fontFamily:"'EB Garamond','Georgia',serif", color:"#c8dff0", paddingBottom:"60px" }}>

      {/* Header */}
      <header style={{ borderBottom:"2px solid #1e4a80", background:"linear-gradient(180deg,#060e1e 0%,#0a1628 100%)", padding:"20px 32px 16px", display:"flex", alignItems:"flex-end", gap:"20px" }}>
        <div>
          <div style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"4px", color:"#4a7ab5", marginBottom:"4px" }}>ΕΛΛΗΝΙΚΗ ΓΡΑΜΜΑΤΙΚΗ</div>
          <h1 style={{ fontFamily:"'Cinzel',serif", fontSize:"22px", fontWeight:"700", color:"#c8dff0", margin:0, letterSpacing:"1px" }}>Greek Practice Tables</h1>
        </div>
        <div style={{ marginLeft:"auto", fontStyle:"italic", color:"#3a5a80", fontSize:"13px", paddingBottom:"2px" }}>ἡ μελέτη τὴν τέχνην ποιεῖ</div>
      </header>

      <div style={{ maxWidth:"900px", margin:"0 auto", padding:"0 20px" }}>

        {/* Mode tabs */}
        <div style={{ display:"flex", marginTop:"24px", borderBottom:"2px solid #1e3a5c" }}>
          {[["tables","📋  Practice Tables"],["matching","🔗  Vocabulary Matching"],["reader","📖  Reader"]].map(([m,label]) => (
            <button key={m} onClick={()=>setMode(m)} style={{ fontFamily:"'Cinzel',serif", fontSize:"11px", letterSpacing:"1px", padding:"9px 20px", border:"none", borderBottom:mode===m?"2px solid #7ec8f0":"2px solid transparent", marginBottom:"-2px", background:mode===m?"#0d1e35":"transparent", color:mode===m?"#7ec8f0":"#4a7ab5", cursor:"pointer", fontWeight:mode===m?"600":"400", transition:"all 0.15s" }}>
              {label}
            </button>
          ))}
        </div>

        {/* MATCHING MODE */}
        {mode === "matching" && <MatchingMode />}

        {/* READER MODE */}
        {mode === "reader" && <ReaderMode />}

        {/* TABLES MODE */}
        {mode === "tables" && <div>

        {/* Category pills */}
        <div style={{ marginTop:"20px", display:"flex", flexWrap:"wrap", gap:"5px" }}>
          {CATEGORIES.map((cat, i) => {
            const tc = TAG[cat.type];
            const active = i === catIdx;
            return (
              <button key={cat.id} onClick={() => goCategory(i)} style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"0.8px", padding:"4px 11px", border:"1px solid", borderColor: active?tc.text+"88":"#1e3a5c", borderRadius:"20px", background: active?tc.bg:"transparent", color: active?tc.text:"#4a7ab5", cursor:"pointer", transition:"all 0.15s", whiteSpace:"nowrap" }}>
                {cat.label}
                <span style={{ fontFamily:"'EB Garamond',serif", fontWeight:"400", marginLeft:"4px", opacity:0.7, fontSize:"9px" }}>{cat.sublabel}</span>
              </button>
            );
          })}
        </div>

        {/* Main card */}
        <div style={{ marginTop:"16px", background:"#0d1e35", border:"1px solid #1e3a5c", borderRadius:"4px", boxShadow:"0 4px 24px rgba(0,0,0,0.4)", overflow:"hidden" }}>

          {/* Card header */}
          <div style={{ background:"linear-gradient(180deg,#060e1e 0%,#0a1628 100%)", padding:"13px 22px", borderBottom:"2px solid #1e4a80", display:"flex", alignItems:"center", gap:"14px" }}>
            <button onClick={() => goWord(-1)} style={{ background:"rgba(30,80,160,0.15)", border:"1px solid #1e4a80", borderRadius:"2px", color:"#7ec8f0", cursor:"pointer", width:"30px", height:"30px", fontSize:"17px", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>‹</button>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", alignItems:"baseline", gap:"10px", flexWrap:"wrap" }}>
                <span style={{ fontFamily:"'EB Garamond',serif", fontSize:"20px", fontWeight:"600", color:"#c8dff0" }}>{word.lemma}</span>
                <span style={{ fontStyle:"italic", color:"#5a8ab0", fontSize:"14px" }}>— {word.meaning}</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:"8px", marginTop:"3px" }}>
                <span style={{ fontFamily:"'Cinzel',serif", fontSize:"8px", letterSpacing:"1.5px", padding:"2px 7px", borderRadius:"10px", background:tag.bg, color:tag.text, border:`1px solid ${tag.text}44` }}>{category.type.toUpperCase()}</span>
                <span style={{ fontFamily:"'Cinzel',serif", fontSize:"8px", color:"#3a5a80", letterSpacing:"1px" }}>{category.sublabel.toUpperCase()}</span>
              </div>
            </div>
            <div style={{ textAlign:"center", color:"#3a5a80", fontSize:"11px", flexShrink:0 }}>
              <div style={{ fontFamily:"'Cinzel',serif", fontSize:"15px", color:"#7ec8f0", fontWeight:"600" }}>{wordIdx+1}</div>
              <div>of {category.words.length}</div>
            </div>
            <button onClick={() => goWord(1)} style={{ background:"rgba(30,80,160,0.15)", border:"1px solid #1e4a80", borderRadius:"2px", color:"#7ec8f0", cursor:"pointer", width:"30px", height:"30px", fontSize:"17px", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>›</button>
          </div>

          <ScoreBar score={score} total={total} submitted={submitted} />

          {/* Tables */}
          <div style={{ padding:"16px 22px", display:"flex", flexDirection:"column", gap:"26px" }}>
            {tableData.map((t, ti) => {
              const subInputs = {};
              Object.entries(inputs).forEach(([k,v]) => {
                const [tIdx,...rest] = k.split("-");
                if (Number(tIdx)===ti) subInputs[rest.join("-")] = v;
              });
              return (
                <div key={ti}>
                  {t.tense && (
                    <div style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"2px", color:"#4a7ab5", marginBottom:"9px", textTransform:"uppercase", borderLeft:"3px solid #1e4a80", paddingLeft:"9px" }}>{t.tense}</div>
                  )}
                  <TableGrid headers={t.headers} rows={t.rows} answers={t.answers} inputs={subInputs} submitted={submitted} showAnswers={showAnswers} onInput={(key,val) => handleInput(ti,key,val)} />
                </div>
              );
            })}
          </div>

          {/* Controls */}
          <div style={{ padding:"13px 22px 17px", borderTop:"1px solid #162840", display:"flex", alignItems:"center", gap:"9px", flexWrap:"wrap" }}>
            <button onClick={() => setSubmitted(true)} disabled={filledCount===0} style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"1.5px", padding:"8px 20px", background: filledCount===0?"#1a2e45":"#1a4a80", color:"#c8dff0", border:"none", borderRadius:"2px", cursor:filledCount===0?"default":"pointer" }}>
              GRADE ({filledCount}/{total})
            </button>
            <button onClick={reset} style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"1.5px", padding:"8px 16px", background:"transparent", color:"#4a7ab5", border:"1px solid #1e3a5c", borderRadius:"2px", cursor:"pointer" }}>RESET</button>
            {submitted && score < total && (
              <button onClick={() => setShowAnswers(v => !v)} style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"1.5px", padding:"8px 16px", background:"transparent", color: showAnswers?"#2d8a5f":"#9b3535", border:"1px solid", borderColor: showAnswers?"#2d8a5f":"#1e3a5c", borderRadius:"2px", cursor:"pointer" }}>
                {showAnswers ? "HIDE ANSWERS" : "SHOW ANSWERS"}
              </button>
            )}
            <div style={{ marginLeft:"auto", display:"flex", gap:"7px" }}>
              <button onClick={() => goWord(-1)} style={{ fontFamily:"'Cinzel',serif", fontSize:"9px", letterSpacing:"1px", padding:"8px 13px", background:"transparent", color:"#4a7ab5", border:"1px solid #1e3a5c", borderRadius:"2px", cursor:"pointer" }}>← PREV</button>
              <button onClick={() => goWord(1)} style={{ fontFamily:"'Cinzel',serif", fontSize:"9px", letterSpacing:"1px", padding:"8px 13px", background:"#1a4a80", color:"#c8dff0", border:"none", borderRadius:"2px", cursor:"pointer" }}>NEXT →</button>
            </div>
          </div>
        </div>

        <div style={{ marginTop:"14px", fontSize:"12px", color:"#3a5a80", fontStyle:"italic", textAlign:"center" }}>
          Accents & breathings optional — the app accepts forms with or without diacritics
        </div>
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
