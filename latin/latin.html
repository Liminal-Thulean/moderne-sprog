<!-- Load order: shared utilities → reader → tables → this shell (App) -->
<script type="text/babel">
// ── latin_shared.js ──────────────────────────
function toKey(w) {
  return w.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z]/g,"");
}

function tokenise(text) {
  const tokens = [];
  text.trim().split(/\s+/).forEach(raw => {
    const m = raw.match(/^([^a-zA-Z\xC0-\xFF]*)([a-zA-Z\xC0-\xFF\-]+)([^a-zA-Z\xC0-\xFF]*)$/);
    if (m) {
      if (m[1]) tokens.push({type:"punct",text:m[1]});
      tokens.push({type:"word",text:m[2]});
      if (m[3]) tokens.push({type:"punct",text:m[3]});
    } else { tokens.push({type:"punct",text:raw}); }
  });
  return tokens;
}

const POS_COLORS = {
  noun:{bg:"rgba(45,106,79,0.15)",  border:"#2d6a4f"},
  verb:{bg:"rgba(74,52,16,0.15)",   border:"#8a6914"},
  adj: {bg:"rgba(60,30,100,0.12)",  border:"#6a3a9a"},
  adv: {bg:"rgba(20,80,120,0.12)",  border:"#2a6090"},
  prep:{bg:"rgba(120,40,20,0.12)",  border:"#902a14"},
  conj:{bg:"rgba(80,80,20,0.12)",   border:"#807814"},
  pron:{bg:"rgba(100,30,80,0.12)",  border:"#7a2060"},
  part:{bg:"rgba(20,100,100,0.12)", border:"#146a6a"},
  num: {bg:"rgba(140,60,0,0.12)",   border:"#8c3c00"},
};

function WordToken({ text, dict, activeId, setActiveId, idx }) {
  const isActive = activeId === idx;
  const entry = dict ? dict[toKey(text)] : null;
  const pc = entry ? (POS_COLORS[entry.pos] || POS_COLORS.noun) : null;
  return (
    <span style={{position:"relative",display:"inline"}}>
      <span onClick={()=>setActiveId(isActive?null:idx)} onMouseEnter={()=>setActiveId(idx)} onMouseLeave={()=>setActiveId(null)}
        style={{cursor:"pointer",fontStyle:"italic",
          borderBottom:isActive?(entry?"2px solid #b8973e":"2px solid #888"):(entry?"1px dotted #c9a84c":"none"),
          color:isActive?(entry?"#8a6914":"#888"):"#2c1f0e",
          background:isActive?"rgba(184,151,62,0.07)":"transparent",
          borderRadius:"2px",padding:"0 1px",transition:"all 0.1s"}}>
        {text}
      </span>
      {isActive && (
        <span style={{position:"absolute",bottom:"calc(100% + 10px)",left:"50%",transform:"translateX(-50%)",zIndex:200,width:"268px",background:"#1e1408",border:"1px solid "+(entry?"#8a6914":"#555"),borderRadius:"5px",boxShadow:"0 8px 32px rgba(0,0,0,0.5)",padding:"12px 14px",pointerEvents:"none"}}>
          <span style={{position:"absolute",bottom:"-6px",left:"50%",width:"10px",height:"10px",background:"#1e1408",border:"1px solid "+(entry?"#8a6914":"#555"),borderTop:"none",borderLeft:"none",transform:"translateX(-50%) rotate(45deg)",display:"block"}}/>
          {entry ? <>
            <div style={{display:"flex",alignItems:"baseline",gap:"8px",marginBottom:"7px",flexWrap:"wrap"}}>
              <span style={{fontFamily:"'EB Garamond',serif",fontStyle:"italic",fontSize:"18px",color:"#e8c97a"}}>{text}</span>
              <span style={{fontFamily:"'EB Garamond',serif",fontSize:"12px",color:"#c4a060",fontStyle:"italic"}}>{entry.lemma}</span>
            </div>
            <div style={{marginBottom:"6px"}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:"8px",letterSpacing:"1.5px",textTransform:"uppercase",padding:"2px 7px",borderRadius:"10px",background:pc.bg,border:"1px solid "+pc.border,color:pc.border}}>{entry.pos}</span>
            </div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:"12px",color:"#a09070",marginBottom:"5px",lineHeight:"1.4"}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:"7px",letterSpacing:"1px",color:"#6a5a3a",textTransform:"uppercase",marginRight:"5px"}}>Form</span>{entry.parse}
            </div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:"13px",color:"#e8c97a",lineHeight:"1.4"}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:"7px",letterSpacing:"1px",color:"#6a5a3a",textTransform:"uppercase",marginRight:"5px"}}>Meaning</span>"{entry.eng}"
            </div>
          </> : <>
            <div style={{fontFamily:"'EB Garamond',serif",fontStyle:"italic",fontSize:"17px",color:"#aaa",marginBottom:"8px"}}>{text}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"1px",color:"#666",textTransform:"uppercase",marginBottom:"5px"}}>Not yet in dictionary</div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:"11px",color:"#555",fontStyle:"italic"}}>Key to add: <span style={{fontFamily:"monospace",background:"#111",padding:"1px 5px",borderRadius:"2px",color:"#888"}}>"{toKey(text)}"</span></div>
          </>}
        </span>
      )}
    </span>
  );
}

// ── latin_reader.js ──────────────────────────
// ─── READER DATA & COMPONENTS ────────────────────────────────────────────────
//
//  HOW TO ADD A NEW PASSAGE:
// ─── WORKS & PAGES ────────────────────────────────────────────────────────────
//  Add a page:  find the work, copy an existing page object and edit it.
//  Add a work:  append a new object to WORKS[].

    pages: [

        text: `Musa, mihi causas memora, quo numine laeso quidve dolens regina deum tot volvere casus insignem pietate virum, tot adire labores impulerit. Tantaene animis caelestibus irae?`
      },

function ReaderMode() {
  const [dict, setDict]         = React.useState(null);
  const [err, setErr]           = React.useState(null);
  const [view, setView]         = React.useState("library");
  const [workIdx, setWorkIdx]   = React.useState(null);
  const [pageIdx, setPageIdx]   = React.useState(0);
  const [activeId, setActiveId] = React.useState(null);

  React.useEffect(()=>{
    fetch("latin_dict.json")
      .then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(setDict).catch(e=>setErr(e.message));
  },[]);

  // ALL hooks must be unconditional — guard values, never early-return before a hook
  const work       = workIdx !== null ? WORKS[workIdx] : null;
  const page       = work ? work.pages[pageIdx] : null;
  const tokens     = React.useMemo(() => page ? tokenise(page.text) : [], [workIdx, pageIdx]);
  const wordTokens = tokens.filter(t => t.type === "word");
  const inDict     = dict ? wordTokens.filter(t => dict[toKey(t.text)]).length : 0;
  const coverage   = wordTokens.length > 0 ? Math.round((inDict / wordTokens.length) * 100) : 0;

  const openWork = (i) => { setWorkIdx(i); setPageIdx(0); setView("reading"); setActiveId(null); };
  const back     = ()  => { setView("library"); setActiveId(null); };

  if (view === "library") {
    return (
      <div style={{marginTop:"20px"}}>
        {err && (
          <div style={{padding:"10px 14px",background:"rgba(180,30,30,0.06)",border:"1px solid #c88080",borderRadius:"4px",marginBottom:"12px",fontFamily:"'EB Garamond',serif",fontSize:"13px",color:"#c06060"}}>
            Could not load <code>latin_dict.json</code>: {err}
          </div>
        )}
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"3px",color:"#9a7a3a",textTransform:"uppercase",marginBottom:"14px"}}>Select a work</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(240px,1fr))",gap:"12px"}}>
          {WORKS.map((work,i)=>(
            <button key={work.id} onClick={()=>openWork(i)}
              style={{textAlign:"left",background:"#fffdf6",border:"1px solid #d4bc84",borderRadius:"4px",padding:"18px 20px",cursor:"pointer",boxShadow:"0 2px 10px rgba(44,31,14,0.07)",transition:"all 0.15s",display:"block",width:"100%"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#b8973e";e.currentTarget.style.boxShadow="0 4px 18px rgba(44,31,14,0.13)";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#d4bc84";e.currentTarget.style.boxShadow="0 2px 10px rgba(44,31,14,0.07)";}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"15px",fontWeight:"700",color:"#2c1f0e",marginBottom:"3px",lineHeight:"1.3"}}>{work.title}</div>
              <div style={{fontFamily:"'EB Garamond',serif",fontStyle:"italic",fontSize:"12px",color:"#7a5c2a",marginBottom:"10px"}}>{work.author} · {work.date}</div>
              <div style={{fontFamily:"'EB Garamond',serif",fontSize:"13px",color:"#5a4020",lineHeight:"1.5",marginBottom:"12px"}}>{work.desc}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                {work.pages.map(p=>(
                  <span key={p.id} style={{fontFamily:"'Cinzel',serif",fontSize:"8px",letterSpacing:"0.8px",padding:"2px 7px",borderRadius:"10px",background:"rgba(200,170,100,0.12)",border:"1px solid #d4bc84",color:"#8a6914"}}>{p.label}</span>
                ))}
              </div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ── Reading view ──────────────────────────────────────────────────────────
  let wc = 0;

  return (
    <div style={{marginTop:"16px"}}>
      {/* Breadcrumb + page tabs */}
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px",flexWrap:"wrap"}}>
        <button onClick={back} style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"1.5px",padding:"5px 12px",background:"transparent",color:"#7a5c2a",border:"1px solid #c9b48a",borderRadius:"2px",cursor:"pointer"}}>← LIBRARY</button>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:"9px",color:"#b8973e",letterSpacing:"1px"}}>{work.title}</span>
        <div style={{marginLeft:"auto",display:"flex",gap:"5px",flexWrap:"wrap"}}>
          {work.pages.map((p,i)=>(
            <button key={p.id} onClick={()=>{setPageIdx(i);setActiveId(null);}}
              style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"0.5px",padding:"4px 10px",border:"1px solid",borderColor:i===pageIdx?"#b8973e":"#c9b48a",borderRadius:"12px",background:i===pageIdx?"#3a2410":"transparent",color:i===pageIdx?"#e8c97a":"#7a5c2a",cursor:"pointer",transition:"all 0.15s"}}>
              {p.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{background:"#fffdf6",border:"1px solid #d4bc84",borderRadius:"4px",boxShadow:"0 2px 16px rgba(44,31,14,0.09)",padding:"24px 28px"}}>
        {/* Header */}
        <div style={{marginBottom:"14px",paddingBottom:"12px",borderBottom:"1px solid #e8dfc0"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:"8px"}}>
            <div>
              <h2 style={{fontFamily:"'Cinzel',serif",fontSize:"17px",fontWeight:"700",color:"#2c1f0e",marginBottom:"3px"}}>{page.title}</h2>
              <div style={{fontFamily:"'EB Garamond',serif",fontStyle:"italic",fontSize:"13px",color:"#7a5c2a"}}>{work.author} · <em>{work.title}</em> · {work.date}</div>
            </div>
            {dict && (
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"3px",flexShrink:0}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:"8px",letterSpacing:"1px",color:"#9a7a3a",textTransform:"uppercase"}}>Dictionary coverage</div>
                <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <div style={{width:"70px",height:"3px",background:"#e8dfc0",borderRadius:"2px",overflow:"hidden"}}>
                    <div style={{height:"100%",width:coverage+"%",background:coverage>80?"#b8973e":coverage>50?"#c88030":"#c84030",transition:"width 0.5s"}}/>
                  </div>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:"11px",color:"#8a6914",fontWeight:"600"}}>{coverage}%</span>
                </div>
                <div style={{fontFamily:"'EB Garamond',serif",fontSize:"11px",color:"#9a7a3a",fontStyle:"italic"}}>{inDict}/{wordTokens.length} words</div>
              </div>
            )}
          </div>
          {page.intro && <div style={{marginTop:"8px",fontFamily:"'EB Garamond',serif",fontSize:"13px",color:"#9a7a3a",lineHeight:"1.6",fontStyle:"italic"}}>{page.intro}</div>}
        </div>

        {/* POS legend */}
        <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"14px",alignItems:"center"}}>
          {Object.entries(POS_COLORS).map(([pos,c])=>(
            <span key={pos} style={{fontFamily:"'Cinzel',serif",fontSize:"8px",letterSpacing:"1px",textTransform:"uppercase",padding:"2px 6px",borderRadius:"10px",background:c.bg,border:"1px solid "+c.border,color:c.border}}>{pos}</span>
          ))}
          <span style={{fontFamily:"'EB Garamond',serif",fontSize:"12px",color:"#9a7a3a",fontStyle:"italic",marginLeft:"6px"}}>
            {dict?"hover or tap any word":"loading dictionary…"}
          </span>
        </div>

        {/* Text */}
        <div style={{fontFamily:"'EB Garamond',serif",fontSize:"22px",lineHeight:"2.4",color:"#2c1f0e",marginBottom:"18px"}}>
          {tokens.map((token,i)=>{
            if(token.type==="punct") return <span key={i} style={{color:"#7a5c2a"}}>{token.text}{" "}</span>;
            const id=wc++;
            return <React.Fragment key={i}><WordToken text={token.text} dict={dict} activeId={activeId} setActiveId={setActiveId} idx={id}/>{" "}</React.Fragment>;
          })}
        </div>

        {/* Prev / Next */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",paddingTop:"10px",borderTop:"1px solid #e8dfc0"}}>
          <button onClick={()=>{setPageIdx(p=>p-1);setActiveId(null);}} disabled={pageIdx===0}
            style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"1px",padding:"8px 16px",background:"transparent",color:pageIdx===0?"#c9b48a":"#7a5c2a",border:"1px solid",borderColor:pageIdx===0?"#e8dfc0":"#c9b48a",borderRadius:"2px",cursor:pageIdx===0?"default":"pointer"}}>
            ← PREV
          </button>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:"9px",color:"#9a7a3a",letterSpacing:"1px"}}>{pageIdx+1} / {work.pages.length}</span>
          <button onClick={()=>{setPageIdx(p=>p+1);setActiveId(null);}} disabled={pageIdx===work.pages.length-1}
            style={{fontFamily:"'Cinzel',serif",fontSize:"9px",letterSpacing:"1px",padding:"8px 16px",background:pageIdx===work.pages.length-1?"transparent":"#8a6914",color:pageIdx===work.pages.length-1?"#c9b48a":"#f5f0e8",border:"1px solid",borderColor:pageIdx===work.pages.length-1?"#e8dfc0":"#8a6914",borderRadius:"2px",cursor:pageIdx===work.pages.length-1?"default":"pointer"}}>
            NEXT →
          </button>
        </div>

        {/* Word list */}
        <details>
          <summary style={{fontFamily:"'Cinzel',serif",fontSize:"10px",letterSpacing:"2px",color:"#8a6914",cursor:"pointer",userSelect:"none",textTransform:"uppercase"}}>
            ▸ Word List {dict?`(${inDict} found · ${wordTokens.length-inDict} missing)`:""}
          </summary>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(250px,1fr))",gap:"4px",marginTop:"10px"}}>
            {wordTokens.map((token,i)=>{
              const entry=dict?dict[toKey(token.text)]:null;
              const pc=entry?(POS_COLORS[entry.pos]||POS_COLORS.noun):null;
              return (
                <div key={i} style={{display:"flex",alignItems:"baseline",gap:"6px",padding:"5px 9px",background:entry?"rgba(200,170,100,0.05)":"rgba(150,50,50,0.04)",border:"1px solid",borderColor:entry?"#e8dfc0":"#e0c0c0",borderRadius:"3px"}}>
                  <span style={{fontFamily:"'EB Garamond',serif",fontStyle:"italic",fontSize:"15px",color:entry?"#8a6914":"#c08080",minWidth:"72px"}}>{token.text}</span>
                  {entry
                    ? <><span style={{fontFamily:"'Cinzel',serif",fontSize:"8px",padding:"1px 5px",borderRadius:"8px",background:pc.bg,border:"1px solid "+pc.border,color:pc.border,whiteSpace:"nowrap"}}>{entry.pos}</span>
                        <span style={{fontFamily:"'EB Garamond',serif",fontSize:"12px",color:"#7a5c2a",fontStyle:"italic"}}>{entry.eng}</span></>
                    : <span style={{fontFamily:"'Cinzel',serif",fontSize:"8px",color:"#c08080"}}>{dict?"not in dictionary":"loading…"}</span>
                  }
                </div>
              );
            })}
          </div>
        </details>
      </div>
    </div>
  );
}

// ── latin_tables.js ──────────────────────────
// ─── DATA ─────────────────────────────────────────────────────────────────────
// To add vocabulary: find the category you want, copy an existing line inside
// the `words: [...]` array, paste it, and edit the lemma, meaning, and stem.
// For 3rd declension nouns, also include nom_sg (the nominative singular form).
//
// To add a new tense/pattern, copy an existing category block and adjust.

const CONJUGATION_PATTERNS = {
  "1st_present": {
    headers: ["", "Singular", "Plural"],
    rows: [
      { label: "1st", suffixes: ["ō",   "āmus"] },
      { label: "2nd", suffixes: ["ās",  "ātis"] },
      { label: "3rd", suffixes: ["at",  "ant"]  },
    ],
  },
  "1st_imperfect": {
    headers: ["", "Singular", "Plural"],
    rows: [
      { label: "1st", suffixes: ["ābam",  "ābāmus"] },
      { label: "2nd", suffixes: ["ābās",  "ābātis"] },
      { label: "3rd", suffixes: ["ābat",  "ābant"]  },
    ],
  },
  "1st_future": {
    headers: ["", "Singular", "Plural"],
    rows: [
      { label: "1st", suffixes: ["ābō",  "ābimus"] },
      { label: "2nd", suffixes: ["ābis", "ābitis"] },
      { label: "3rd", suffixes: ["ābit", "ābunt"]  },
    ],

function normalize(str) {
  return str.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[āa]/g,"a").replace(/[ēe]/g,"e").replace(/[īi]/g,"i")
    .replace(/[ōo]/g,"o").replace(/[ūu]/g,"u");
}

function checkAnswer(input, answer) {
  if (!input.trim()) return "empty";
  return normalize(input) === normalize(answer) ? "correct" : "wrong";
}

function getAnswers(category, word) {
  const patterns = category.type === "conjugation" ? CONJUGATION_PATTERNS : DECLENSION_PATTERNS;
  const pattern = patterns[category.pattern];
  return pattern.rows.map((row) =>
    row.suffixes.map((suf) => suf === null ? word.nom_sg : word.stem + suf)
  );
}

// Build a flat pool of all {latin, english} pairs from all CATEGORIES
function buildMatchPool() {
  const pool = [];
  CATEGORIES.forEach(cat => {
    cat.words.forEach(w => {
      // For irregular verbs with multiple tables, just use the lemma
      const latin = w.lemma;
      const english = w.meaning;
      if (latin && english) pool.push({ latin, english, catId: cat.id });
    });
  });
  return pool;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const PAIRS_PER_ROUND = 8;

// Pastel pair colors — one per matched pair so lines/highlights share a color
const PAIR_COLORS = [
  { light: "#fef3c7", border: "#d97706", text: "#92400e" },
  { light: "#d1fae5", border: "#059669", text: "#065f46" },
  { light: "#dbeafe", border: "#2563eb", text: "#1e3a8a" },
  { light: "#fce7f3", border: "#db2777", text: "#831843" },
  { light: "#ede9fe", border: "#7c3aed", text: "#4c1d95" },
  { light: "#ffedd5", border: "#ea580c", text: "#7c2d12" },
  { light: "#cffafe", border: "#0891b2", text: "#164e63" },
  { light: "#dcfce7", border: "#16a34a", text: "#14532d" },
];

function MatchingMode() {
  const allPairs = React.useMemo(() => buildMatchPool(), []);

  const [round, setRound] = React.useState(0);
  const [roundPairs, setRoundPairs] = React.useState([]);
  const [leftItems, setLeftItems] = React.useState([]);   // shuffled latin
  const [rightItems, setRightItems] = React.useState([]); // shuffled english
  const [selectedLeft, setSelectedLeft] = React.useState(null);
  const [selectedRight, setSelectedRight] = React.useState(null);
  const [matched, setMatched] = React.useState({}); // id -> colorIdx
  const [wrong, setWrong] = React.useState({ left: null, right: null });
  const [roundDone, setRoundDone] = React.useState(false);
  const [totalCorrect, setTotalCorrect] = React.useState(0);
  const [totalAttempts, setTotalAttempts] = React.useState(0);

  const startRound = React.useCallback((roundNum) => {
    const start = (roundNum * PAIRS_PER_ROUND) % allPairs.length;
    // slice cyclically
    let slice = [];
    for (let i = 0; i < PAIRS_PER_ROUND; i++) {
      slice.push(allPairs[(start + i) % allPairs.length]);
    }
    // give each pair a unique id for this round
    const pairs = slice.map((p, i) => ({ ...p, id: i }));
    setRoundPairs(pairs);
    setLeftItems(shuffle(pairs.map(p => ({ id: p.id, text: p.latin }))));
    setRightItems(shuffle(pairs.map(p => ({ id: p.id, text: p.english }))));
    setMatched({});
    setSelectedLeft(null);
    setSelectedRight(null);
    setWrong({ left: null, right: null });
    setRoundDone(false);
  }, [allPairs]);

  React.useEffect(() => { startRound(0); }, []);

  // When both sides selected, check match
  React.useEffect(() => {
    if (selectedLeft === null || selectedRight === null) return;
    setTotalAttempts(a => a + 1);
    if (selectedLeft === selectedRight) {
      // correct
      const colorIdx = Object.keys(matched).length % PAIR_COLORS.length;
      setMatched(m => ({ ...m, [selectedLeft]: colorIdx }));
      setTotalCorrect(c => c + 1);
      setSelectedLeft(null);
      setSelectedRight(null);
      // check if round complete
      setTimeout(() => {
        setMatched(m => {
          if (Object.keys(m).length === PAIRS_PER_ROUND) setRoundDone(true);
          return m;
        });
      }, 300);
    } else {
      // wrong — flash red briefly
      setWrong({ left: selectedLeft, right: selectedRight });
      setTimeout(() => {
        setWrong({ left: null, right: null });
        setSelectedLeft(null);
        setSelectedRight(null);
      }, 700);
    }
  }, [selectedLeft, selectedRight]);

  const handleLeft = (id) => {
    if (matched[id] !== undefined) return;
    if (wrong.left !== null) return;
    setSelectedLeft(id);
  };

  const handleRight = (id) => {
    if (matched[id] !== undefined) return;
    if (wrong.left !== null) return;
    setSelectedRight(id);
  };

  const nextRound = () => {
    setRound(r => { const next = r + 1; startRound(next); return next; });
  };

  const matchedCount = Object.keys(matched).length;
  const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : null;

  const itemStyle = (id, side) => {
    const isMatched = matched[id] !== undefined;
    const colorIdx = isMatched ? matched[id] : null;
    const c = colorIdx !== null ? PAIR_COLORS[colorIdx] : null;
    const isSelected = side === "left" ? selectedLeft === id : selectedRight === id;
    const isWrong = side === "left" ? wrong.left === id : wrong.right === id;

    return {
      padding: "10px 16px",
      border: "1.5px solid",
      borderColor: isMatched ? c.border
        : isWrong ? "#9b2335"
        : isSelected ? "#b8973e"
        : "#d4bc84",
      borderRadius: "4px",
      background: isMatched ? c.light
        : isWrong ? "rgba(155,35,53,0.08)"
        : isSelected ? "rgba(184,151,62,0.12)"
        : "#fffdf6",
      color: isMatched ? c.text
        : isWrong ? "#9b2335"
        : "#2c1f0e",
      cursor: isMatched ? "default" : "pointer",
      fontFamily: side === "left" ? "'EB Garamond',serif" : "'EB Garamond',serif",
      fontSize: "15px",
      transition: "all 0.15s",
      textAlign: "center",
      userSelect: "none",
      opacity: isMatched ? 0.75 : 1,
      textDecoration: isMatched ? "line-through" : "none",
      fontStyle: side === "left" ? "italic" : "normal",
      minHeight: "44px",
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
    };
  };

  return (
    <div style={{ marginTop: "16px" }}>

      {/* Progress bar */}
      <div style={{ marginBottom: "16px", display: "flex", alignItems: "center", gap: "12px" }}>
        <div style={{ flex: 1, height: "6px", background: "#e8dfc0", borderRadius: "3px", overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${(matchedCount / PAIRS_PER_ROUND) * 100}%`, background: "#8a6914", borderRadius: "3px", transition: "width 0.4s ease" }} />
        </div>
        <div style={{ fontFamily: "'Cinzel',serif", fontSize: "11px", color: "#8a6a3a", whiteSpace: "nowrap" }}>
          {matchedCount} / {PAIRS_PER_ROUND} matched
        </div>
        {accuracy !== null && (
          <div style={{ fontFamily: "'Cinzel',serif", fontSize: "11px", color: "#8a6a3a", whiteSpace: "nowrap" }}>
            {accuracy}% accuracy
          </div>
        )}
      </div>

      {/* Instruction */}
      {!roundDone && (
        <div style={{ textAlign: "center", marginBottom: "14px", fontStyle: "italic", color: "#9a7a3a", fontSize: "13px" }}>
          Click a Latin word, then its English meaning
        </div>
      )}

      {/* Round complete banner */}
      {roundDone && (
        <div style={{ textAlign: "center", marginBottom: "16px", padding: "16px", background: "linear-gradient(180deg,#4a3010,#3a2410)", borderRadius: "4px", border: "1px solid #b8973e" }}>
          <div style={{ fontFamily: "'Cinzel',serif", fontSize: "20px", color: "#e8c97a", fontWeight: "700", marginBottom: "4px" }}>
            {accuracy === 100 ? "Optimus! 🏆" : accuracy >= 80 ? "Bene! ✓" : accuracy >= 60 ? "Satis" : "Melius studē!"}
          </div>
          <div style={{ color: "#c4a060", fontSize: "13px", marginBottom: "14px" }}>
            Round complete · {accuracy}% accuracy
          </div>
          <button onClick={nextRound} style={{ fontFamily: "'Cinzel',serif", fontSize: "11px", letterSpacing: "1.5px", padding: "9px 24px", background: "#8a6914", color: "#f5f0e8", border: "none", borderRadius: "2px", cursor: "pointer" }}>
            NEXT ROUND →
          </button>
        </div>
      )}

      {/* Two-column matching grid */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px 20px" }}>
        {/* Left column header */}
        <div style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", letterSpacing: "2px", color: "#8a6a3a", textAlign: "center", paddingBottom: "4px", borderBottom: "1px solid #d4bc84", textTransform: "uppercase" }}>Latin</div>
        <div style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", letterSpacing: "2px", color: "#8a6a3a", textAlign: "center", paddingBottom: "4px", borderBottom: "1px solid #d4bc84", textTransform: "uppercase" }}>English</div>

        {/* Items — left and right columns rendered together in grid */}
        {leftItems.map((item, i) => (
          <React.Fragment key={item.id}>
            <div onClick={() => handleLeft(item.id)} style={itemStyle(item.id, "left")}>
              {item.text}
            </div>
            <div onClick={() => handleRight(rightItems[i].id)} style={itemStyle(rightItems[i].id, "right")}>
              {rightItems[i].text}
            </div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function ScoreBar({ score, total, submitted }) {
  if (!submitted) return null;
  const pct = Math.round((score / total) * 100);
  const grade =
    pct === 100 ? { label: "Optimus!", color: "#2d6a4f" }
    : pct >= 80  ? { label: "Bene!",    color: "#4a7c59" }
    : pct >= 60  ? { label: "Satis",    color: "#8a6914" }
    :              { label: "Melius studē!", color: "#9b2335" };
  return (
    <div style={{ padding:"12px 24px", background:"#f9f3e3", borderBottom:"1px solid #d4bc84", display:"flex", alignItems:"center", gap:"16px" }}>
      <div style={{ fontFamily:"'Cinzel',serif", fontSize:"19px", fontWeight:"700", color:grade.color, minWidth:"140px" }}>{grade.label}</div>
      <div style={{ flex:1 }}>
        <div style={{ height:"5px", background:"#e0d0a8", borderRadius:"3px", overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${pct}%`, background:grade.color, borderRadius:"3px", transition:"width 0.6s ease" }} />
        </div>
      </div>
      <div style={{ fontSize:"14px", color:"#5a3e1b", fontWeight:"500", minWidth:"80px", textAlign:"right" }}>{score}/{total} · {pct}%</div>
    </div>
  );
}

function TableGrid({ headers, rows, answers, inputs, submitted, showAnswers, onInput }) {
  return (
    <table style={{ width:"100%", borderCollapse:"collapse" }}>
      <thead>
        <tr>
          {headers.map((h,i) => (
            <th key={i} style={{ fontFamily:"'Cinzel',serif", fontSize:"10px", letterSpacing:"2px", textTransform:"uppercase", color:"#7a5c2a", padding:"7px 10px", textAlign: i===0?"left":"center", borderBottom:"1px solid #d4bc84", fontWeight:"600" }}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {rows.map((row, ri) => (
          <tr key={ri} style={{ background: ri%2===0?"transparent":"rgba(200,170,100,0.04)" }}>
            <td style={{ padding:"8px 10px", fontFamily:"'Cinzel',serif", fontSize:"11px", letterSpacing:"0.5px", color:"#5a3e1b", borderBottom:"1px solid #e8dfc0", whiteSpace:"nowrap", fontWeight:"500" }}>{row.label}</td>
            {answers[ri].map((answer, ci) => {
              const key = `${ri}-${ci}`;
              const val = inputs[key] || "";
              const status = submitted ? checkAnswer(val, answer) : null;
              return (
                <td key={ci} style={{ padding:"5px 8px", textAlign:"center", borderBottom:"1px solid #e8dfc0",
                  background: !status?"transparent": status==="correct"?"rgba(45,106,79,0.07)": status==="wrong"?"rgba(155,35,53,0.07)":"rgba(200,170,100,0.08)" }}>
                  <div style={{ position:"relative" }}>
                    <input type="text" value={val} onChange={(e) => onInput(key, e.target.value)}
                      style={{ width:"100%", minWidth:"80px", padding:"5px 6px",
                        fontFamily:"'EB Garamond',serif", fontSize:"15px", textAlign:"center",
                        background: !status?"#faf8f0": status==="correct"?"rgba(45,106,79,0.05)": status==="wrong"?"rgba(155,35,53,0.05)":"rgba(200,150,50,0.08)",
                        border:"1px solid",
                        borderColor: !status?"#d4bc84": status==="correct"?"#2d6a4f": status==="wrong"?"#9b2335":"#b8973e",
                        borderRadius:"2px", outline:"none", color:"#2c1f0e", transition:"border-color 0.2s, background 0.2s" }} />
                    {submitted && status==="wrong" && showAnswers && (
                      <div style={{ position:"absolute", bottom:"-16px", left:"50%", transform:"translateX(-50%)", fontSize:"11px", color:"#2d6a4f", fontStyle:"italic", whiteSpace:"nowrap", pointerEvents:"none", zIndex:1 }}>{answer}</div>
                    )}
                  </div>
                </td>
              );
            })}
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

// ─── APP ──────────────────────────────────────────────────────────────────────
// latin.html is intentionally thin — all logic lives in the three .js modules.
// Add a new text:      edit latin_reader.js → WORKS
// Add a new paradigm:  edit latin_tables.js → CATEGORIES
// Shared components:   edit latin_shared.js → WordToken, POS_COLORS, tokenise

function App() {
  const [mode, setMode]           = React.useState("tables"); // "tables" | "matching" | "reader"
  const [catIdx, setCatIdx]       = React.useState(0);
  const [wordIdx, setWordIdx]     = React.useState(0);
  const [inputs, setInputs]       = React.useState({});
  const [submitted, setSubmitted] = React.useState(false);
  const [showAnswers, setShowAnswers] = React.useState(false);

  const category = CATEGORIES[catIdx];
  const word     = category.words[wordIdx];
  const tag      = TAG[category.type];

  const tableData = React.useMemo(() => {
    if (category.type === "irregular") return word.tables.map(t => ({
      ...t, answers: t.rows.map(r => r.answers)
    }));
    const patterns = category.type === "conjugation" ? CONJUGATION_PATTERNS : DECLENSION_PATTERNS;
    const pattern  = patterns[category.pattern];
    return [{ tense: null, headers: pattern.headers, rows: pattern.rows, answers: getAnswers(category, word) }];
  }, [catIdx, wordIdx]);

  const allCells    = tableData.flatMap((t, ti) =>
    t.answers.flatMap((row, ri) => row.map((_, ci) => `${ti}-${ri}-${ci}`))
  );
  const total       = allCells.length;
  const filledCount = allCells.filter(k => inputs[k]?.trim()).length;
  const score       = submitted ? allCells.filter(k => {
    const [ti, ri, ci] = k.split("-").map(Number);
    return checkAnswer(inputs[k] || "", tableData[ti].answers[ri][ci]) === "correct";
  }).length : 0;

  const handleInput  = (ti, key, val) => {
    setInputs(p => ({ ...p, [`${ti}-${key}`]: val }));
    if (submitted) setSubmitted(false);
  };
  const reset      = () => { setInputs({}); setSubmitted(false); setShowAnswers(false); };
  const goWord     = dir => { setWordIdx((wordIdx + dir + category.words.length) % category.words.length); reset(); };
  const goCategory = idx => { setCatIdx(idx); setWordIdx(0); reset(); };

  return (
    <div style={{ minHeight: "100vh", background: "#f5f0e8", backgroundImage: "radial-gradient(ellipse at 15% 0%,rgba(180,140,80,0.09) 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,rgba(100,60,20,0.06) 0%,transparent 55%)", fontFamily: "'EB Garamond','Palatino Linotype',Palatino,serif", color: "#2c1f0e", paddingBottom: "60px" }}>

      {/* Header */}
      <header style={{ borderBottom: "2px solid #b8973e", background: "linear-gradient(180deg,#2c1f0e 0%,#3d2c12 100%)", padding: "20px 32px 16px", display: "flex", alignItems: "flex-end", gap: "20px" }}>
        <div>
          <div style={{ fontFamily: "'Cinzel',serif", fontSize: "10px", letterSpacing: "4px", color: "#b8973e", marginBottom: "4px" }}>GRAMMATICA LATINA</div>
          <h1 style={{ fontFamily: "'Cinzel',serif", fontSize: "22px", fontWeight: "700", color: "#f0e4c4", margin: 0, letterSpacing: "1px" }}>Latin — Glossarium</h1>
        </div>
        <div style={{ marginLeft: "auto", fontStyle: "italic", color: "#7a5a2a", fontSize: "13px", paddingBottom: "2px", display: "flex", alignItems: "center", gap: "20px" }}>
          <a href="../index.html" style={{ color: "#7a5a2a", textDecoration: "none", opacity: 0.7, fontSize: "11px", fontFamily: "'Cinzel',serif", letterSpacing: "1px" }}>← Hub</a>
          <span>Repetitio est mater studiōrum</span>
        </div>
      </header>

      <div style={{ maxWidth: "860px", margin: "0 auto", padding: "0 20px" }}>

        {/* Mode tabs */}
        <div style={{ display: "flex", gap: "0", marginTop: "24px", borderBottom: "2px solid #c9a84c" }}>
          {[["tables","📋  Practice Tables"],["matching","🔗  Vocabulary Matching"],["reader","📖  Reader"]].map(([m, label]) => (
            <button key={m} onClick={() => setMode(m)}
              style={{ fontFamily: "'Cinzel',serif", fontSize: "11px", letterSpacing: "1px", padding: "9px 22px", border: "none", borderBottom: mode === m ? "2px solid #2c1f0e" : "2px solid transparent", marginBottom: "-2px", background: mode === m ? "#f5f0e8" : "transparent", color: mode === m ? "#2c1f0e" : "#7a5c2a", cursor: "pointer", fontWeight: mode === m ? "600" : "400", transition: "all 0.15s" }}>
              {label}
            </button>
          ))}
        </div>

        {/* MATCHING */}
        {mode === "matching" && <MatchingMode />}

        {/* READER */}
        {mode === "reader" && <ReaderMode />}

        {/* TABLES */}
        {mode === "tables" && (
          <div>
            <div style={{ marginTop: "20px", display: "flex", flexWrap: "wrap", gap: "5px" }}>
              {CATEGORIES.map((cat, i) => {
                const tc = TAG[cat.type];
                const active = i === catIdx;
                return (
                  <button key={cat.id} onClick={() => goCategory(i)}
                    style={{ fontFamily: "'Cinzel',serif", fontSize: "10px", letterSpacing: "0.8px", padding: "4px 11px", border: "1px solid", borderColor: active ? tc.bg : "#c9b48a", borderRadius: "20px", background: active ? tc.bg : "transparent", color: active ? tc.text : "#7a5c2a", cursor: "pointer", transition: "all 0.15s", whiteSpace: "nowrap" }}>
                    {cat.label}
                    <span style={{ fontFamily: "'EB Garamond',serif", fontWeight: "400", marginLeft: "4px", opacity: 0.75, fontSize: "9px" }}>{cat.sublabel}</span>
                  </button>
                );
              })}
            </div>

            <div style={{ marginTop: "16px", background: "#fffdf6", border: "1px solid #d4bc84", borderRadius: "4px", boxShadow: "0 2px 16px rgba(44,31,14,0.09)", overflow: "hidden" }}>

              <div style={{ background: "linear-gradient(180deg,#4a3010 0%,#3a2410 100%)", padding: "13px 22px", borderBottom: "2px solid #b8973e", display: "flex", alignItems: "center", gap: "14px" }}>
                <button onClick={() => goWord(-1)} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(184,151,62,0.4)", borderRadius: "2px", color: "#e8c97a", cursor: "pointer", width: "30px", height: "30px", fontSize: "17px", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>‹</button>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "baseline", gap: "10px", flexWrap: "wrap" }}>
                    <span style={{ fontFamily: "'Cinzel',serif", fontSize: "16px", fontWeight: "600", color: "#f0e4c4" }}>{word.lemma}</span>
                    <span style={{ fontStyle: "italic", color: "#c4a060", fontSize: "14px" }}>— {word.meaning}</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: "8px", marginTop: "3px" }}>
                    <span style={{ fontFamily: "'Cinzel',serif", fontSize: "8px", letterSpacing: "1.5px", padding: "2px 7px", borderRadius: "10px", background: tag.bg, color: tag.text, border: `1px solid ${tag.text}44` }}>{category.type.toUpperCase()}</span>
                    <span style={{ fontFamily: "'Cinzel',serif", fontSize: "8px", color: "#8a6a3a", letterSpacing: "1px" }}>{category.sublabel.toUpperCase()}</span>
                  </div>
                </div>
                <div style={{ textAlign: "center", color: "#8a6a3a", fontSize: "11px", flexShrink: 0 }}>
                  <div style={{ fontFamily: "'Cinzel',serif", fontSize: "15px", color: "#e8c97a", fontWeight: "600" }}>{wordIdx + 1}</div>
                  <div>of {category.words.length}</div>
                </div>
                <button onClick={() => goWord(1)} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(184,151,62,0.4)", borderRadius: "2px", color: "#e8c97a", cursor: "pointer", width: "30px", height: "30px", fontSize: "17px", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>›</button>
              </div>

              <ScoreBar score={score} total={total} submitted={submitted} />

              <div style={{ padding: "16px 22px", display: "flex", flexDirection: "column", gap: "26px" }}>
                {tableData.map((t, ti) => {
                  const subInputs = {};
                  Object.entries(inputs).forEach(([k, v]) => {
                    const [tIdx, ...rest] = k.split("-");
                    if (Number(tIdx) === ti) subInputs[rest.join("-")] = v;
                  });
                  return (
                    <div key={ti}>
                      {t.tense && (
                        <div style={{ fontFamily: "'Cinzel',serif", fontSize: "10px", letterSpacing: "2px", color: "#8a6914", marginBottom: "9px", textTransform: "uppercase", borderLeft: "3px solid #c9a84c", paddingLeft: "9px" }}>{t.tense}</div>
                      )}
                      <TableGrid headers={t.headers} rows={t.rows} answers={t.answers} inputs={subInputs} submitted={submitted} showAnswers={showAnswers} onInput={(key, val) => handleInput(ti, key, val)} />
                    </div>
                  );
                })}
              </div>

              <div style={{ padding: "13px 22px 17px", borderTop: "1px solid #e8dfc0", display: "flex", alignItems: "center", gap: "9px", flexWrap: "wrap" }}>
                <button onClick={() => setSubmitted(true)} disabled={filledCount === 0}
                  style={{ fontFamily: "'Cinzel',serif", fontSize: "10px", letterSpacing: "1.5px", padding: "8px 20px", background: filledCount === 0 ? "#c9b48a" : "#3a2410", color: "#f0e4c4", border: "none", borderRadius: "2px", cursor: filledCount === 0 ? "default" : "pointer" }}>
                  GRADE ({filledCount}/{total})
                </button>
                <button onClick={reset}
                  style={{ fontFamily: "'Cinzel',serif", fontSize: "10px", letterSpacing: "1.5px", padding: "8px 16px", background: "transparent", color: "#7a5c2a", border: "1px solid #c9b48a", borderRadius: "2px", cursor: "pointer" }}>
                  RESET
                </button>
                {submitted && score < total && (
                  <button onClick={() => setShowAnswers(v => !v)}
                    style={{ fontFamily: "'Cinzel',serif", fontSize: "10px", letterSpacing: "1.5px", padding: "8px 16px", background: "transparent", color: showAnswers ? "#2d6a4f" : "#9b2335", border: "1px solid", borderColor: showAnswers ? "#2d6a4f" : "#c9b48a", borderRadius: "2px", cursor: "pointer" }}>
                    {showAnswers ? "HIDE ANSWERS" : "SHOW ANSWERS"}
                  </button>
                )}
                <div style={{ marginLeft: "auto", display: "flex", gap: "7px" }}>
                  <button onClick={() => goWord(-1)} style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", letterSpacing: "1px", padding: "8px 13px", background: "transparent", color: "#7a5c2a", border: "1px solid #c9b48a", borderRadius: "2px", cursor: "pointer" }}>← PREV</button>
                  <button onClick={() => goWord(1)}  style={{ fontFamily: "'Cinzel',serif", fontSize: "9px", letterSpacing: "1px", padding: "8px 13px", background: "#8a6914", color: "#f5f0e8", border: "none", borderRadius: "2px", cursor: "pointer" }}>NEXT →</button>
                </div>
              </div>
            </div>

            <div style={{ marginTop: "14px", fontSize: "12px", color: "#9a7a3a", fontStyle: "italic", textAlign: "center" }}>
              Macrons optional · ā = a, ē = e, ī = i, ō = o, ū = u
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
